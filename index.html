<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical meta tags for mobile game responsiveness and "Add to Home Screen" capabilities -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Mobile Game</title>

    <style>
        /* Base reset to ensure no scrollbars or margins get in the way of the canvas */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none; /* Disable iOS callout */
            -webkit-user-select: none;   /* Disable text selection */
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden; /* Prevent any scrolling */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- THE CANVAS --- */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            /* Hide by default, will be revealed in landscape */
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        /* --- ORIENTATION LOCK UI --- */
        #orientation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #ffffff;
            text-align: center;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #f8fafc;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            max-width: 80%;
            line-height: 1.5;
        }

        /* SVG Animation Styles */
        .device-icon {
            width: 120px;
            height: 120px;
        }

        /* The smooth tilt animation simulating the physical rotation of a phone */
        @keyframes tiltPhone {
            0%, 15% { transform: rotate(0deg); }
            45%, 55% { transform: rotate(-90deg); }
            85%, 100% { transform: rotate(0deg); }
        }

        /* The glowing arrow pulsing to draw attention */
        @keyframes pulseArrow {
            0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 2px #38bdf8); }
            50% { opacity: 1; filter: drop-shadow(0 0 10px #38bdf8); }
        }

        .phone-group {
            transform-origin: 50px 50px;
            animation: tiltPhone 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .arrow-group {
            animation: pulseArrow 1.5s ease-in-out infinite;
        }

        /* CSS Media Queries to handle device orientation instantly */
        @media screen and (orientation: landscape) {
            #orientation-overlay {
                display: none; /* Hide the lock screen */
            }
            #gameCanvas {
                opacity: 1; /* Show the canvas */
            }
        }
    </style>
</head>
<body>

    <!-- Portrait Mode Lock Screen -->
    <div id="orientation-overlay">
        <!-- Custom SVG Graphic for "Rotate Device" -->
        <svg class="device-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Glowing arrow indicating the turn -->
            <g class="arrow-group">
                <path d="M 20 60 A 35 35 0 0 1 80 60" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>
                <polygon points="85,55 80,68 73,56" fill="#38bdf8" />
            </g>
            
            <!-- Phone Shape -->
            <g class="phone-group">
                <rect x="32" y="20" width="36" height="60" rx="6" fill="#0f172a" stroke="#ffffff" stroke-width="3"/>
                <!-- Speaker notch -->
                <line x1="45" y1="26" x2="55" y2="26" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
                <!-- Home button/Indicator -->
                <circle cx="50" cy="73" r="2.5" fill="#cbd5e1"/>
            </g>
        </svg>

        <h1 class="title">Rotate Device</h1>
        <p class="subtitle">Please turn your device to landscape mode to play.</p>
    </div>

    <!-- The Game Canvas (Our Blank Slate) -->
    <canvas id="gameCanvas"></canvas>

    <script>
        // Game Engine Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Handles resizing the canvas so it's perfectly crisp on any device
        function resizeCanvas() {
            // Get the actual width and height of the window
            const width = window.innerWidth;
            const height = window.innerHeight;

            // Handle high-DPI displays (Retina screens on mobile)
            const dpr = window.devicePixelRatio || 1;
            
            // Set the actual DOM element size
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            // Set the CSS size
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;

            // Scale the context to ensure our drawing coordinates match CSS pixels
            ctx.scale(dpr, dpr);

            drawBlankCanvas(width, height);
        }

        // Fills the screen with our background color
        function drawBlankCanvas(width, height) {
            ctx.fillStyle = '#0a0a0a'; // A nice, deep "gaming" black
            ctx.fillRect(0, 0, width, height);
            
            // For testing: Draw a subtle grid or center mark if desired later
            // Currently left perfectly blank as requested.
        }

        // Event Listeners for resizing and orientation changes
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            // Slight delay ensures the browser has updated window dimensions
            setTimeout(resizeCanvas, 100); 
        });

        // Initialize on load
        resizeCanvas();
    </script>
</body>
</html>
