<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egg Survivor">
    <title>Egg Survivor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f13;
            overflow: hidden;
            touch-action: none; /* Prevents pull-to-refresh and scrolling */
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- PORTRAIT MODE WARNING --- */
        #orientation-warning {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0c;
            color: #e4e6d9;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #orientation-warning h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        #orientation-warning p {
            font-size: 18px;
            color: #8b8e83;
        }

        /* Show the warning only when the device is held vertically */
        @media screen and (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
            #gameCanvas {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <h2>Please tilt your phone the other way.</h2>
        <p>Rocktato plays in landscape.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- INPUT MANAGEMENT (Multi-touch Joysticks) ---
        const input = {
            left: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 },
            right: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 }
        };

        const JOYSTICK_MAX_RADIUS = 60;

        function handleTouch(e) {
            e.preventDefault();
            const halfWidth = width / 2;

            let leftFound = false;
            let rightFound = false;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                
                if (touch.clientX < halfWidth) {
                    leftFound = true;
                    if (!input.left.active) {
                        input.left.active = true;
                        input.left.id = touch.identifier;
                        input.left.baseX = touch.clientX;
                        input.left.baseY = touch.clientY;
                    }
                    if (input.left.id === touch.identifier) {
                        input.left.currentX = touch.clientX;
                        input.left.currentY = touch.clientY;
                    }
                } 
                else {
                    rightFound = true;
                    if (!input.right.active) {
                        input.right.active = true;
                        input.right.id = touch.identifier;
                        input.right.baseX = touch.clientX;
                        input.right.baseY = touch.clientY;
                    }
                    if (input.right.id === touch.identifier) {
                        input.right.currentX = touch.clientX;
                        input.right.currentY = touch.clientY;
                    }
                }
            }

            if (!leftFound) input.left.active = false;
            if (!rightFound) input.right.active = false;

            ['left', 'right'].forEach(side => {
                const stick = input[side];
                if (stick.active) {
                    let dx = stick.currentX - stick.baseX;
                    let dy = stick.currentY - stick.baseY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > JOYSTICK_MAX_RADIUS) {
                        dx = (dx / dist) * JOYSTICK_MAX_RADIUS;
                        dy = (dy / dist) * JOYSTICK_MAX_RADIUS;
                        dist = JOYSTICK_MAX_RADIUS;
                        
                        stick.baseX = stick.currentX - dx;
                        stick.baseY = stick.currentY - dy;
                    }
                    
                    stick.vectorX = dx / JOYSTICK_MAX_RADIUS;
                    stick.vectorY = dy / JOYSTICK_MAX_RADIUS;
                    stick.magnitude = dist / JOYSTICK_MAX_RADIUS;
                } else {
                    stick.vectorX = 0;
                    stick.vectorY = 0;
                    stick.magnitude = 0;
                }
            });
        }

        window.addEventListener('touchstart', handleTouch, { passive: false });
        window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false });
        window.addEventListener('touchcancel', handleTouch, { passive: false });

        let mouseDown = false;
        window.addEventListener('mousedown', (e) => {
            mouseDown = true;
            handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] });
        });
        window.addEventListener('mousemove', (e) => {
            if (mouseDown) handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] });
        });
        window.addEventListener('mouseup', (e) => {
            mouseDown = false;
            handleTouch({ preventDefault: ()=>{}, touches: [] });
        });


        // --- GAME OBJECTS ---
        const ROOM_SIZE = 2000;

        class Player {
            constructor() {
                this.x = ROOM_SIZE / 2;
                this.y = ROOM_SIZE / 2;
                this.radius = 35;
                this.speed = 400; 
                this.animTime = 0;
                this.facingAngle = 0;
            }

            update(dt) {
                const moveMag = input.left.magnitude;
                if (moveMag > 0) {
                    this.x += input.left.vectorX * this.speed * moveMag * dt;
                    this.y += input.left.vectorY * this.speed * moveMag * dt;
                    
                    this.x = Math.max(this.radius, Math.min(ROOM_SIZE - this.radius, this.x));
                    this.y = Math.max(this.radius, Math.min(ROOM_SIZE - this.radius, this.y));

                    this.animTime += dt * (10 + moveMag * 15); 
                } else {
                    this.animTime += dt * 3;
                }

                if (input.right.active && input.right.magnitude > 0.1) {
                    this.facingAngle = Math.atan2(input.right.vectorY, input.right.vectorX);
                } else if (input.left.active && moveMag > 0.1) {
                    this.facingAngle = Math.atan2(input.left.vectorY, input.left.vectorX);
                }
            }

            draw(ctx) {
                const isMoving = input.left.magnitude > 0.1;
                const runIntensity = input.left.magnitude; 
                
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); 
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; 
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; 

                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(0, 35 - bobbing*0.5, 30 - bobbing, 15 - bobbing*0.5, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.rotate(leanAngle);
                ctx.translate(0, -bobbing);
                ctx.scale(1, breathScale);

                // --- LEGS ---
                if (isMoving) {
                    const legStride = 20 * runIntensity;
                    const leftLegY = Math.sin(this.animTime) * legStride;
                    const rightLegY = Math.sin(this.animTime + Math.PI) * legStride;
                    
                    ctx.fillStyle = '#111'; // Darker, creepy legs
                    ctx.beginPath(); ctx.arc(-12, 25 + Math.max(0, -leftLegY*0.5), 6, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(12, 25 + Math.max(0, -rightLegY*0.5), 6, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.fillStyle = '#111';
                    ctx.beginPath(); ctx.arc(-10, 25, 6, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(10, 25, 6, 0, Math.PI*2); ctx.fill();
                }

                // --- BODY (Uncanny Pale Egg) ---
                const eggGrad = ctx.createRadialGradient(-10, -15, 5, 0, 0, this.radius + 10);
                eggGrad.addColorStop(0, '#ffffff');    
                eggGrad.addColorStop(0.4, '#e4e6d9');  // Pale, slightly sickly grey-greenish white
                eggGrad.addColorStop(1, '#8b8e83');    // Darker, bruised-looking shadow

                ctx.fillStyle = eggGrad;
                ctx.beginPath();
                ctx.moveTo(0, -this.radius * 1.2); 
                ctx.bezierCurveTo(this.radius, -this.radius * 1.2, this.radius, this.radius, 0, this.radius);
                ctx.bezierCurveTo(-this.radius, this.radius, -this.radius, -this.radius * 1.2, 0, -this.radius * 1.2);
                ctx.fill();

                // --- FACE (Uncanny & Weird) ---
                ctx.save();
                const faceOffsetX = Math.cos(this.facingAngle) * 10;
                const faceOffsetY = Math.sin(this.facingAngle) * 8;
                ctx.translate(faceOffsetX, faceOffsetY);
                
                // Mismatched Staring Eyes
                ctx.fillStyle = 'white';
                // Left eye (larger, slightly lower)
                ctx.beginPath(); ctx.arc(-12, -4, 9, 0, Math.PI*2); ctx.fill();
                // Right eye (smaller, slightly higher)
                ctx.beginPath(); ctx.arc(10, -6, 7, 0, Math.PI*2); ctx.fill();
                
                // Tiny Pinprick Pupils (Creates a disturbing stare)
                ctx.fillStyle = '#000';
                const pupilOffsetX = Math.cos(this.facingAngle) * 4;
                const pupilOffsetY = Math.sin(this.facingAngle) * 4;
                ctx.beginPath(); ctx.arc(-12 + pupilOffsetX, -4 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10 + pupilOffsetX, -6 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                
                // Mouth removed entirely!
                
                ctx.restore();

                // --- WEAPONS (Dual Pistols) ---
                this.drawWeapon(ctx, -25, 12, this.facingAngle, true); 
                this.drawWeapon(ctx, 25, 12, this.facingAngle, false); 

                ctx.restore();
            }

            drawWeapon(ctx, offsetX, offsetY, aimAngle, isLeft) {
                ctx.save();
                
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (isLeft ? 0 : Math.PI)) * 5 : 0;
                ctx.translate(offsetX, offsetY + sway);
                ctx.rotate(aimAngle);

                // --- FIX: Flip the gun if pointing left ---
                // If the angle is pointing left (past 90 degrees up or down), flip the Y axis
                const isAimingLeft = Math.abs(aimAngle) > Math.PI / 2;
                if (isAimingLeft) {
                    ctx.scale(1, -1);
                }

                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetY = isAimingLeft ? -10 : 10; // Flip shadow offset if gun is flipped

                const gunGrad = ctx.createLinearGradient(0, -4, 0, 4);
                gunGrad.addColorStop(0, '#5a5a6a');
                gunGrad.addColorStop(0.5, '#3b3b4c');
                gunGrad.addColorStop(1, '#1c1c28');
                ctx.fillStyle = gunGrad;
                
                ctx.beginPath();
                ctx.roundRect(5, -4, 20, 8, 2); 
                ctx.roundRect(-2, -2, 10, 12, 2); 
                ctx.fill();

                ctx.shadowColor = 'transparent'; 
                ctx.fillStyle = '#050505';
                ctx.fillRect(18, -2, 5, 4); 
                ctx.fillStyle = '#888';
                ctx.fillRect(8, -3, 8, 2); 

                ctx.restore();
            }
        }

        // --- ENVIRONMENT ---
        function drawRoom(ctx, camX, camY) {
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(-camX, -camY);

            const tileSize = 100;
            const startX = Math.floor(camX / tileSize) * tileSize;
            const startY = Math.floor(camY / tileSize) * tileSize;
            const endX = startX + width + tileSize;
            const endY = startY + height + tileSize;

            ctx.strokeStyle = 'rgba(40, 45, 60, 0.4)';
            ctx.lineWidth = 2;

            for (let x = Math.max(0, startX); x <= Math.min(ROOM_SIZE, endX); x += tileSize) {
                for (let y = Math.max(0, startY); y <= Math.min(ROOM_SIZE, endY); y += tileSize) {
                    if ((x/tileSize + y/tileSize) % 2 === 0) {
                        ctx.fillStyle = '#16171d';
                    } else {
                        ctx.fillStyle = '#1a1c23';
                    }
                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            ctx.strokeStyle = '#4a90e2'; 
            ctx.lineWidth = 10;
            ctx.shadowColor = '#4a90e2';
            ctx.shadowBlur = 20;
            ctx.strokeRect(0, 0, ROOM_SIZE, ROOM_SIZE);

            ctx.restore();
        }

        // --- UI / JOYSTICKS ---
        function drawJoysticks(ctx) {
            ctx.lineWidth = 3;
            
            // Draw Left Joystick (Movement) ONLY
            if (input.left.active) {
                ctx.beginPath();
                ctx.arc(input.left.baseX, input.left.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(input.left.currentX, input.left.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            }
        }

        // --- MAIN LOOP ---
        const player = new Player();
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            const dt = (currentTime - lastTime) / 1000; 
            lastTime = currentTime;

            player.update(dt);

            let camX = player.x - width / 2;
            let camY = player.y - height / 2;
            
            drawRoom(ctx, camX, camY);

            ctx.save();
            ctx.translate(-camX, -camY);
            player.draw(ctx);
            ctx.restore();

            drawJoysticks(ctx);

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
