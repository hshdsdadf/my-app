<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egg Survivor">
    <title>Egg Survivor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            overflow: hidden;
            touch-action: none; /* Prevents pull-to-refresh and scrolling */
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- PORTRAIT MODE WARNING --- */
        #orientation-warning {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            color: #8b8e83;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #orientation-warning h2 {
            margin-bottom: 10px;
            font-size: 24px;
            color: #e4e6d9;
        }

        #orientation-warning p {
            font-size: 18px;
        }

        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
            #gameCanvas, #ui-layer { display: none !important; }
        }

        /* --- UI & MENUS --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        /* HUD: Health & XP Bars */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 12px 80px 12px 16px; 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 5px;
            pointer-events: none;
        }
        .bar-bg {
            width: 100%; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 3px; position: relative; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .bar-bg.vitals-bg { height: 16px; }
        .bar-bg.growth-bg { height: 8px; border-color: rgba(255,255,255,0.04); }
        .bar-fill { height: 100%; width: 100%; transition: width 0.15s ease-out; }
        .vitals-fill {
            background: linear-gradient(90deg, #5a0000 0%, #9d0208 50%, #d00000 80%, #ff2222 100%);
            box-shadow: 0 0 12px #aa0000, inset 0 1px 0 rgba(255,100,100,0.3);
        }
        .growth-fill {
            background: linear-gradient(90deg, #003a5a, #0077b6, #00b4d8);
            box-shadow: 0 0 8px #0077b6;
        }
        .bar-label {
            position: absolute; top: 0; left: 8px; font-weight: 900; color: rgba(255,255,255,0.85);
            text-shadow: 1px 1px 2px black; letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace;
        }
        .vitals-label { font-size: 9px; line-height: 16px; }
        .growth-label { font-size: 6px; line-height: 8px; opacity: 0.6; }

        #pause-btn {
            position: absolute; top: 15px; right: 20px;
            width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            pointer-events: auto; cursor: pointer;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #pause-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        #pause-btn:active { transform: scale(0.95); }

        .pause-bar {
            width: 6px; height: 20px; background: white; margin: 0 3px; border-radius: 3px;
        }

        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 5, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto; opacity: 1; transition: opacity 0.3s ease;
        }
        .menu-overlay.hidden, #pause-btn.hidden, #hud.hidden { opacity: 0; pointer-events: none; }

        .menu-box {
            background: rgba(10, 8, 8, 0.92); border: 1px solid rgba(255,255,255,0.07);
            padding: 40px; border-radius: 6px; display: flex; flex-direction: column;
            align-items: center; box-shadow: 0 10px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.03);
            transform: translateY(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; text-align: center;
        }
        .menu-overlay.hidden .menu-box { transform: translateY(30px); }

        .menu-overlay h2 {
            color: #c8c9c0; margin: 0 0 30px 0; font-size: 22px; letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            font-family: 'Courier New', Courier, monospace; text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 20px; width: 100%;
        }

        /* Game Over Specific */
        @keyframes glitch-title {
            0%, 82%, 100% { transform: none; opacity: 1; text-shadow: 0 0 25px rgba(200,0,0,0.9), 0 0 60px rgba(150,0,0,0.4); }
            83% { transform: translateX(-4px) skewX(-6deg); opacity: 0.85; text-shadow: 4px 0 #ff0000, -2px 0 #550000; }
            85% { transform: translateX(3px) skewX(3deg); opacity: 1; text-shadow: -4px 0 #cc0000, 3px 0 #880000; }
            87% { transform: translateX(-2px); opacity: 0.9; }
            89% { transform: none; opacity: 1; text-shadow: 0 0 25px rgba(200,0,0,0.9), 2px 0 #ff0000; }
            91% { transform: skewX(-1deg) translateX(2px); opacity: 0.95; }
            93% { transform: none; }
        }
        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 8px; }
        }
        @keyframes bleed-in {
            0% { opacity: 0; transform: translateY(-20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(180,0,0,0.3), inset 0 0 30px rgba(80,0,0,0.2); }
            50% { box-shadow: 0 0 40px rgba(200,0,0,0.5), inset 0 0 50px rgba(120,0,0,0.3); }
        }
        
        #gameover-menu {
            background: radial-gradient(ellipse at center, rgba(30,0,0,0.97) 0%, rgba(5,5,8,0.99) 70%);
        }
        #gameover-menu::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
            pointer-events: none; z-index: 0;
            animation: scanlines 0.3s linear infinite;
        }
        #gameover-menu .menu-box {
            background: transparent; border: none; box-shadow: none;
            backdrop-filter: none; -webkit-backdrop-filter: none;
            position: relative; z-index: 1;
            animation: bleed-in 0.8s ease-out forwards;
        }
        .death-title {
            color: #cc1111;
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px; font-weight: 900; margin-bottom: 28px;
            text-transform: uppercase; letter-spacing: 4px; max-width: 600px;
            animation: glitch-title 5s infinite;
            border-bottom: 1px solid rgba(180,0,0,0.3);
            padding-bottom: 18px;
        }
        .typewriter-text {
            color: #c8a0a0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px; line-height: 2.0;
            margin-bottom: 30px; text-align: left; white-space: pre-wrap;
            width: 340px; min-height: 180px;
            background: rgba(10,0,0,0.6);
            border: 1px solid rgba(150,0,0,0.25);
            border-left: 3px solid rgba(180,0,0,0.6);
            padding: 16px 20px; border-radius: 4px;
            box-shadow: 0 0 30px rgba(100,0,0,0.2), inset 0 0 20px rgba(0,0,0,0.5);
            animation: pulse-red 3s ease-in-out infinite;
        }
        .menu-btn {
            background: transparent; border: 1px solid rgba(80,80,80,0.5); color: #aaa;
            padding: 14px 40px; margin: 6px; font-size: 16px; border-radius: 4px;
            cursor: pointer; transition: all 0.25s; width: 260px; font-weight: 700;
            letter-spacing: 2px; font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
        }
        .menu-btn.primary {
            border-color: rgba(160,0,0,0.7); color: #dd4444;
            background: rgba(80,0,0,0.15);
            text-shadow: 0 0 10px rgba(200,0,0,0.5);
        }
        .menu-btn:hover { background: rgba(150,0,0,0.3); color: #ff6666; border-color: #aa0000; transform: scale(1.03); box-shadow: 0 0 20px rgba(150,0,0,0.3); }
        .menu-btn:active { transform: scale(0.97); }

        .slider-container { width: 300px; margin: 15px 0; display: flex; flex-direction: column; align-items: stretch; }
        .slider-container label { color: #ccc; font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: bold; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px;
            border-radius: 50%; background: #e4e6d9; cursor: pointer;
            margin-top: -8px; box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: #333; border-radius: 2px;
        }

        #countdown-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 140px; color: white; font-weight: bold; 
            text-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(255,255,255,0.5);
            pointer-events: none; opacity: 0;
        }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        .pop-anim { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <h2>Please tilt your phone the other way.</h2>
        <p>Rocktato plays in landscape.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay Layer -->
    <div id="ui-layer">
        
        <!-- HUD -->
        <div id="hud">
            <div class="bar-bg vitals-bg">
                <div id="vitals-bar" class="bar-fill vitals-fill" style="width: 100%;"></div>
                <div class="bar-label vitals-label">VITALS</div>
            </div>
            <div class="bar-bg growth-bg">
                <div id="growth-bar" class="bar-fill growth-fill" style="width: 0%;"></div>
                <div class="bar-label growth-label">GROWTH</div>
            </div>
        </div>

        <button id="pause-btn" onclick="setGameState('paused')">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
        </button>

        <!-- Pause Menu -->
        <div id="pause-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <h2>PAUSED</h2>
                <button class="menu-btn primary" onclick="startCountdown()">Resume</button>
                <button class="menu-btn" onclick="setGameState('settings')">Settings</button>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="settings-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <h2>SETTINGS</h2>
                <div class="slider-container">
                    <label>Brightness <span id="val-brightness">55%</span></label>
                    <input type="range" id="set-brightness" min="10" max="75" value="55" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Camera Zoom <span id="val-zoom">100%</span></label>
                    <input type="range" id="set-zoom" min="80" max="150" value="100" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Screen Shake <span id="val-shake">100%</span></label>
                    <input type="range" id="set-shake" min="0" max="200" value="100" oninput="updateSettingsUI()">
                </div>
                <button class="menu-btn primary" style="margin-top: 20px;" onclick="setGameState('paused')">Back</button>
            </div>
        </div>

        <!-- Game Over Menu -->
        <div id="gameover-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <div style="font-family:'Courier New',monospace; font-size:11px; letter-spacing:4px; color:rgba(150,0,0,0.6); margin-bottom:10px; text-transform:uppercase;">— TERMINATED —</div>
                <div id="death-title" class="death-title"></div>
                <div id="typewriter" class="typewriter-text"></div>
                <button id="restart-btn" class="menu-btn primary hidden" onclick="restartRun()">[ Restart Run ]</button>
            </div>
        </div>

        <div id="countdown-display"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 

        const lightCanvas = document.createElement('canvas');
        const lightCtx = lightCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            lightCanvas.width = width;
            lightCanvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- GLOBAL STATE, PROGRESSION, & SETTINGS ---
        let gameState = 'playing'; // playing, paused, settings, countdown, gameover
        let countdownValue = 0;
        let countdownTimer = 0;

        let currentRoom = 1;
        let totalEnemiesThisRoom = 4;
        let enemiesKilledThisRoom = 0;
        let hasKey = false;
        
        let roomTextTimer = 2.0;
        let keyDroppedTimer = 0;
        let exitDoorProgress = 0; // 0 = locked, 1 = fully open

        // Stats Tracking
        let totalKills = 0;
        let timeAlive = 0;
        let deathParticles = [];

        const settings = {
            brightness: 0.55, 
            zoom: 1.0,
            shake: 1.0
        };

        function updateSettingsUI() {
            const b = document.getElementById('set-brightness').value;
            const z = document.getElementById('set-zoom').value;
            const s = document.getElementById('set-shake').value;
            
            document.getElementById('val-brightness').innerText = b + "%";
            document.getElementById('val-zoom').innerText = z + "%";
            document.getElementById('val-shake').innerText = s + "%";

            settings.brightness = parseInt(b) / 100;
            settings.zoom = parseInt(z) / 100;
            settings.shake = parseInt(s) / 100;
        }

        function setGameState(state) {
            gameState = state;
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.add('hidden');
            document.getElementById('gameover-menu').classList.add('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            if (state === 'playing') {
                document.getElementById('pause-btn').classList.remove('hidden');
                input.left.active = false;
                input.right.active = false;
            } else if (state === 'paused') {
                document.getElementById('pause-menu').classList.remove('hidden');
            } else if (state === 'settings') {
                document.getElementById('settings-menu').classList.remove('hidden');
            } else if (state === 'gameover') {
                document.getElementById('gameover-menu').classList.remove('hidden');
                document.getElementById('hud').classList.add('hidden');
                runGameOverSequence();
            }
        }

        function updateHUD() {
            const hpPercent = Math.max(0, (player.hp / player.maxHp) * 100);
            const xpPercent = Math.min(100, (player.xp / player.maxXp) * 100);
            document.getElementById('vitals-bar').style.width = `${hpPercent}%`;
            document.getElementById('growth-bar').style.width = `${xpPercent}%`;
        }

        // --- GAME OVER SEQUENCE ---
        const deathMessages = [
            "Cracked like a Sunday morning breakfast.",
            "Scrambled by the void.",
            "Poached to perfection by the shadows.",
            "Devoured alive by the creeping grins.",
            "You cracked under the pressure."
        ];
        let typewriterInterval;

        function runGameOverSequence() {
            document.getElementById('restart-btn').classList.add('hidden');
            document.getElementById('typewriter').innerHTML = "";
            
            const randomDeath = deathMessages[Math.floor(Math.random() * deathMessages.length)];
            document.getElementById('death-title').innerText = randomDeath;

            const score = Math.floor(timeAlive * 10) + (totalKills * 50) + ((currentRoom - 1) * 200);

            const finalStats = `  KILLS ............... ${totalKills}
  TIME ALIVE .......... ${Math.floor(timeAlive)}s
  WEAPONS HELD ........ ${player.weapons}
  ROOMS CLEARED ....... ${currentRoom - 1}

  ─────────────────────────
  SCORE ............... ${score}`;

            let i = 0;
            clearInterval(typewriterInterval);
            typewriterInterval = setInterval(() => {
                document.getElementById('typewriter').innerHTML += finalStats.charAt(i);
                i++;
                if (i >= finalStats.length) {
                    clearInterval(typewriterInterval);
                    document.getElementById('restart-btn').classList.remove('hidden');
                }
            }, 55);
        }

        function restartRun() {
            player.hp = player.maxHp = 100;
            player.xp = 0; player.level = 1;
            player.x = 200; player.y = ROOM_SIZE / 2;
            
            timeAlive = 0;
            totalKills = 0;
            currentRoom = 0; // Will be incremented to 1 by startNextRoom
            deathParticles = []; // Clear particles
            deadEnemies.length = 0; // Clear corpses
            
            updateHUD();
            startNextRoom();
            setGameState('playing');
        }

        function startCountdown() {
            setGameState('countdown');
            countdownValue = 3;
            countdownTimer = 0.5; 
            triggerCountdownAnim(countdownValue);
        }

        function triggerCountdownAnim(text) {
            const el = document.getElementById('countdown-display');
            el.innerText = text;
            el.classList.remove('pop-anim');
            void el.offsetWidth; 
            el.classList.add('pop-anim');
        }

        function startNextRoom() {
            currentRoom++;
            totalEnemiesThisRoom = 4 + Math.min(currentRoom - 1, 9);
            enemiesKilledThisRoom = 0;
            hasKey = false;
            exitDoorProgress = 0;
            
            player.x = 200; 
            player.y = ROOM_SIZE / 2;
            
            enemies.length = 0;
            bullets.length = 0;
            keys.length = 0;
            activeSplatter.length = 0;
            damageTexts.length = 0;
            floorSplatters.length = 0; // Clean the room
            deadEnemies.length = 0; // Remove corpses
            
            trapdoor.state = 'waiting';
            trapdoor.timer = 0;
            trapdoor.enemiesToSpawn = totalEnemiesThisRoom;
            trapdoor.delayTimer = 2.0; 
            trapdoor.openAngle = 0;
            
            roomTextTimer = 1.5;
            keyDroppedTimer = 0;
        }

        let shakeTime = 0;
        let shakeMag = 0;
        let currentShakeX = 0;
        let currentShakeY = 0;

        function triggerShake(magnitude, duration) {
            if (shakeMag < magnitude || shakeTime <= 0) {
                shakeMag = magnitude;
                shakeTime = duration;
            }
        }

        // --- INPUT MANAGEMENT ---
        const input = {
            left: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 },
            right: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0, lastTapTime: 0, doubleTapped: false }
        };

        const JOYSTICK_MAX_RADIUS = 60;

        function handleTouch(e) {
            if (e.target !== canvas) return;
            if (gameState !== 'playing') {
                input.left.active = false;
                input.right.active = false;
                return;
            }
            e.preventDefault();
            const halfWidth = width / 2;
            let leftFound = false;
            let rightFound = false;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.clientX < halfWidth) {
                    leftFound = true;
                    if (!input.left.active) {
                        input.left.active = true;
                        input.left.id = touch.identifier;
                        input.left.baseX = touch.clientX;
                        input.left.baseY = touch.clientY;
                    }
                    if (input.left.id === touch.identifier) {
                        input.left.currentX = touch.clientX;
                        input.left.currentY = touch.clientY;
                    }
                } else {
                    rightFound = true;
                    if (!input.right.active) {
                        const now = performance.now();
                        if (now - input.right.lastTapTime < 300) {
                            input.right.doubleTapped = true;
                            input.right.lastTapTime = 0; 
                        } else {
                            input.right.lastTapTime = now;
                        }

                        input.right.active = true;
                        input.right.id = touch.identifier;
                        input.right.baseX = touch.clientX;
                        input.right.baseY = touch.clientY;
                    }
                    if (input.right.id === touch.identifier) {
                        input.right.currentX = touch.clientX;
                        input.right.currentY = touch.clientY;
                    }
                }
            }

            if (!leftFound) input.left.active = false;
            if (!rightFound) input.right.active = false;

            ['left', 'right'].forEach(side => {
                const stick = input[side];
                if (stick.active) {
                    let dx = stick.currentX - stick.baseX;
                    let dy = stick.currentY - stick.baseY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > JOYSTICK_MAX_RADIUS) {
                        dx = (dx / dist) * JOYSTICK_MAX_RADIUS;
                        dy = (dy / dist) * JOYSTICK_MAX_RADIUS;
                        dist = JOYSTICK_MAX_RADIUS;
                        
                        stick.baseX = stick.currentX - dx;
                        stick.baseY = stick.currentY - dy;
                    }
                    
                    stick.vectorX = dx / JOYSTICK_MAX_RADIUS;
                    stick.vectorY = dy / JOYSTICK_MAX_RADIUS;
                    stick.magnitude = dist / JOYSTICK_MAX_RADIUS;
                } else {
                    stick.vectorX = 0;
                    stick.vectorY = 0;
                    stick.magnitude = 0;
                }
            });
        }

        window.addEventListener('touchstart', handleTouch, { passive: false });
        window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false });
        window.addEventListener('touchcancel', handleTouch, { passive: false });

        let mouseDown = false;
        window.addEventListener('mousedown', (e) => {
            if (e.target !== canvas) return;
            if (gameState === 'playing') {
                mouseDown = true;
                handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] });
            }
        });
        window.addEventListener('mousemove', (e) => {

        class Bullet {
            constructor(x, y, angle) {

        class CreepyLeg {
            constructor(offsetX, offsetY) {
                this.offsetX = offsetX;
                this.offsetY = offsetY;
                this.x = 0;
                this.y = 0;
                this.targetX = 0;
                this.targetY = 0;
                this.startX = 0;
                this.startY = 0;
                this.stepProgress = 1;
                this.initialized = false;
            }

            update(bodyX, bodyY, facingAngle, dt) {
                const idealX = bodyX + Math.cos(facingAngle) * this.offsetX - Math.sin(facingAngle) * this.offsetY;
                const idealY = bodyY + Math.sin(facingAngle) * this.offsetX + Math.cos(facingAngle) * this.offsetY;

                if (!this.initialized) {
                    this.x = idealX;
                    this.y = idealY;
                    this.initialized = true;
                }

                if (this.stepProgress >= 1) {
                    let dx = idealX - this.x;
                    let dy = idealY - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist > 25) {
                        this.stepProgress = 0;
                        this.startX = this.x;
                        this.startY = this.y;
                        this.targetX = idealX + Math.cos(facingAngle) * 15;
                        this.targetY = idealY + Math.sin(facingAngle) * 15;
                    }
                } else {
                    this.stepProgress += dt * 7; 
                    if (this.stepProgress >= 1) {
                        this.stepProgress = 1;
                        this.x = this.targetX;
                        this.y = this.targetY;
                    } else {
                        this.x = this.startX + (this.targetX - this.startX) * this.stepProgress;
                        this.y = this.startY + (this.targetY - this.startY) * this.stepProgress;
                    }
                }
            }
        }

        class Smiler {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15; 
                this.hp = 100;
                this.speed = 130; 
                this.facingAngle = 0;
                this.distToPlayer = 1000;
                
                this.isAttacking = false;
                this.attackTime = 0;
                this.attackCooldown = 0;
                
                this.legs = [
                    new CreepyLeg(12, -18),
                    new CreepyLeg(12, 18),
                    new CreepyLeg(-15, -18),
                    new CreepyLeg(-15, 18)
                ];
                
                this.drawX = x;
                this.drawY = y;
                this.drawAngle = 0;
            }

            update(dt, player, allEnemies) {
                let dx = player.x - this.x;
                let dy = player.y - this.y;
                this.distToPlayer = Math.sqrt(dx*dx + dy*dy);
                
                if (this.distToPlayer > 0) {
                    this.facingAngle = Math.atan2(dy, dx);
                    
                    let separationX = 0;
                    let separationY = 0;
                    for (let other of allEnemies) {
                        if (other !== this) {
                            let odx = this.x - other.x;
                            let ody = this.y - other.y;
                            let odist = Math.sqrt(odx*odx + ody*ody);
                            let minDist = this.radius + other.radius + 15; 
                            if (odist > 0 && odist < minDist) {
                                let push = (minDist - odist) / 2;
                                separationX += (odx / odist) * push * 5;
                                separationY += (ody / odist) * push * 5;
                            }
                        }
                    }

                    let forwardSpeed = 0;
                    if (this.distToPlayer > player.radius + 20) {
                        forwardSpeed = this.speed;
                    } else {
                        // Biting player! 10 dmg/sec
                        player.hp -= 10 * dt;
                        player.hurtTimer = 0.2; // Set hurt timer for flash effect
                        updateHUD();

                        if (this.attackCooldown <= 0) {
                            this.isAttacking = true;
                            this.attackTime = 0.3; 
                            this.attackCooldown = 1.0; 
                        }
                    }

                    if (this.attackCooldown > 0) this.attackCooldown -= dt;
                    if (this.isAttacking) {
                        this.attackTime -= dt;
                        if (this.attackTime <= 0) this.isAttacking = false;
                    }

                    this.x += (Math.cos(this.facingAngle) * forwardSpeed + separationX) * dt;
                    this.y += (Math.sin(this.facingAngle) * forwardSpeed + separationY) * dt;
                    
                    this.legs.forEach(leg => leg.update(this.x, this.y, this.facingAngle, dt));
                }
            }

            drawBody(ctx) {
                ctx.save();
                
                ctx.strokeStyle = '#000000'; 
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                this.legs.forEach(leg => {
                    ctx.beginPath();
                    let attachX = this.x + Math.cos(this.facingAngle) * (leg.offsetX*0.5) - Math.sin(this.facingAngle) * (leg.offsetY*0.5);
                    let attachY = this.y + Math.sin(this.facingAngle) * (leg.offsetX*0.5) + Math.cos(this.facingAngle) * (leg.offsetY*0.5);
                    
                    ctx.moveTo(attachX, attachY);
                    
                    let midX = (attachX + leg.x) / 2;
                    let midY = (attachY + leg.y) / 2;
                    
                    let stepLift = 0;
                    if (leg.stepProgress < 1) {
                        stepLift = Math.sin(leg.stepProgress * Math.PI) * 15;
                    }
                    
                    let perpX = -(leg.y - attachY);
                    let perpY = (leg.x - attachX);
                    let len = Math.sqrt(perpX*perpX + perpY*perpY);
                    if(len > 0) { perpX /= len; perpY /= len; }
                    
                    let kneeOutward = 12;
                    let sign = leg.offsetY < 0 ? -1 : 1; 
                    
                    let kneeX = midX + perpX * kneeOutward * sign;
                    let kneeY = midY + perpY * kneeOutward * sign - stepLift;

                    ctx.quadraticCurveTo(kneeX, kneeY, leg.x, leg.y);
                    ctx.stroke();
                });

                ctx.translate(this.x, this.y);
                ctx.rotate(this.facingAngle);
                
                ctx.fillStyle = '#030303';
                ctx.beginPath();
                ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2); 
                ctx.fill();
                
                this.drawX = this.x;
                this.drawY = this.y;
                this.drawAngle = this.facingAngle;

                ctx.restore();
            }

            drawSmile(ctx) {
                ctx.save();
                ctx.translate(this.drawX, this.drawY);
                ctx.rotate(this.drawAngle);
                
                let lungeOffset = 0;
                let attackOpenness = 0;
                
                if (this.isAttacking) {
                    let progress = 1 - (this.attackTime / 0.3); 
                    lungeOffset = Math.sin(progress * Math.PI) * 12; 
                    attackOpenness = Math.sin(progress * Math.PI) * 10; 
                }

                ctx.translate(18 + lungeOffset, 0); 
                
                let factor = 1 - Math.min(1, Math.max(0, (this.distToPlayer - 80) / 400));
                
                let smileWidth = 4 + factor * 4; 
                let smileHeight = 2 + factor * 3 + attackOpenness; 

                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 6 + factor * 4;
                ctx.fillStyle = '#ffffff';

                ctx.beginPath();
                ctx.moveTo(0, -smileWidth); 
                ctx.quadraticCurveTo(smileHeight, 0, 0, smileWidth); 
                ctx.quadraticCurveTo(smileHeight * 0.3, 0, 0, -smileWidth); 
                ctx.fill();

                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.lineJoin = 'miter';
                
                ctx.beginPath();
                ctx.moveTo(0, -smileWidth + 1);
                
                let isOuter = true;
                for (let y = -smileWidth + 2; y <= smileWidth - 1; y += 1.5) {
                    ctx.lineTo(isOuter ? smileHeight * 0.7 : smileHeight * 0.2, y);
                    isOuter = !isOuter;
                }
                ctx.stroke();
                
                ctx.restore();
            }
        }

        class Trapdoor {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 140;
                this.height = 100;
                this.state = 'waiting'; 
                this.timer = 0;
                this.enemiesToSpawn = totalEnemiesThisRoom; 
                this.delayTimer = 4.0; 
                this.openAngle = 0; 
            }

            update(dt) {
                if (this.state === 'waiting') {
                    this.delayTimer -= dt;
                    if (this.delayTimer <= 0 && this.enemiesToSpawn > 0) {
                        this.state = 'opening';
                        this.timer = 0.25; 
                        triggerShake(8, 0.2); 
                    }
                }
                else if (this.state === 'opening') {
                    this.openAngle = 1 - (this.timer / 0.25);
                    this.timer -= dt;
                    if (this.timer <= 0) {
                        this.openAngle = 1;
                        this.state = 'open';
                        this.timer = 0.3; 
                        
                        enemies.push(new Smiler(this.x, this.y));
                        this.enemiesToSpawn--;
                        
                        triggerShake(15, 0.3); 
                    }
                }
                else if (this.state === 'open') {
                    this.timer -= dt;
                    if (this.timer <= 0) {
                        this.state = 'closing';
                        this.timer = 0.2; 
                    }
                }
                else if (this.state === 'closing') {
                    this.openAngle = Math.max(0, this.timer / 0.2);
                    this.timer -= dt;
                    if (this.timer <= 0) {
                        this.openAngle = 0;
                        this.state = 'waiting';
                        this.delayTimer = Math.random() * 3.0 + 4.0; 
                        triggerShake(6, 0.15); 
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                ctx.fillStyle = '#2a2a30';
                ctx.strokeStyle = '#050505';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.roundRect(-this.width/2 - 10, -this.height/2 - 10, this.width + 20, this.height + 20, 8);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#020202';
                ctx.beginPath();
                ctx.roundRect(-this.width/2, -this.height/2, this.width, this.height, 4);
                ctx.fill();
                
                ctx.fillStyle = '#111';
                ctx.fillRect(-this.width/2, -this.height/2, this.width, 20);

                const scaleX = Math.cos(this.openAngle * (Math.PI / 2));
                const popUpHeight = Math.sin(this.openAngle * (Math.PI / 2)) * 50;

                const flapW = this.width / 2;
                const numPlanks = 4;
                const plankW = flapW / numPlanks;

                const drawTexturedFlap = (sign) => { 
                    ctx.save();
                    ctx.translate(sign * -flapW, -this.height/2); 
                    
                    for(let i = 0; i < numPlanks; i++) {
                        let startX = i * plankW * sign; 
                        let endX = (i + 1) * plankW * sign;
                        
                        let sStartX = startX * scaleX;
                        let sEndX = endX * scaleX;
                        
                        let startYOffset = (Math.abs(startX) / flapW) * popUpHeight;
                        let endYOffset = (Math.abs(endX) / flapW) * popUpHeight;
                        
                        ctx.beginPath();
                        ctx.moveTo(sStartX, -startYOffset);
                        ctx.lineTo(sStartX, this.height - startYOffset);
                        ctx.lineTo(sEndX, this.height - endYOffset);
                        ctx.lineTo(sEndX, -endYOffset);
                        ctx.closePath();
                        
                        let gradStartX = sign === 1 ? sStartX : sEndX;
                        let gradEndX = sign === 1 ? sEndX : sStartX;
                        let grad = ctx.createLinearGradient(gradStartX, 0, gradEndX, 0);
                        grad.addColorStop(0, '#22120a');
                        grad.addColorStop(0.5, '#402414');
                        grad.addColorStop(1, '#1a0d07');
                        
                        ctx.fillStyle = grad;
                        ctx.fill();
                        
                        ctx.strokeStyle = '#050505';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    const bandHeights = [15, this.height - 30];
                    const bandThickness = 12;
                    ctx.fillStyle = '#111113'; 
                    
                    bandHeights.forEach(yBase => {
                        ctx.beginPath();
                        ctx.moveTo(0, yBase);
                        ctx.lineTo(0, yBase + bandThickness);
                        ctx.lineTo(flapW * sign * scaleX, yBase + bandThickness - popUpHeight);
                        ctx.lineTo(flapW * sign * scaleX, yBase - popUpHeight);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        
                        ctx.fillStyle = '#555';
                        for(let i = 0; i < numPlanks; i++) {
                            let midX = (i + 0.5) * plankW * sign * scaleX;
                            let midYOffset = (Math.abs((i + 0.5) * plankW) / flapW) * popUpHeight;
                            let nailY = yBase + (bandThickness/2) - midYOffset;
                            
                            ctx.beginPath();
                            ctx.arc(midX, nailY, 2 * Math.max(0.3, scaleX), 0, Math.PI*2);
                            ctx.fill();
                        }
                        ctx.fillStyle = '#111113'; 
                    });

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, this.height);
                    ctx.lineTo(flapW * sign * scaleX, this.height - popUpHeight);
                    ctx.lineTo(flapW * sign * scaleX, -popUpHeight);
                    ctx.closePath();
                    ctx.strokeStyle = '#050505';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    
                    ctx.restore();
                };

                drawTexturedFlap(-1);
                drawTexturedFlap(1);

                ctx.restore();
            }
        }

        const trapdoor = new Trapdoor(ROOM_SIZE / 2, ROOM_SIZE / 2);

        class Torch {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.angle = angle; 
                this.timeOffset = Math.random() * 100;
            }

            update(dt) {
                this.timeOffset += dt * 15;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                ctx.save();
                ctx.rotate(this.angle);

                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 5;

                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.roundRect(-10, -12, 12, 24, 3);
                ctx.fill();

                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(-5, -3, 15, 6);

                const woodGrad = ctx.createLinearGradient(0, -6, 25, 6);
                woodGrad.addColorStop(0, '#2d1606');
                woodGrad.addColorStop(0.5, '#4a2511');
                woodGrad.addColorStop(1, '#1a0d04');
                ctx.fillStyle = woodGrad;
                ctx.beginPath();
                ctx.moveTo(5, -5);
                ctx.lineTo(25, -7);
                ctx.lineTo(25, 7);
                ctx.lineTo(5, 5);
                ctx.fill();
                
                ctx.restore(); 

                ctx.save();
                const poleEndX = Math.cos(this.angle) * 25;
                const poleEndY = Math.sin(this.angle) * 25;
                ctx.translate(poleEndX, poleEndY);

                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 5;

                const ironGrad = ctx.createLinearGradient(-8, -10, 8, 10);
                ironGrad.addColorStop(0, '#555');
                ironGrad.addColorStop(0.5, '#222');
                ironGrad.addColorStop(1, '#111');
                ctx.fillStyle = ironGrad;
                ctx.beginPath();
                ctx.moveTo(-10, -12);
                ctx.lineTo(10, -12);
                ctx.lineTo(6, 10);
                ctx.lineTo(-6, 10);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#ff5500';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.ellipse(0, -12, 8, 4, 0, 0, Math.PI*2);
                ctx.fill();

                ctx.shadowColor = 'transparent'; 
                
                const f1 = Math.sin(this.timeOffset * 2.0);
                const f2 = Math.cos(this.timeOffset * 1.5);
                const f3 = Math.sin(this.timeOffset * 3.1);

                function drawFlame(ctx, height, width, yOff, color, blurColor, blurAmt) {
                    ctx.shadowColor = blurColor;
                    ctx.shadowBlur = blurAmt;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(0, yOff);
                    ctx.bezierCurveTo(-width, yOff - height/3, -width/2 + f2*3, yOff - height + 5, f3*4, yOff - height - Math.abs(f1)*5);
                    ctx.bezierCurveTo(width/2 + f2*3, yOff - height + 5, width, yOff - height/3, 0, yOff);
                    ctx.fill();
                }

                for(let i = 0; i < 3; i++) {
                    const sparkY = -15 - ((this.timeOffset * 20 + i * 15) % 30);
                    const sparkX = Math.sin(this.timeOffset * 5 + i) * 6;
                    const alpha = Math.max(0, 1 - Math.abs(sparkY)/40); 
                    
                    ctx.shadowColor = '#ff9900';
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = `rgba(255, 200, 0, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(sparkX, sparkY - 12, 1.5, 0, Math.PI*2); 
                    ctx.fill();
                }

                drawFlame(ctx, 40, 14, -10, 'rgba(220, 40, 0, 0.8)', '#ff2200', 15); 
                drawFlame(ctx, 28, 9, -12, 'rgba(255, 140, 0, 0.9)', '#ff8800', 10); 
                drawFlame(ctx, 15, 4, -14, '#ffffff', 'transparent', 0);             

                ctx.restore();
                ctx.restore(); 
            }

            getLightRadius() {
                const flicker = Math.sin(this.timeOffset * 0.8) * 10 + Math.random() * 5;
                return 320 + flicker; 
            }
        }
