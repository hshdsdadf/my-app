<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Mobile Game</title>

    <!-- Import Three.js for high-quality procedural 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- THE CANVAS --- */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in; /* Smooth fade in when rotating */
        }

        /* --- ORIENTATION LOCK UI --- */
        #orientation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #ffffff;
            text-align: center;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #f8fafc;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            max-width: 80%;
            line-height: 1.5;
        }

        .device-icon { width: 120px; height: 120px; }

        @keyframes tiltPhone {
            0%, 15% { transform: rotate(0deg); }
            45%, 55% { transform: rotate(-90deg); }
            85%, 100% { transform: rotate(0deg); }
        }

        @keyframes pulseArrow {
            0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 2px #38bdf8); }
            50% { opacity: 1; filter: drop-shadow(0 0 10px #38bdf8); }
        }

        .phone-group {
            transform-origin: 50px 50px;
            animation: tiltPhone 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .arrow-group {
            animation: pulseArrow 1.5s ease-in-out infinite;
        }

        @media screen and (orientation: landscape) {
            #orientation-overlay { display: none; }
            #gameCanvas { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <svg class="device-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g class="arrow-group">
                <path d="M 20 60 A 35 35 0 0 1 80 60" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>
                <polygon points="85,55 80,68 73,56" fill="#38bdf8" />
            </g>
            <g class="phone-group">
                <rect x="32" y="20" width="36" height="60" rx="6" fill="#0f172a" stroke="#ffffff" stroke-width="3"/>
                <line x1="45" y1="26" x2="55" y2="26" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
                <circle cx="50" cy="73" r="2.5" fill="#cbd5e1"/>
            </g>
        </svg>
        <h1 class="title">Rotate Device</h1>
        <p class="subtitle">Please turn your device to landscape mode to play.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 3D ENGINE SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 15, 40); // Fades into deep shadow

        // Top-down / Side-view isometric-style camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const cameraBasePosition = new THREE.Vector3(0, 15, 18);
        camera.position.copy(cameraBasePosition);
        camera.lookAt(0, 0, 0);

        // Lighting to enhance realistic materials
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xcceeff, 1.5);
        spotLight.position.set(5, 30, 10);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.bias = -0.0001;
        scene.add(spotLight);

        // --- ENVIRONMENT ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        ground.position.y = -50; // Starts far below during the fall
        scene.add(ground);

        // --- CHARACTER RIGGING (Procedural Tactical Operative) ---
        // Materials matching the provided reference image (dark gear, armor plates, glossy visor)
        const suitMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const armorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });
        const skinMat = new THREE.MeshStandardMaterial({ color: 0x151515 }); // Gloves/boots
        const visorMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 0.9 });

        const charGroup = new THREE.Group();
        scene.add(charGroup);
        
        const pivot = new THREE.Group(); // Master control for whole body
        charGroup.add(pivot);

        // Helpers to build joints
        function createBone(width, height, depth, mat, yOffset) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), mat);
            mesh.position.y = yOffset;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            const group = new THREE.Group();
            group.add(mesh);
            return { mesh, group };
        }

        // Torso & Vest
        const torso = createBone(1.4, 2, 0.8, suitMat, 1);
        const vest = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.8, 1), armorMat);
        vest.position.y = 1;
        torso.group.add(vest);
        pivot.add(torso.group);
        torso.group.position.y = 2.4; // Hip height

        // Head & Helmet
        const headJoint = new THREE.Group();
        headJoint.position.y = 2.2;
        torso.group.add(headJoint);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), armorMat);
        head.position.y = 0.5;
        head.castShadow = true;
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.35, 0.4), visorMat);
        visor.position.set(0, 0.55, 0.35);
        head.add(visor);
        headJoint.add(head);

        // Limbs function
        function createLimb(parent, x, y, z, upperSize, lowerSize) {
            const upperJoint = new THREE.Group();
            upperJoint.position.set(x, y, z);
            parent.add(upperJoint);
            
            const upper = createBone(upperSize[0], upperSize[1], upperSize[2], suitMat, -upperSize[1]/2);
            upperJoint.add(upper.group);
            
            const lowerJoint = new THREE.Group();
            lowerJoint.position.y = -upperSize[1];
            upper.group.add(lowerJoint);
            
            const lower = createBone(lowerSize[0], lowerSize[1], lowerSize[2], skinMat, -lowerSize[1]/2);
            lowerJoint.add(lower.group);
            
            return { upper: upperJoint, lower: lowerJoint };
        }

        // Arms
        const armL = createLimb(torso.group, -1, 1.8, 0, [0.4, 1.2, 0.4], [0.35, 1.2, 0.35]);
        const armR = createLimb(torso.group, 1, 1.8, 0, [0.4, 1.2, 0.4], [0.35, 1.2, 0.35]);

        // Legs
        const legL = createLimb(pivot, -0.4, 2.4, 0, [0.5, 1.3, 0.5], [0.45, 1.3, 0.45]);
        const legR = createLimb(pivot, 0.4, 2.4, 0, [0.5, 1.3, 0.5], [0.45, 1.3, 0.45]);

        // --- EFFECTS ---
        // Wind speed lines for falling
        const windGeo = new THREE.CylinderGeometry(0.02, 0.02, 4, 4);
        const windMat = new THREE.MeshBasicMaterial({ color: 0x445566, transparent: true, opacity: 0.3 });
        const winds = [];
        for(let i=0; i<30; i++) {
            const w = new THREE.Mesh(windGeo, windMat);
            w.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*20, (Math.random()-0.5)*10);
            scene.add(w);
            winds.push(w);
        }

        // Dust explosion on impact
        const dustGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        const dustMat = new THREE.MeshStandardMaterial({ color: 0x333333, transparent: true, opacity: 0.8 });
        const dustParticles = [];
        for(let i=0; i<20; i++) {
            const d = new THREE.Mesh(dustGeo, dustMat);
            d.visible = false;
            scene.add(d);
            dustParticles.push({
                mesh: d, 
                vel: new THREE.Vector3((Math.random()-0.5)*15, Math.random()*5, (Math.random()-0.5)*15)
            });
        }

        // --- ANIMATION STATE ---
        const clock = new THREE.Clock();
        let gameState = 'waiting';
        let animStartTime = 0;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            renderer.setPixelRatio(dpr);
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        // Easing function for smooth realistic movement
        function easeInOutQuad(t) { return t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
        // Linear interpolation helper
        function lerp(start, end, amt) { return (1-amt)*start+amt*end; }

        // Core animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Check orientation to start sequence
            if (gameState === 'waiting' && window.innerWidth > window.innerHeight) {
                gameState = 'falling';
                animStartTime = clock.getElapsedTime();
            }

            const time = clock.getElapsedTime();
            const elapsed = time - animStartTime;

            // Camera shake variable
            let shake = new THREE.Vector3(0,0,0);

            if (gameState === 'falling') {
                if (elapsed < 4.0) {
                    // Falling Physics (0 to 4s)
                    const fallProgress = elapsed / 4.0;
                    
                    // Wind rushing up
                    winds.forEach(w => {
                        w.position.y += 0.5;
                        if(w.position.y > 10) w.position.y = -10;
                    });

                    // Character poses (Flailing slightly)
                    pivot.rotation.z = Math.sin(time * 15) * 0.05; // Turbulence wobble
                    pivot.rotation.x = Math.PI / 4; // Tilted forward in air
                    
                    // Arms flailing up
                    armL.upper.rotation.set(0, 0, 2.5 + Math.sin(time*10)*0.1);
                    armL.lower.rotation.set(0, 0, 0);
                    armR.upper.rotation.set(0, 0, -2.5 - Math.sin(time*12)*0.1);
                    armR.lower.rotation.set(0, 0, 0);
                    
                    // Legs bent for aerodynamics
                    legL.upper.rotation.set(-0.5, 0, 0);
                    legL.lower.rotation.set(0.5, 0, 0);
                    legR.upper.rotation.set(-0.6, 0, 0);
                    legR.lower.rotation.set(0.4, 0, 0);

                    // Ground rising dynamically right before impact
                    if (elapsed > 3.5) {
                        const approach = (elapsed - 3.5) / 0.5;
                        ground.position.y = lerp(-50, 0, approach * approach);
                    } else {
                        ground.position.y = -50;
                    }
                } 
                else if (elapsed >= 4.0 && elapsed < 4.1) {
                    // IMPACT!
                    gameState = 'impact';
                    ground.position.y = 0;
                    
                    // Hide wind
                    winds.forEach(w => w.visible = false);

                    // Trigger dust particles
                    dustParticles.forEach(d => {
                        d.mesh.visible = true;
                        d.mesh.position.set(0, 0, 0);
                        d.mesh.scale.set(1,1,1);
                    });
                }
            }
            
            else if (gameState === 'impact' || gameState === 'lying') {
                gameState = 'lying';
                
                // Camera shake decay
                const shakeIntensity = Math.max(0, 1 - (elapsed - 4.0) * 2);
                shake.set((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity, 0);

                // Update dust physics
                dustParticles.forEach(d => {
                    if(d.mesh.visible) {
                        d.mesh.position.addScaledVector(d.vel, 0.016);
                        d.mesh.scale.multiplyScalar(0.95); // shrink
                        if(d.mesh.scale.x < 0.01) d.mesh.visible = false;
                    }
                });

                // Character is slammed flat on the ground
                pivot.position.y = -2; // Adjust to floor level
                pivot.rotation.set(Math.PI / 2, 0, 0); // Face down flat
                
                // Limbs relaxed
                armL.upper.rotation.set(-1, 0, 1);
                armL.lower.rotation.set(0, 0, 0);
                armR.upper.rotation.set(-1, 0, -1);
                armR.lower.rotation.set(0, 0, 0);
                legL.upper.rotation.set(0, 0, 0.2);
                legL.lower.rotation.set(0, 0, 0);
                legR.upper.rotation.set(0, 0, -0.2);
                legR.lower.rotation.set(0, 0, 0);

                if (elapsed > 6.0) gameState = 'getting_up';
            }
            
            else if (gameState === 'getting_up') {
                // Procedural Stand Up (6.0s to 9.0s)
                const getUpTime = elapsed - 6.0;
                
                if (getUpTime < 1.0) {
                    // Phase 1: Push up with arms (6s - 7s)
                    const t = easeInOutQuad(getUpTime);
                    pivot.rotation.x = lerp(Math.PI / 2, Math.PI / 4, t); // Torso rises
                    
                    armL.upper.rotation.x = lerp(-1, 1, t); // Arms swing down to floor
                    armR.upper.rotation.x = lerp(-1, 1, t);
                    armL.upper.rotation.z = lerp(1, 0.5, t);
                    armR.upper.rotation.z = lerp(-1, -0.5, t);
                    armL.lower.rotation.x = lerp(0, -1, t);
                    armR.lower.rotation.x = lerp(0, -1, t);
                }
                else if (getUpTime < 2.0) {
                    // Phase 2: Kneel (7s - 8s)
                    const t = easeInOutQuad(getUpTime - 1.0);
                    pivot.rotation.x = lerp(Math.PI / 4, 0.2, t);
                    pivot.position.y = lerp(-2, -0.5, t);
                    
                    // Bring one knee up
                    legL.upper.rotation.x = lerp(0, -1.5, t);
                    legL.lower.rotation.x = lerp(0, 1.5, t);
                    legR.upper.rotation.x = lerp(0, -0.5, t);
                    legR.lower.rotation.x = lerp(0, 1.0, t);
                    
                    // Lift arms off floor
                    armL.upper.rotation.x = lerp(1, 0, t);
                    armR.upper.rotation.x = lerp(1, 0, t);
                    armL.lower.rotation.x = lerp(-1, -0.5, t);
                    armR.lower.rotation.x = lerp(-1, -0.5, t);
                }
                else if (getUpTime < 3.0) {
                    // Phase 3: Stand tall (8s - 9s)
                    const t = easeInOutQuad(getUpTime - 2.0);
                    pivot.rotation.x = lerp(0.2, 0, t);
                    pivot.position.y = lerp(-0.5, 0, t);
                    
                    legL.upper.rotation.x = lerp(-1.5, 0, t);
                    legL.lower.rotation.x = lerp(1.5, 0, t);
                    legR.upper.rotation.x = lerp(-0.5, 0, t);
                    legR.lower.rotation.x = lerp(1.0, 0, t);
                    
                    // Arms to idle combat pose
                    armL.upper.rotation.set(lerp(0, 0.2, t), 0, lerp(0.5, 0.3, t));
                    armR.upper.rotation.set(lerp(0, 0.2, t), 0, lerp(-0.5, -0.3, t));
                    armL.lower.rotation.x = lerp(-0.5, -0.2, t);
                    armR.lower.rotation.x = lerp(-0.5, -0.2, t);
                }
                else {
                    gameState = 'idle';
                }
            }
            
            else if (gameState === 'idle') {
                // Subtle breathing animation
                const breath = Math.sin(time * 2) * 0.05;
                torso.group.position.y = 2.4 + breath;
                armL.upper.rotation.z = 0.3 + breath;
                armR.upper.rotation.z = -0.3 - breath;
            }

            // Apply camera shake if any, then render
            camera.position.copy(cameraBasePosition).add(shake);
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
