<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egg Survivor">
    <title>Egg Survivor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050508; overflow: hidden;
            touch-action: none;
            font-family: 'Barlow', Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* --- PORTRAIT MODE WARNING --- */
        #orientation-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050508; color: #8b8e83; z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #orientation-warning h2 { margin-bottom: 10px; font-size: 24px; color: #e4e6d9; }
        #orientation-warning p { font-size: 18px; }

        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
            #gameCanvas, #ui-layer { display: none !important; }
        }

        /* --- UI & MENUS --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        /* HUD: Health Bar Only */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 12px 80px 12px 16px; 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 5px;
            pointer-events: none;
        }
        .bar-bg {
            width: 100%; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 3px; position: relative; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .bar-bg.vitals-bg { height: 14px; border-radius: 6px; max-width: 400px; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.15s ease-out; }
        .vitals-fill {
            background: linear-gradient(90deg, #5a0000 0%, #9d0208 50%, #d00000 80%, #ff2222 100%);
            box-shadow: 0 0 12px #aa0000, inset 0 1px 0 rgba(255,100,100,0.3);
        }
        .bar-label {
            position: absolute; top: 0; left: 8px; font-weight: 900; color: rgba(255,255,255,0.85);
            text-shadow: 1px 1px 2px black; letter-spacing: 2px;
            font-family: 'Barlow', Arial, sans-serif;
        }
        .vitals-label { font-size: 10px; line-height: 14px; }

        #pause-btn {
            position: absolute; top: 15px; right: 20px; width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; pointer-events: auto; cursor: pointer;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #pause-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        #pause-btn:active { transform: scale(0.95); }
        .pause-bar { width: 6px; height: 20px; background: white; margin: 0 3px; border-radius: 3px; }

        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 6, 0.88); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto; opacity: 1; transition: opacity 0.3s ease;
        }
        .menu-overlay.hidden, #pause-btn.hidden, #hud.hidden { opacity: 0; pointer-events: none; }

        .menu-box {
            background: rgba(12, 10, 10, 0.95); border: 1px solid rgba(255,255,255,0.08);
            border-top: 2px solid rgba(255,255,255,0.15); padding: 44px 52px; border-radius: 2px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.95), 0 0 0 1px rgba(0,0,0,0.5);
            transform: translateY(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; text-align: center; min-width: 340px;
        }
        .menu-overlay.hidden .menu-box { transform: translateY(20px); }

        .menu-overlay h2 {
            color: #ffffff; margin: 0 0 32px 0; font-family: 'Bebas Neue', sans-serif;
            font-size: 38px; font-weight: 400; letter-spacing: 6px;
            text-shadow: 0 2px 20px rgba(255,255,255,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 24px; width: 100%;
        }

        /* --- GAME OVER MENU --- */
        @keyframes glitch-title {
            0%, 88%, 100% { transform: none; opacity: 1; }
            89% { transform: translateX(-3px); opacity: 0.9; }
            91% { transform: translateX(3px); opacity: 1; }
            93% { transform: translateX(-1px); opacity: 0.95; }
            95% { transform: none; }
        }
        @keyframes bleed-in { 0% { opacity: 0; transform: translateY(-16px); } 100% { opacity: 1; transform: translateY(0); } }
        #gameover-menu { background: rgba(5, 2, 2, 0.97); overflow-y: auto; }
        #gameover-menu .menu-box {
            background: rgba(14, 8, 8, 0.98); border: 1px solid rgba(100, 0, 0, 0.3);
            border-top: 2px solid rgba(160, 0, 0, 0.55); padding: 28px 36px 24px; border-radius: 2px;
            box-shadow: 0 16px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(0,0,0,0.4);
            animation: bleed-in 0.5s ease-out forwards; min-width: unset; width: min(380px, 88vw);
        }
        .death-eyebrow {
            font-family: 'Barlow', Arial, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 5px;
            color: rgba(140, 20, 20, 0.9); text-transform: uppercase; margin-bottom: 10px;
        }
        .death-title {
            font-family: 'Bebas Neue', 'Arial Black', Arial, sans-serif; font-size: 30px; font-weight: 400; letter-spacing: 2px;
            color: #f0f0f0; text-shadow: 0 0 28px rgba(160,0,0,0.45), 0 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 20px; line-height: 1.15; animation: glitch-title 6s infinite;
        }
        .death-stats {
            width: 100%; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 0; margin-bottom: 20px;
        }
        .stat-row {
            display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0;
            font-family: 'Barlow', Arial, sans-serif; font-size: 13px; font-weight: 600;
        }
        .stat-row span:first-child { color: #666; letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
        .stat-row span:last-child { color: #ccc; font-size: 15px; font-weight: 700; }
        .stat-row.stat-score { margin-top: 10px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
        .stat-row.stat-score span:first-child { color: rgba(160,20,20,0.8); }
        .stat-row.stat-score span:last-child { color: #fff; font-size: 18px; }

        .menu-btn {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.14); color: #cccccc; padding: 15px 40px; margin: 6px;
            font-family: 'Barlow', Arial, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            border-radius: 2px; cursor: pointer; transition: all 0.18s; width: 280px;
        }
        .menu-btn.primary { border-color: rgba(200,30,30,0.6); color: #fff; background: rgba(140,0,0,0.25); text-shadow: 0 0 12px rgba(255,60,60,0.4); }
        .menu-btn:hover { background: rgba(160,10,10,0.4); color: #fff; border-color: rgba(220,40,40,0.8); box-shadow: 0 0 24px rgba(160,0,0,0.3); transform: scale(1.02); }
        .menu-btn:active { transform: scale(0.98); }

        .slider-container { width: 300px; margin: 12px 0; display: flex; flex-direction: column; align-items: stretch; }
        .slider-container label {
            color: #aaa; font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; justify-content: space-between;
            letter-spacing: 1px; text-transform: uppercase;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 2px; background: #ddd; cursor: pointer;
            margin-top: -7px; box-shadow: 0 0 8px rgba(255,255,255,0.3); transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; cursor: pointer; background: rgba(255,255,255,0.15); border-radius: 1px; }

        #countdown-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', 'Arial Black', Arial, sans-serif; font-size: 160px; font-weight: 400; color: white;
            text-shadow: 0 8px 40px rgba(0,0,0,0.9), 0 0 30px rgba(255,255,255,0.3); pointer-events: none; opacity: 0; letter-spacing: 8px;
        }

        /* --- AUDIO SETTINGS SECTION --- */
        .settings-section-title {
            width: 100%; text-align: left; color: rgba(255,255,255,0.35); font-size: 10px;
            font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            margin: 18px 0 10px 0; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.07);
        }
        .settings-section-title:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }
        .slider-container .slider-row {
            display: flex; align-items: center; gap: 10px;
        }
        .slider-container .slider-row input[type=range] { flex: 1; }
        .vol-icon { font-size: 16px; opacity: 0.55; min-width: 20px; text-align: center; }
        .slider-container.audio-slider label { color: rgba(180,170,170,0.8); }

        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 40% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
        .pop-anim { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <h2>Please tilt your phone the other way.</h2>
        <p>Rocktato plays in landscape.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay Layer -->
    <div id="ui-layer">
        
        <!-- HUD -->
        <div id="hud">
            <div class="bar-bg vitals-bg">
                <div id="vitals-bar" class="bar-fill vitals-fill" style="width: 100%;"></div>
                <div class="bar-label vitals-label">VITALS</div>
            </div>
        </div>

        <button id="pause-btn" onclick="ensureAudio(); setGameState('paused')">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
        </button>

        <!-- Pause Menu -->
        <div id="pause-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <h2>PAUSED</h2>
                <button class="menu-btn primary" onclick="startCountdown()">Resume</button>
                <button class="menu-btn" onclick="setGameState('settings')">Settings</button>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="settings-menu" class="menu-overlay hidden">
            <div class="menu-box" style="min-width:360px; max-height:85vh; overflow-y:auto;">
                <h2>SETTINGS</h2>

                <div class="settings-section-title">🎮 Display</div>
                <div class="slider-container">
                    <label>Brightness <span id="val-brightness">55%</span></label>
                    <input type="range" id="set-brightness" min="10" max="75" value="55" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Camera Zoom <span id="val-zoom">100%</span></label>
                    <input type="range" id="set-zoom" min="80" max="150" value="100" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Screen Shake <span id="val-shake">100%</span></label>
                    <input type="range" id="set-shake" min="0" max="200" value="100" oninput="updateSettingsUI()">
                </div>

                <div class="settings-section-title">🔊 Audio</div>
                <div class="slider-container audio-slider">
                    <label>Master Volume <span id="val-master">80%</span></label>
                    <input type="range" id="set-master" min="0" max="100" value="80" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Background Noise <span id="val-bgm">70%</span></label>
                    <input type="range" id="set-bgm" min="0" max="100" value="70" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Sound Effects <span id="val-sfx">100%</span></label>
                    <input type="range" id="set-sfx" min="0" max="100" value="100" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Ambient Reverb <span id="val-reverb">40%</span></label>
                    <input type="range" id="set-reverb" min="0" max="100" value="40" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Low Pass Filter <span id="val-lowpass">100%</span></label>
                    <input type="range" id="set-lowpass" min="20" max="100" value="100" oninput="updateAudioUI()">
                </div>

                <button class="menu-btn primary" style="margin-top: 20px;" onclick="setGameState('paused')">Back</button>
            </div>
        </div>

        <!-- Game Over Menu -->
        <div id="gameover-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <div class="death-eyebrow">— You Died —</div>
                <div id="death-title" class="death-title"></div>
                <div class="death-stats">
                    <div class="stat-row"><span>Kills</span><span id="ds-kills">—</span></div>
                    <div class="stat-row"><span>Time Alive</span><span id="ds-time">—</span></div>
                    <div class="stat-row stat-score"><span>Score</span><span id="ds-score">—</span></div>
                </div>
                <button class="menu-btn primary" onclick="restartRun()">Restart Run</button>
            </div>
        </div>

        <div id="countdown-display"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        const lightCanvas = document.createElement('canvas');
        const lightCtx = lightCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            lightCanvas.width = width; lightCanvas.height = height;
        }
        window.addEventListener('resize', resize); resize();

        // --- GLOBAL STATE & SETTINGS ---
        let gameState = 'playing'; // playing, paused, settings, countdown, gameover
        let countdownValue = 0; let countdownTimer = 0;

        let totalKills = 0; let timeAlive = 0; let deathParticles = [];

        const settings = { brightness: 0.55, zoom: 1.0, shake: 1.0 };

        // ─── AUDIO ENGINE (mobile-safe) ──────────────────────────────────────────
        const audioSettings = { master: 0.8, bgm: 0.7, sfx: 1.0, reverb: 0.4, lowpass: 1.0 };
        let audioCtx = null;
        let bgmMediaSrc = null;
        let masterGainNode = null;
        let bgmGainNode = null;
        let lowpassNode = null;
        let reverbGain = null;
        let reverbNode = null;
        let audioInitialized = false;

        // ─── GUN SFX BUFFER ────────────────────────────────────────────────────
        const GUN_B64 = '';
        let gunSfxBuffer = null;
        let sfxGainNode = null;

        async function loadGunSfx() {
            if (!audioCtx || gunSfxBuffer) return;
            try {
                function b64ToAb(b64) {
                    const bin = atob(b64); const buf = new ArrayBuffer(bin.length);
                    const v = new Uint8Array(buf); for (let i = 0; i < bin.length; i++) v[i] = bin.charCodeAt(i); return buf;
                }
                gunSfxBuffer = await audioCtx.decodeAudioData(b64ToAb(GUN_B64));
            } catch(e) { console.warn('Gun SFX decode failed:', e); }
        }

        function playGunShot() {
            if (!audioCtx || !gunSfxBuffer) return;
            const src = audioCtx.createBufferSource();
            src.buffer = gunSfxBuffer;
            if (!sfxGainNode) {
                sfxGainNode = audioCtx.createGain();
                sfxGainNode.gain.value = audioSettings.sfx * audioSettings.master;
                sfxGainNode.connect(audioCtx.destination);
            }
            // Slight random pitch variation for realism on rapid fire
            src.playbackRate.value = 0.95 + Math.random() * 0.1;
            src.connect(sfxGainNode);
            src.start();
        }
        // ─────────────────────────────────────────────────────────────────────

        // Inject hidden <audio> element for BGM (most reliable on iOS PWA)
        const bgmAudio = document.createElement('audio');
        bgmAudio.id = 'bgm-audio';
        bgmAudio.loop = true;
        bgmAudio.preload = 'auto';
        bgmAudio.volume = 1; // gain controlled by Web Audio
        bgmAudio.src = 'data:audio/';
        bgmAudio.style.display = 'none';
        document.body.appendChild(bgmAudio);

        function initAudioContext() {
            if (audioCtx) {
                if (sfxGainNode) sfxGainNode.gain.setTargetAtTime(audioSettings.sfx * audioSettings.master, audioCtx.currentTime, 0.02); if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                // Build graph: bgmAudio -> bgmGain -> lowpass -> master -> destination
                //                                  -> reverb  -> reverbGain -> master
                bgmMediaSrc  = audioCtx.createMediaElementSource(bgmAudio);

                bgmGainNode  = audioCtx.createGain();
                bgmGainNode.gain.value = audioSettings.bgm;

                lowpassNode  = audioCtx.createBiquadFilter();
                lowpassNode.type = 'lowpass';
                lowpassNode.frequency.value = 20000;

                masterGainNode = audioCtx.createGain();
                masterGainNode.gain.value = audioSettings.master;

                // Synthetic reverb IR
                reverbNode = audioCtx.createConvolver();
                const sr = audioCtx.sampleRate;
                const irLen = sr * 2;
                const irBuf = audioCtx.createBuffer(2, irLen, sr);
                for (let c = 0; c < 2; c++) {
                    const d = irBuf.getChannelData(c);
                    for (let i = 0; i < irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/irLen, 3.0);
                }
                reverbNode.buffer = irBuf;

                reverbGain = audioCtx.createGain();
                reverbGain.gain.value = audioSettings.reverb * 0.5;

                // Wire up
                bgmMediaSrc.connect(bgmGainNode);
                bgmGainNode.connect(lowpassNode);
                lowpassNode.connect(masterGainNode);
                bgmGainNode.connect(reverbNode);
                reverbNode.connect(reverbGain);
                reverbGain.connect(masterGainNode);
                masterGainNode.connect(audioCtx.destination);

                audioInitialized = true;
                loadGunSfx(); // decode gun SFX now that context exists
            } catch(err) {
                console.warn('AudioContext init failed:', err);
            }
        }

        function startBGM() {
            initAudioContext();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            bgmAudio.play().catch(e => console.warn('BGM play failed:', e));
        }

        function updateAudioUI() {
            const m  = parseInt(document.getElementById('set-master').value);
            const b  = parseInt(document.getElementById('set-bgm').value);
            const s  = parseInt(document.getElementById('set-sfx').value);
            const r  = parseInt(document.getElementById('set-reverb').value);
            const lp = parseInt(document.getElementById('set-lowpass').value);

            document.getElementById('val-master').innerText  = m  + '%';
            document.getElementById('val-bgm').innerText     = b  + '%';
            document.getElementById('val-sfx').innerText     = s  + '%';
            document.getElementById('val-reverb').innerText  = r  + '%';
            document.getElementById('val-lowpass').innerText = lp + '%';

            audioSettings.master  = m  / 100;
            audioSettings.bgm     = b  / 100;
            audioSettings.sfx     = s  / 100;
            audioSettings.reverb  = r  / 100;
            audioSettings.lowpass = lp / 100;

            if (audioCtx) {
                const t = audioCtx.currentTime;
                masterGainNode.gain.setTargetAtTime(audioSettings.master,  t, 0.05);
                bgmGainNode.gain.setTargetAtTime(audioSettings.bgm,        t, 0.05);
                reverbGain.gain.setTargetAtTime(audioSettings.reverb*0.5,  t, 0.05);
                // Lowpass: 20% -> 500hz (muffled), 100% -> 20000hz (open)
                const freq = 500 + audioSettings.lowpass * 19500;
                lowpassNode.frequency.setTargetAtTime(freq, t, 0.1);
            } else {
                // Fallback: no AudioContext yet, just set HTML element volume
                bgmAudio.volume = audioSettings.master * audioSettings.bgm;
            }
        }

        // Single entry point called on EVERY user gesture
        function ensureAudio() {
            if (!audioInitialized) {
                startBGM();
            } else {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                if (bgmAudio.paused) bgmAudio.play().catch(()=>{});
            }
        }
        // ─────────────────────────────────────────────────────────────────────


        function updateSettingsUI() {
            const b = document.getElementById('set-brightness').value; const z = document.getElementById('set-zoom').value; const s = document.getElementById('set-shake').value;
            document.getElementById('val-brightness').innerText = b + "%"; document.getElementById('val-zoom').innerText = z + "%"; document.getElementById('val-shake').innerText = s + "%";
            settings.brightness = parseInt(b) / 100; settings.zoom = parseInt(z) / 100; settings.shake = parseInt(s) / 100;
        }

        function setGameState(state) {
            gameState = state;
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.add('hidden');
            document.getElementById('gameover-menu').classList.add('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            if (state === 'playing') {
                document.getElementById('pause-btn').classList.remove('hidden');
                input.left.active = false; input.right.active = false;
            } else if (state === 'paused') { document.getElementById('pause-menu').classList.remove('hidden');
            } else if (state === 'settings') { document.getElementById('settings-menu').classList.remove('hidden');
            } else if (state === 'gameover') { document.getElementById('gameover-menu').classList.remove('hidden'); document.getElementById('hud').classList.add('hidden'); runGameOverSequence(); }
        }

        function updateHUD() {
            const hpPercent = Math.max(0, (player.hp / player.maxHp) * 100);
            document.getElementById('vitals-bar').style.width = `${hpPercent}%`;
        }

        function runGameOverSequence() {

        function restartRun() { ensureAudio();
            player.hp = player.maxHp = 100;
            player.x = ROOM_SIZE / 2; player.y = ROOM_SIZE / 2;
            generator.x = GENERATOR_START_X; generator.y = GENERATOR_START_Y; generator.vx = 0; generator.vy = 0; generator.pushJolt = 0; generator.blockedPulse = 0;
            timeAlive = 0; totalKills = 0;

        function startCountdown() { ensureAudio(); setGameState('countdown'); countdownValue = 3; countdownTimer = 0.5; triggerCountdownAnim(countdownValue); }
        function triggerCountdownAnim(text) { const el = document.getElementById('countdown-display'); el.innerText = text; el.classList.remove('pop-anim'); void el.offsetWidth; el.classList.add('pop-anim'); }

        let shakeTime = 0; let shakeMag = 0; let currentShakeX = 0; let currentShakeY = 0;
        function triggerShake(magnitude, duration) { if (shakeMag < magnitude || shakeTime <= 0) { shakeMag = magnitude; shakeTime = duration; } }

        // --- INPUT MANAGEMENT ---
        const input = { left: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 }, right: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0, lastTapTime: 0, doubleTapped: false } };
        const JOYSTICK_MAX_RADIUS = 60;

        function handleTouch(e) {
            if (e.target !== canvas) return;
            if (gameState !== 'playing') { input.left.active = false; input.right.active = false; return; }
            e.preventDefault(); const halfWidth = width / 2; let leftFound = false; let rightFound = false;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.clientX < halfWidth) {
                    leftFound = true;
                    if (!input.left.active) { input.left.active = true; input.left.id = touch.identifier; input.left.baseX = touch.clientX; input.left.baseY = touch.clientY; }
                    if (input.left.id === touch.identifier) { input.left.currentX = touch.clientX; input.left.currentY = touch.clientY; }
                } else {
                    rightFound = true;
                    if (!input.right.active) {
                        const now = performance.now();
                        if (now - input.right.lastTapTime < 300) { input.right.doubleTapped = true; input.right.lastTapTime = 0; } else { input.right.lastTapTime = now; }
                        input.right.active = true; input.right.id = touch.identifier; input.right.baseX = touch.clientX; input.right.baseY = touch.clientY;
                    }
                    if (input.right.id === touch.identifier) { input.right.currentX = touch.clientX; input.right.currentY = touch.clientY; }
                }
            }
            if (!leftFound) input.left.active = false; if (!rightFound) input.right.active = false;

            ['left', 'right'].forEach(side => {
                const stick = input[side];
                if (stick.active) {
                    let dx = stick.currentX - stick.baseX; let dy = stick.currentY - stick.baseY; let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > JOYSTICK_MAX_RADIUS) { dx = (dx / dist) * JOYSTICK_MAX_RADIUS; dy = (dy / dist) * JOYSTICK_MAX_RADIUS; dist = JOYSTICK_MAX_RADIUS; stick.baseX = stick.currentX - dx; stick.baseY = stick.currentY - dy; }
                    stick.vectorX = dx / JOYSTICK_MAX_RADIUS; stick.vectorY = dy / JOYSTICK_MAX_RADIUS; stick.magnitude = dist / JOYSTICK_MAX_RADIUS;
                } else { stick.vectorX = 0; stick.vectorY = 0; stick.magnitude = 0; }
            });
        }
        window.addEventListener('touchstart', (e) => { ensureAudio(); }, { once: true, passive: true });
        window.addEventListener('touchstart', handleTouch, { passive: false }); window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false }); window.addEventListener('touchcancel', handleTouch, { passive: false });
        let mouseDown = false;
        window.addEventListener('mousedown', (e) => { if (e.target !== canvas) return; if (gameState === 'playing') { mouseDown = true; handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] }); } });
        window.addEventListener('mousemove', (e) => { if (mouseDown && gameState === 'playing') handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] }); });
        window.addEventListener('mouseup', (e) => { mouseDown = false; if (gameState === 'playing') handleTouch({ preventDefault: ()=>{}, touches: [] }); });

        // --- GAME OBJECTS ---
        const ROOM_SIZE = 1200;

        const bullets = []; const enemyBullets = []; const enemies = []; const deadEnemies = [];
        const shellCasings = []; // brass shell casings ejected when firing

        function spawnShellCasing(x, y, facingAngle, isLeftGun) {
            // Eject perpendicular to barrel — left gun ejects right, right gun ejects left
            const ejectSide = isLeftGun ? 1 : -1;
            const ejectAngle = facingAngle + (Math.PI / 2) * ejectSide;

            // Also kick slightly backward
            const backAngle = facingAngle + Math.PI;
            shellCasings.push({
                x, y,
                vx: Math.cos(ejectAngle) * ejectSpeed + Math.cos(backAngle) * 20,
                vy: Math.sin(ejectAngle) * ejectSpeed + Math.sin(backAngle) * 20,
                z: 2,           // start slightly above ground
                vz: 90 + Math.random() * 60,  // upward kick
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 18,
                bounces: 0,
                maxBounces: 2 + Math.floor(Math.random() * 2),
                atRest: false,
                restTimer: 0,
                restDelay: 3.0, // seconds still before fade

                fading: false,
                alpha: 1.0,

        // --- GRINDER ---
        const GRINDER_X = ROOM_SIZE / 2;
        const GRINDER_Y = ROOM_SIZE / 2;
        const GRINDER_OUTER_R = 110;   // outer concrete rim
        const GRINDER_PIT_R   = 80;    // dark cylinder pit
        const GRINDER_BLADE_R = 72;    // blade sweep radius
        const GRINDER_DAMAGE_R = 90;   // kill zone
        let grinderAngle = 0;
        let grinderBloodPool = 0;      // grows 0→1 as players die nearby (cosmetic only here)
        const grinderBloodSplatters = [];

        // --- GENERATOR PROP ---
        const GENERATOR_W = 170;
        const GENERATOR_H = 96;
        const GENERATOR_ANGLE = -0.08;
        const GENERATOR_START_X = 210;
        const GENERATOR_START_Y = 805;
        const GENERATOR_RADIUS = 86;
        const GENERATOR_PUSH_SPEED = 58;
        const GENERATOR_GRINDER_CLEARANCE = GRINDER_OUTER_R + GENERATOR_RADIUS + 34;
        const generator = {
            x: GENERATOR_START_X,
            y: GENERATOR_START_Y,
            vx: 0,
            vy: 0,
            pushJolt: 0,
            blockedPulse: 0
        };
        let generatorFanAngle = 0;
        let generatorFlywheelAngle = 0;

        // Pre-generate blood pool — irregular splat polygons that look like pooled blood
        // Each splat is a polygon with randomised radii, drawn as a flat dark pool
        function makeSplatPolygon(cx, cy, avgR, points, roughness) {
            const pts = [];
            for (let i = 0; i < points; i++) {
                const a = (i / points) * Math.PI * 2;
                const r = avgR * (1 - roughness * 0.5 + Math.random() * roughness);
                pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
            }
            return pts;
        }

        // Main central pool — large irregular blob sitting on the rim
        const grinderMainPool = makeSplatPolygon(8, 12, GRINDER_OUTER_R * 0.82, 32, 0.38);

        // Several secondary splat pools around the rim
        const grinderSplatPools = [];
        for (let i = 0; i < 9; i++) {
            const a   = (i / 9) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
            const d   = GRINDER_OUTER_R * (0.7 + Math.random() * 0.5);
            const r   = 18 + Math.random() * 38;
            const pts = makeSplatPolygon(Math.cos(a) * d, Math.sin(a) * d, r, 18, 0.5);
            grinderSplatPools.push({ pts, alpha: 0.55 + Math.random() * 0.35 });
        }

        // Small dots / drips scattered further out
        const grinderDrips = [];
        for (let i = 0; i < 40; i++) {
            const a = Math.random() * Math.PI * 2;
            const d = GRINDER_OUTER_R * (0.6 + Math.random() * 0.9);
            grinderDrips.push({
                x: Math.cos(a) * d, y: Math.sin(a) * d,
                r: 2 + Math.random() * 9,
                alpha: 0.4 + Math.random() * 0.5,
                elongate: 0.3 + Math.random() * 1.4, // stretch in radial direction
                angle: a,
            });
        }

        function drawGrinder(ctx, time) {
            const cx = GRINDER_X, cy = GRINDER_Y;

            ctx.save();
            ctx.translate(cx, cy);

            // ── 1. OUTER CONCRETE RIM ──────────────────────────────────────
            const rimGrad = ctx.createRadialGradient(0, 0, GRINDER_PIT_R - 4, 0, 0, GRINDER_OUTER_R + 12);
            rimGrad.addColorStop(0,   'rgba(18,14,14,1)');
            rimGrad.addColorStop(0.25,'rgba(38,32,30,1)');
            rimGrad.addColorStop(0.55,'rgba(50,44,42,1)');
            rimGrad.addColorStop(0.75,'rgba(62,56,54,1)');
            rimGrad.addColorStop(1,   'rgba(38,34,32,1)');
            ctx.fillStyle = rimGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_OUTER_R + 12, 0, Math.PI * 2); ctx.fill();

            // Rim edge highlight / bevel
            ctx.strokeStyle = 'rgba(90,82,78,0.7)';
            ctx.lineWidth = 3.5;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_OUTER_R + 12, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = 'rgba(20,16,14,0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_OUTER_R + 6, 0, Math.PI * 2); ctx.stroke();

            // Concentric wear rings on concrete
            for (let r = 0; r < 3; r++) {
                const rr = GRINDER_PIT_R + 8 + r * 12;
                ctx.strokeStyle = `rgba(0,0,0,${0.18 + r * 0.06})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI * 2); ctx.stroke();
            }

            // ── 2. BLOOD POOL ──────────────────────────────────────────────
            // Helper to draw a polygon path from a point array
            function drawPoly(pts) {
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                ctx.closePath();
            }

            // Small drips / satellite drops first (bottom layer)
            grinderDrips.forEach(d => {
                ctx.save();
                ctx.globalAlpha = d.alpha;
                ctx.translate(d.x, d.y);
                ctx.rotate(d.angle);
                ctx.scale(1, d.elongate);
                ctx.fillStyle = '#1a0000';
                ctx.beginPath(); ctx.arc(0, 0, d.r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // Secondary splat pools
            grinderSplatPools.forEach(s => {
                ctx.save();
                ctx.globalAlpha = s.alpha;
                drawPoly(s.pts);
                // Flat dark blood colour — no gradient, just a solid very dark red
                ctx.fillStyle = '#1c0101';
                ctx.fill();
                // Thin sheen highlight on edge (pooled blood has a slight wet sheen)
                ctx.strokeStyle = 'rgba(60,5,5,0.35)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            });

            // Main central pool
            ctx.save();
            ctx.globalAlpha = 0.92;
            drawPoly(grinderMainPool);
            ctx.fillStyle = '#130000';
            ctx.fill();
            // Wet sheen — radial highlight offset up-left like a light source
            const sheenG = ctx.createRadialGradient(-18, -22, 4, 0, 0, GRINDER_OUTER_R * 0.78);
            sheenG.addColorStop(0,   'rgba(90,12,8,0.28)');
            sheenG.addColorStop(0.4, 'rgba(55,5,4,0.12)');
            sheenG.addColorStop(1,   'rgba(20,0,0,0)');
            ctx.fillStyle = sheenG;
            ctx.fill(); // reuses the same clipped path? No — re-draw
            drawPoly(grinderMainPool);
            ctx.fillStyle = sheenG;
            ctx.fill();
            ctx.restore();

            ctx.globalAlpha = 1;

            // ── 3. PIT / VOID ──────────────────────────────────────────────
            // Deep dark inner cylinder
            const pitGrad = ctx.createRadialGradient(-8, -10, 5, 0, 0, GRINDER_PIT_R);
            pitGrad.addColorStop(0,    'rgba(6,4,4,1)');
            pitGrad.addColorStop(0.4,  'rgba(4,2,2,1)');
            pitGrad.addColorStop(0.75, 'rgba(2,0,0,1)');
            pitGrad.addColorStop(1,    'rgba(0,0,0,1)');
            ctx.fillStyle = pitGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.fill();

            // Pit rim — inner bevel highlight
            const pitRimGrad = ctx.createLinearGradient(-GRINDER_PIT_R, -GRINDER_PIT_R, GRINDER_PIT_R, GRINDER_PIT_R);
            pitRimGrad.addColorStop(0,   'rgba(80,68,64,0.9)');
            pitRimGrad.addColorStop(0.45,'rgba(50,42,40,0.5)');
            pitRimGrad.addColorStop(1,   'rgba(20,16,14,0.4)');
            ctx.strokeStyle = pitRimGrad;
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.stroke();

            // Blood coating inside pit walls
            const pitBloodGrad = ctx.createRadialGradient(0, 0, GRINDER_PIT_R * 0.72, 0, 0, GRINDER_PIT_R);
            pitBloodGrad.addColorStop(0,   'rgba(0,0,0,0)');
            pitBloodGrad.addColorStop(0.6, 'rgba(50,2,2,0.4)');
            pitBloodGrad.addColorStop(1,   'rgba(70,4,4,0.7)');
            ctx.fillStyle = pitBloodGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.fill();

            // ── 4. SPINNING BLADES ─────────────────────────────────────────
            ctx.save();
            ctx.rotate(grinderAngle);
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 14;
            ctx.shadowOffsetY = 6;

            const numBlades = 8;
            for (let i = 0; i < numBlades; i++) {
                const bAngle = (i / numBlades) * Math.PI * 2;
                ctx.save();
                ctx.rotate(bAngle);

                // Blade shape — thick at hub, tapered at tip, slight sweep
                const hubR = 10;
                const tipR = GRINDER_BLADE_R;

                ctx.beginPath();
                // Left edge (trailing)
                ctx.moveTo(hubR * 0.6, -5);
                // Sweep curve to tip
                ctx.bezierCurveTo(tipR * 0.3, -10, tipR * 0.7, -8, tipR, -3);
                // Tip round
                ctx.arc(tipR, 0, 3, -Math.PI * 0.5, Math.PI * 0.5);
                // Right edge (leading) back to hub
                ctx.bezierCurveTo(tipR * 0.7, 6, tipR * 0.3, 7, hubR * 0.6, 5);
                ctx.closePath();

                const bladeGrad = ctx.createLinearGradient(0, -8, 0, 8);
                bladeGrad.addColorStop(0,   '#7a7068');
                bladeGrad.addColorStop(0.3, '#5a5048');
                bladeGrad.addColorStop(0.6, '#3e3830');
                bladeGrad.addColorStop(1,   '#2a2420');
                ctx.fillStyle = bladeGrad;
                ctx.fill();

                // Blood stain on blade
                ctx.fillStyle = 'rgba(80,4,4,0.55)';
                ctx.beginPath();
                ctx.moveTo(hubR * 0.7, -3);
                ctx.bezierCurveTo(tipR * 0.35, -6, tipR * 0.6, -5, tipR * 0.9, -1);
                ctx.bezierCurveTo(tipR * 0.6, 3, tipR * 0.35, 4, hubR * 0.7, 3);
                ctx.closePath();
                ctx.fill();

                // Blade edge gleam
                ctx.strokeStyle = 'rgba(160,148,140,0.6)';
                ctx.lineWidth = 1.2;
                ctx.shadowColor = 'rgba(200,190,185,0.25)';
                ctx.shadowBlur = 3;
                ctx.beginPath();
                ctx.moveTo(hubR * 0.6, -5);
                ctx.bezierCurveTo(tipR * 0.3, -10, tipR * 0.7, -8, tipR, -3);
                ctx.stroke();

                ctx.restore();
            }

            // Center hub
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 3;
            const hubGrad = ctx.createRadialGradient(-3, -3, 1, 0, 0, 12);
            hubGrad.addColorStop(0,   '#888070');
            hubGrad.addColorStop(0.5, '#555048');
            hubGrad.addColorStop(1,   '#1c1814');
            ctx.fillStyle = hubGrad;
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();

            // Hub blood smear
            ctx.fillStyle = 'rgba(90,5,5,0.6)';
            ctx.beginPath(); ctx.arc(2, 1, 7, 0, Math.PI * 2); ctx.fill();

            // Hub bolt
            ctx.fillStyle = '#2a2420';
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(100,92,85,0.7)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore(); // end blade rotation

            // ── 5. MOTION BLUR ARCS (speed illusion) ──────────────────────
            // Draw several concentric blur rings at different radii for depth
            const blurRadii = [GRINDER_BLADE_R * 0.38, GRINDER_BLADE_R * 0.62, GRINDER_BLADE_R * 0.88];
            for (let ri = 0; ri < blurRadii.length; ri++) {
                const br = blurRadii[ri];
                for (let i = 0; i < numBlades; i++) {
                    const trailAngle = grinderAngle + (i / numBlades) * Math.PI * 2;
                    const trailLen   = Math.PI / numBlades * 1.6; // longer sweep = faster feel
                    ctx.save();
                    ctx.globalAlpha = 0.13 - ri * 0.03;
                    ctx.strokeStyle = '#9a8e84';
                    ctx.lineWidth = 3 - ri * 0.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, br, trailAngle - trailLen, trailAngle);
                    ctx.stroke();
                    ctx.restore();
                }
            }
            // Extra full-circle silver streak — like a continuous blur disc at speed
            ctx.save();
            ctx.globalAlpha = 0.06;
            ctx.strokeStyle = '#b0a898';
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_BLADE_R * 0.75, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();

            // ── 6. DEPTH SHADOW inside pit (makes it look deep) ───────────
            const depthGrad = ctx.createRadialGradient(12, 14, 0, 0, 0, GRINDER_PIT_R * 0.9);
            depthGrad.addColorStop(0, 'rgba(0,0,0,0)');
            depthGrad.addColorStop(0.5,'rgba(0,0,0,0.15)');
            depthGrad.addColorStop(1, 'rgba(0,0,0,0.75)');
            ctx.fillStyle = depthGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.fill();

            // ── 7. AMBIENT GLOW from pit (faint red heat) ─────────────────
            const glowGrad = ctx.createRadialGradient(0, 0, GRINDER_PIT_R * 0.7, 0, 0, GRINDER_PIT_R * 1.05);
            glowGrad.addColorStop(0,   'rgba(100,8,4,0)');
            glowGrad.addColorStop(0.5, 'rgba(80,5,3,0.06)');
            glowGrad.addColorStop(1,   'rgba(60,3,1,0.18)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R * 1.05, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        function drawGenerator(ctx, time) {
            const pulse = 0.65 + Math.sin(time * 7.5) * 0.25;
            const fanBlur = 0.18 + pulse * 0.08;

            ctx.save();
            ctx.translate(generator.x, generator.y);
            const shoveRattle = generator.pushJolt * 1.4;
            ctx.translate((Math.random() - 0.5) * shoveRattle, (Math.random() - 0.5) * shoveRattle);
            ctx.rotate(GENERATOR_ANGLE);

            // Weighty cast shadows; the object should feel bolted to the floor.
            ctx.save();
            ctx.globalAlpha = 0.95;
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.shadowColor = 'rgba(0,0,0,0.95)';
            ctx.shadowBlur = 42;
            ctx.shadowOffsetX = 34;
            ctx.shadowOffsetY = 38;
            ctx.beginPath();
            ctx.ellipse(16, 28, GENERATOR_W * 0.58, GENERATOR_H * 0.46, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.globalAlpha = 0.28;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.roundRect(-GENERATOR_W / 2 + 10, -GENERATOR_H / 2 + 16, GENERATOR_W, GENERATOR_H, 8);
            ctx.fill();
            ctx.restore();

            // Rear steel box side.
            const sideGrad = ctx.createLinearGradient(-GENERATOR_W / 2, -GENERATOR_H / 2, GENERATOR_W / 2, GENERATOR_H / 2);
            sideGrad.addColorStop(0, '#111318');
            sideGrad.addColorStop(0.45, '#24282d');
            sideGrad.addColorStop(1, '#08090c');
            ctx.fillStyle = sideGrad;
            ctx.beginPath();
            ctx.roundRect(-GENERATOR_W / 2, -GENERATOR_H / 2, GENERATOR_W, GENERATOR_H, 7);
            ctx.fill();

            ctx.strokeStyle = 'rgba(110,116,120,0.45)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Top plate with bevels and battered surface.
            const topGrad = ctx.createLinearGradient(-GENERATOR_W / 2, -GENERATOR_H / 2, GENERATOR_W / 2, GENERATOR_H / 2);
            topGrad.addColorStop(0, '#515a5e');
            topGrad.addColorStop(0.18, '#2c3237');
            topGrad.addColorStop(0.6, '#1a1f24');
            topGrad.addColorStop(1, '#0b0d10');
            ctx.fillStyle = topGrad;
            ctx.beginPath();
            ctx.roundRect(-GENERATOR_W / 2 + 8, -GENERATOR_H / 2 + 8, GENERATOR_W - 16, GENERATOR_H - 18, 5);
            ctx.fill();

            ctx.strokeStyle = 'rgba(190,196,190,0.18)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Scratches, dents, and seams.
            ctx.save();
            ctx.globalAlpha = 0.55;
            ctx.strokeStyle = 'rgba(0,0,0,0.65)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-68, -8); ctx.lineTo(68, -8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(14, -39); ctx.lineTo(8, 38); ctx.stroke();
            ctx.strokeStyle = 'rgba(165,172,166,0.22)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 10; i++) {
                const sx = -70 + i * 15;
                const sy = -25 + ((i * 37) % 42);
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + 8 + (i % 3) * 5, sy - 2 + (i % 2) * 5);
                ctx.stroke();
            }
            ctx.restore();

            // Heavy front ventilation fan.
            ctx.save();

        function clampGeneratorAwayFromGrinder() {
            const dx = generator.x - GRINDER_X;
            const dy = generator.y - GRINDER_Y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            if (dist < GENERATOR_GRINDER_CLEARANCE) {
                const nx = dx / dist;
                const ny = dy / dist;
                generator.x = GRINDER_X + nx * GENERATOR_GRINDER_CLEARANCE;
                generator.y = GRINDER_Y + ny * GENERATOR_GRINDER_CLEARANCE;
                const intoGrinder = generator.vx * -nx + generator.vy * -ny;
                if (intoGrinder > 0) {
                    generator.vx += nx * intoGrinder;
                    generator.vy += ny * intoGrinder;
                }
                generator.blockedPulse = 1;
                triggerShake(3, 0.08);
                return true;
            }
            return false;
        }

        function updateGeneratorPhysics(dt, player) {
            generator.pushJolt = Math.max(0, generator.pushJolt - dt * 4.5);
            generator.blockedPulse = Math.max(0, generator.blockedPulse - dt * 3.0);

            generator.x += generator.vx * dt;
            generator.y += generator.vy * dt;

            const wallPad = 24 + GENERATOR_RADIUS;
            generator.x = Math.max(wallPad, Math.min(ROOM_SIZE - wallPad, generator.x));
            generator.y = Math.max(wallPad, Math.min(ROOM_SIZE - wallPad, generator.y));
            clampGeneratorAwayFromGrinder();

            const drag = Math.pow(0.08, dt);
            generator.vx *= drag;
            generator.vy *= drag;
            if (Math.abs(generator.vx) < 2) generator.vx = 0;
            if (Math.abs(generator.vy) < 2) generator.vy = 0;

            player.isPushing = false;
            player.pushIntensity = 0;

            const dx = generator.x - player.x;
            const dy = generator.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const minDist = GENERATOR_RADIUS + player.radius - 4;
            if (dist >= minDist) return;

            const nx = dx / dist;
            const ny = dy / dist;
            const moveLen = Math.sqrt(player.moveX * player.moveX + player.moveY * player.moveY) || 0;
            const movingIntoGenerator = moveLen > 0.05 && (player.moveX * nx + player.moveY * ny) > 0.28;

            if (movingIntoGenerator && !player.isDashing) {
                const mx = player.moveX / moveLen;
                const my = player.moveY / moveLen;
                const shove = GENERATOR_PUSH_SPEED * Math.min(1, input.left.magnitude) * dt;
                const oldX = generator.x;
                const oldY = generator.y;

                generator.x += mx * shove;
                generator.y += my * shove;
                generator.vx += mx * 22 * dt;
                generator.vy += my * 22 * dt;

                const wallClampedX = Math.max(wallPad, Math.min(ROOM_SIZE - wallPad, generator.x));
                const wallClampedY = Math.max(wallPad, Math.min(ROOM_SIZE - wallPad, generator.y));
                const hitWall = wallClampedX !== generator.x || wallClampedY !== generator.y;
                generator.x = wallClampedX;
                generator.y = wallClampedY;
                const blockedByGrinder = clampGeneratorAwayFromGrinder();

                if (hitWall || blockedByGrinder) {
                    generator.vx *= 0.2;
                    generator.vy *= 0.2;
                    generator.pushJolt = 1;
                } else if (Math.abs(generator.x - oldX) + Math.abs(generator.y - oldY) > 0.01) {
                    generator.pushJolt = Math.min(1, generator.pushJolt + 0.35);
                }

                player.isPushing = true;
                player.pushAngle = Math.atan2(my, mx);
                player.pushIntensity = Math.min(1, input.left.magnitude);
                player.facingAngle = player.pushAngle;
            }

            const ndx = generator.x - player.x;
            const ndy = generator.y - player.y;
            const nd = Math.sqrt(ndx * ndx + ndy * ndy) || 1;
            if (nd < minDist) {
                const sep = minDist - nd;
                player.x -= (ndx / nd) * sep;
                player.y -= (ndy / nd) * sep;
                const wallThickness = 20;
                player.x = Math.max(player.radius + wallThickness, Math.min(ROOM_SIZE - player.radius - wallThickness, player.x));
                player.y = Math.max(player.radius + wallThickness, Math.min(ROOM_SIZE - player.radius - wallThickness, player.y));
            }
        }

        class Player {

            update(dt) {
                if (this.hurtTimer > 0) this.hurtTimer -= dt;

                this.moveX = input.left.vectorX * moveMag;
                this.moveY = input.left.vectorY * moveMag;

                this.dashCooldown -= dt;
