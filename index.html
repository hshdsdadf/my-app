            constructor() {
                this.hp = 100; this.maxHp = 100;
                this.xp = 0; this.maxXp = 30; // Starts low, 2 blue gems
                this.level = 1; this.weapons = 2;

                this.x = 200; this.y = ROOM_SIZE / 2; this.radius = 35; this.speed = 400; this.animTime = 0; this.facingAngle = 0; 
                this.fireRate = 0.12; this.fireTimer = 0; this.leftGunNext = true; 
                this.recoilL = 0; this.recoilR = 0; this.flashL = 0; this.flashR = 0; this.hurtTimer = 0;
                
                this.muzzleX_L = 0; this.muzzleY_L = 0; this.muzzleX_R = 0; this.muzzleY_R = 0;

                this.isDashing = false; this.dashTime = 0; this.dashDuration = 0.15; this.dashSpeed = 1600;
                this.dashCooldown = 0; this.dashMaxCooldown = 0.8; this.dashDirX = 0; this.dashDirY = 0;
                this.dashParticles = []; this.dashRings = [];

                this.orbitingWeapons = [];
                this.orbitTime = 0;
                this.pendingLevels = 0;
            }

            tryDash() {
                if (!this.isDashing && this.dashCooldown <= 0) {
                    let dx = 0, dy = 0;
                    if (input.left.magnitude > 0.1) { dx = input.left.vectorX; dy = input.left.vectorY; } 
                    else { dx = Math.cos(this.facingAngle); dy = Math.sin(this.facingAngle); }
                    const mag = Math.sqrt(dx*dx + dy*dy);
                    if (mag > 0) {
                        this.dashDirX = dx / mag; this.dashDirY = dy / mag; this.isDashing = true; this.dashTime = this.dashDuration; this.dashCooldown = this.dashMaxCooldown;
                        this.dashRings.push({x: this.x, y: this.y, radius: 15, life: 0.2, maxLife: 0.2});
                    }
                }
            }

            update(dt) {
                if (this.hurtTimer > 0) this.hurtTimer -= dt;

                if (input.right.doubleTapped) { this.tryDash(); input.right.doubleTapped = false; }

                const moveMag = input.left.magnitude;
                const leanAngle = (moveMag > 0.1) ? input.left.vectorX * 0.15 * moveMag : 0;

                this.dashCooldown -= dt;

                if (this.isDashing) {
                    this.dashTime -= dt;
                    this.dashParticles.push({
                        x: this.x + (Math.random() - 0.5) * 30, y: this.y + (Math.random() - 0.5) * 30,
                        vx: -this.dashDirX * (800 + Math.random() * 400), vy: -this.dashDirY * (800 + Math.random() * 400),
                        life: 0.15, maxLife: 0.15, size: Math.random() * 3 + 1
                    });
                    this.x += this.dashDirX * this.dashSpeed * dt; this.y += this.dashDirY * this.dashSpeed * dt;
                    if (this.dashTime <= 0) { this.isDashing = false; }
                } else if (moveMag > 0) {
                    this.x += input.left.vectorX * this.speed * moveMag * dt; this.y += input.left.vectorY * this.speed * moveMag * dt;
                    this.animTime += dt * (10 + moveMag * 15); 
                } else { this.animTime += dt * 3; }

                for (let i = this.dashParticles.length - 1; i >= 0; i--) {
                    let p = this.dashParticles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                    if (p.life <= 0) this.dashParticles.splice(i, 1);
                }
                for (let i = this.dashRings.length - 1; i >= 0; i--) {
                    let r = this.dashRings[i]; r.life -= dt; r.radius += dt * 500; 
                    if (r.life <= 0) this.dashRings.splice(i, 1);
                }
                
                const wallThickness = 20;
                this.x = Math.max(this.radius + wallThickness, Math.min(ROOM_SIZE - this.radius - wallThickness, this.x));
                this.y = Math.max(this.radius + wallThickness, Math.min(ROOM_SIZE - this.radius - wallThickness, this.y));

                if (input.right.active && input.right.magnitude > 0.1) {
                    this.facingAngle = Math.atan2(input.right.vectorY, input.right.vectorX);
                } else if (input.left.active && moveMag > 0.1) {
                    this.facingAngle = Math.atan2(input.left.vectorY, input.left.vectorX);
                }

                this.recoilL = Math.max(0, this.recoilL - dt * 60); this.recoilR = Math.max(0, this.recoilR - dt * 60);
                this.flashL = Math.max(0, this.flashL - dt * 5); this.flashR = Math.max(0, this.flashR - dt * 5);

                this.fireTimer -= dt;
                if (!this.isDashing && input.right.active && input.right.magnitude > 0.1 && this.fireTimer <= 0) {
                    this.shoot(); this.fireTimer = this.fireRate; triggerShake(2, 0.1); 
                }

                // Update auto-aiming orbiting weapons
                this.orbitTime += dt * 2.0;
                this.orbitingWeapons.forEach((w, i) => {
                    if (w.fireTimer > 0) w.fireTimer -= dt;
                    if (w.sweepTimer > 0) w.sweepTimer -= dt;
                    
                    let orbitRadius = 75;
                    if (w.id === 'knife' || w.id === 'chain') orbitRadius = 45;
                    if (w.id === 'rib_cage' || w.id === 'bone_saw') orbitRadius = 50;
                    if (w.id === 'church_bell' || w.id === 'raven') orbitRadius = 95;
                    
                    // Per-weapon speed factor for drawing & position
                    let orbitSpeedFactor = 1.0;
                    if (w.id === 'rib_cage') orbitSpeedFactor = 2.8;
                    if (w.id === 'bone_saw') orbitSpeedFactor = 3.5;
                    if (w.id === 'raven') orbitSpeedFactor = 0.75;
                    
                    let angle = this.orbitTime * orbitSpeedFactor + (i / this.orbitingWeapons.length) * Math.PI * 2;
                    let wx = this.x + Math.cos(angle) * orbitRadius;
                    let wy = this.y + Math.sin(angle) * orbitRadius;
                    
                    // Specific logic for Melee Weapons (Knife & Chain)
                    if (w.id === 'knife') {
                        if (w.lungeTimer > 0) {
                            w.lungeTimer -= dt;
                            let progress = 1 - (w.lungeTimer / 0.2); 
                            w.lungeOffset = Math.sin(progress * Math.PI) * 60; // Snaps forward and back
                            
                            // Check collision while lunging
                            if (progress > 0.2 && progress < 0.8 && !w.hasHit) {
                                let kx = this.x + Math.cos(w.lastAimAngle) * (orbitRadius + w.lungeOffset);
                                let ky = this.y + Math.sin(w.lastAimAngle) * (orbitRadius + w.lungeOffset);
                                enemies.forEach(e => {
                                    if ((e.x - kx)**2 + (e.y - ky)**2 < (e.radius + 25)**2) {
                                        e.hp -= WEAPONS[w.id].power; e.hitCount++; w.hasHit = true;
                                        damageTexts.push({ x: e.x, y: e.y - 20, text: "-" + WEAPONS[w.id].power, life: 0.6, vy: -40 });
                                        
                                        // Simple blood hit effect
                                        if (e.hitCount % 2 === 0) {
                                            for(let p = 0; p < 2; p++) {
                                                activeSplatter.push({
                                                    x: e.x, y: e.y, vx: (Math.random()-0.5)*150, vy: (Math.random()-0.5)*150,
                                                    size: Math.random()*3+1, color: e.type==='choir'?'#3d0b6e':'#6a040f',
                                                    friction: 0.8, scaleX: 1, angle: 0
                                                });
                                            }
                                        }
                                    }
                                });
                            }
                        } else { w.lungeOffset = 0; }
                    } else if (w.id === 'chain') {
                        if (w.sweepTimer > 0) {
                            // Sweep 180 degrees
                            let progress = 1 - (w.sweepTimer / 0.3);
                            w.sweepAngle = w.lastAimAngle - Math.PI/2 + (Math.PI * progress);
                            
                            let kx = this.x + Math.cos(w.sweepAngle) * 90;
                            let ky = this.y + Math.sin(w.sweepAngle) * 90;
                            enemies.forEach(e => {
                                if ((e.x - kx)**2 + (e.y - ky)**2 < (e.radius + 30)**2 && !e.chainHit) {
                                    e.hp -= WEAPONS[w.id].power; e.hitCount++; e.chainHit = true;
                                    damageTexts.push({ x: e.x, y: e.y - 20, text: "-" + WEAPONS[w.id].power, life: 0.6, vy: -40 });
                                    if (e.hitCount % 2 === 0) {
                                        for(let p = 0; p < 2; p++) {
                                            activeSplatter.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*150, vy: (Math.random()-0.5)*150, size: Math.random()*3+1, color: e.type==='choir'?'#3d0b6e':'#6a040f', friction: 0.8, scaleX: 1, angle: 0 });
                                        }
                                    }
                                }
                            });
                        } else {
                            // Reset hit flags on enemies when not sweeping
                            enemies.forEach(e => e.chainHit = false);
                        }
                    } else if (w.id === 'rib_cage' || w.id === 'bone_saw') {
                        // Proximity melee damage - checks enemy overlap with orbit position
                        if (w.fireTimer <= 0 && enemies.length > 0) {
                            let hitRadius = w.id === 'rib_cage' ? 44 : 32;
                            enemies.forEach(e => {
                                let dx = e.x - wx; let dy = e.y - wy;
                                if (dx*dx + dy*dy < (e.radius + hitRadius)**2) {
                                    e.hp -= WEAPONS[w.id].power; e.hitCount++;
                                    damageTexts.push({ x: e.x, y: e.y - 20, text: '-' + WEAPONS[w.id].power, life: 0.5, vy: -35 });
                                    for(let p=0; p<2; p++) {
                                        activeSplatter.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*220, vy: (Math.random()-0.5)*220, size: Math.random()*3+1, color: e.type==='choir'?'#3d0b6e':'#6a040f', friction: 0.8, scaleX: 1, angle: 0 });
                                    }
                                    triggerShake(2, 0.06);
                                }
                            });
                            w.fireTimer = w.rate;
                        }
                    } else if (w.id === 'raven') {
                        // Swoop attack like knife but from larger radius
                        if (w.lungeTimer > 0) {
                            w.lungeTimer -= dt;
                            let progress = 1 - (w.lungeTimer / 0.3);
                            w.lungeOffset = Math.sin(progress * Math.PI) * 85;
                            if (progress > 0.18 && progress < 0.82 && !w.hasHit) {
                                let kx = this.x + Math.cos(w.lastAimAngle) * (orbitRadius + w.lungeOffset);
                                let ky = this.y + Math.sin(w.lastAimAngle) * (orbitRadius + w.lungeOffset);
                                enemies.forEach(e => {
                                    if ((e.x - kx)**2 + (e.y - ky)**2 < (e.radius + 28)**2) {
                                        e.hp -= WEAPONS[w.id].power; e.hitCount++; w.hasHit = true;
                                        damageTexts.push({ x: e.x, y: e.y - 20, text: '-' + WEAPONS[w.id].power, life: 0.6, vy: -42 });
                                        for(let p=0; p<3; p++) {
                                            activeSplatter.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*200, vy: (Math.random()-0.5)*200, size: Math.random()*4+1, color: e.type==='choir'?'#3d0b6e':'#6a040f', friction: 0.78, scaleX: 1, angle: 0 });
                                        }
                                        triggerShake(3, 0.1);
                                    }
                                });
                            }
                        } else { w.lungeOffset = 0; }
                    } else if (w.id === 'church_bell') {
                        // Church bell just triggers shockwave in targeting section - no direct melee
                    }

                    // Targeting AI
                    if (w.fireTimer <= 0 && enemies.length > 0 && !this.isDashing) {
                        let closest = null; let minDist = Infinity;
                        enemies.forEach(e => {
                            let dist = (e.x - wx)**2 + (e.y - wy)**2;
                            if (dist < minDist) { minDist = dist; closest = e; }
                        });
                        
                        let maxRange = (w.id === 'knife' || w.id === 'chain') ? 12000 : 400000;
                        if (w.id === 'rib_cage' || w.id === 'bone_saw') maxRange = 0; // handled above
                        if (closest && minDist < maxRange) {
                            let aimAngle = Math.atan2(closest.y - wy, closest.x - wx);
                            w.lastAimAngle = aimAngle;
                            w.fireTimer = w.rate;
                            
                            if (w.id === 'knife') {
                                w.lungeTimer = 0.2; w.hasHit = false;
                            } else if (w.id === 'chain') {
                                w.sweepTimer = 0.3; w.sweepAngle = aimAngle - Math.PI/2;
                            } else if (w.id === 'raven') {
                                w.lungeTimer = 0.3; w.hasHit = false;
                            } else if (w.id === 'church_bell') {
                                // Shockwave centered on player
                                shockwaves.push({ x: this.x, y: this.y, radius: 8, maxRadius: 145, life: 0.55, maxLife: 0.55, damage: WEAPONS[w.id].power, hitEnemies: new Set(), color: '#d4af37' });
                                triggerShake(5, 0.14);
                            } else if (w.id === 'cursed_book') {
                                // Fire 3 bolts in random directions
                                for (let b = 0; b < 3; b++) {
                                    let rAngle = Math.random() * Math.PI * 2;
                                    let tipX = wx + Math.cos(rAngle) * 15;
                                    let tipY = wy + Math.sin(rAngle) * 15;
                                    bullets.push(new Bullet(tipX, tipY, rAngle, 'cursed_book'));
                                }
                            } else {
                                let tipX = wx + Math.cos(aimAngle) * 15;
                                let tipY = wy + Math.sin(aimAngle) * 15;
                                bullets.push(new Bullet(tipX, tipY, aimAngle, w.id));
                            }
                        } else {
                            if ((w.id !== 'knife' || w.lungeTimer <= 0) && (w.id !== 'chain' || w.sweepTimer <= 0) && (w.id !== 'raven' || w.lungeTimer <= 0)) w.lastAimAngle = this.facingAngle;
                        }
                    } else if (w.fireTimer <= 0 && (w.id !== 'knife' || w.lungeTimer <= 0) && (w.id !== 'chain' || w.sweepTimer <= 0) && (w.id !== 'raven' || (w.lungeTimer || 0) <= 0)) {
                        w.lastAimAngle = this.facingAngle;
                    }
                });

                if (this.hp <= 0 && gameState === 'playing') { setGameState('gameover'); }
            }

            shoot() {
                const gunOffsetX = this.leftGunNext ? -25 : 25;
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (this.leftGunNext ? 0 : Math.PI)) * 5 : 0;
                const gunOffsetY = 12 + sway;
                const isMoving = input.left.magnitude > 0.1; const runIntensity = input.left.magnitude; 
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); 
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; 
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; 

                const scaledY = gunOffsetY * breathScale;
                const rotatedX = gunOffsetX * Math.cos(leanAngle) - scaledY * Math.sin(leanAngle);
                const rotatedY = gunOffsetX * Math.sin(leanAngle) + scaledY * Math.cos(leanAngle);
                
                const pivotX = this.x + rotatedX; const pivotY = this.y - bobbing + rotatedY;
                const barrelLength = 25;
                const tipX = pivotX + Math.cos(this.facingAngle) * barrelLength;
                const tipY = pivotY + Math.sin(this.facingAngle) * barrelLength;

                bullets.push(new Bullet(tipX, tipY, this.facingAngle, 'default'));

                if (this.leftGunNext) { this.recoilL = 12; this.flashL = 0.1; this.muzzleX_L = tipX; this.muzzleY_L = tipY; } 
                else { this.recoilR = 12; this.flashR = 0.1; this.muzzleX_R = tipX; this.muzzleY_R = tipY; }
                this.leftGunNext = !this.leftGunNext; 
            }

            drawOrbitingWeapons(ctx) {
                this.orbitingWeapons.forEach((w, i) => {
                    let orbitRadius = 75;
                    if (w.id === 'knife' || w.id === 'chain') orbitRadius = 45;
                    if (w.id === 'rib_cage' || w.id === 'bone_saw') orbitRadius = 50;
                    if (w.id === 'church_bell' || w.id === 'raven') orbitRadius = 95;

                    let orbitSpeedFactor = 1.0;
                    if (w.id === 'rib_cage') orbitSpeedFactor = 2.8;
                    if (w.id === 'bone_saw') orbitSpeedFactor = 3.5;
                    if (w.id === 'raven') orbitSpeedFactor = 0.75;

                    let angle = this.orbitTime * orbitSpeedFactor + (i / this.orbitingWeapons.length) * Math.PI * 2;
                    
                    let wx = Math.cos(angle) * orbitRadius; 
                    let wy = Math.sin(angle) * orbitRadius; 
                    
                    ctx.save();
                    ctx.translate(wx, wy);
                    
                    let aimAngle = w.lastAimAngle !== undefined ? w.lastAimAngle : angle + Math.PI/2;
                    if (w.id === 'chain' && w.sweepTimer > 0) aimAngle = w.sweepAngle;

                    ctx.rotate(aimAngle);
                    
                    let recoil = 0;
                    if (w.id === 'knife') {
                        ctx.translate(w.lungeOffset, 0); 
                        if (w.lungeOffset > 10) {
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-w.lungeOffset, -5); ctx.lineTo(-w.lungeOffset, 5);
                            ctx.fillStyle = `rgba(255,255,255,${w.lungeOffset/60})`; ctx.fill();
                        }
                    } else if (w.id === 'raven') {
                        ctx.translate(w.lungeOffset || 0, 0);
                        if ((w.lungeOffset || 0) > 10) {
                            // Raven swoop trail
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-(w.lungeOffset)*0.6, -4); ctx.lineTo(-(w.lungeOffset)*0.6, 4);
                            ctx.fillStyle = `rgba(30,0,50,${(w.lungeOffset||0)/120})`; ctx.fill();
                        }
                    } else if (w.id === 'chain') {
                        if (w.sweepTimer > 0) {
                            ctx.beginPath(); ctx.arc(0, 0, 45, -0.2, 0.2); 
                            ctx.strokeStyle = `rgba(200,200,200,${w.sweepTimer/0.3})`; ctx.lineWidth=3; ctx.stroke();
                        }
                    } else if (w.id === 'bone_saw') {
                        // Bone saw has its own spin independent of aim angle
                        ctx.rotate(this.orbitTime * 8); // extra spin
                    } else if (w.id === 'church_bell') {
                        // Bell has a small bob effect
                        ctx.rotate(Math.sin(this.orbitTime * 3) * 0.3);
                    } else {
                        if (w.fireTimer > w.rate - 0.1) recoil = 8;
                        ctx.translate(-recoil, 0);
                    }

                    if (w.id !== 'bone_saw' && w.id !== 'rib_cage' && w.id !== 'raven') {
                        if (Math.abs(aimAngle) > Math.PI/2) ctx.scale(1, -1);
                    }
                    
                    // Apply visual scale
                    if (WEAPONS[w.id]) ctx.scale(WEAPONS[w.id].scale, WEAPONS[w.id].scale);

                    drawWeaponEntity(ctx, w.id, w.fireTimer > w.rate - 0.05 ? 1 : 0);
                    
                    ctx.restore();
                });
            }

            draw(ctx) {
                const isMoving = input.left.magnitude > 0.1;
                const runIntensity = input.left.magnitude; 
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); 
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; 
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; 

                this.dashParticles.forEach(p => {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    ctx.save(); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx * 0.05, p.y - p.vy * 0.05);
                    ctx.strokeStyle = `rgba(200, 210, 220, ${alpha * 0.7})`; ctx.lineWidth = p.size; ctx.lineCap = 'round'; ctx.stroke(); ctx.restore();
                });
                this.dashRings.forEach(r => {
                    const alpha = Math.max(0, r.life / r.maxLife);
                    ctx.save(); ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(220, 230, 240, ${alpha * 0.5})`; ctx.lineWidth = 3; ctx.stroke(); ctx.restore();
                });

                ctx.save();
                ctx.translate(this.x, this.y);
                
                this.drawOrbitingWeapons(ctx);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath(); ctx.ellipse(0, 35 - bobbing*0.5, 30 - bobbing, 15 - bobbing*0.5, 0, 0, Math.PI * 2); ctx.fill();

                ctx.rotate(leanAngle); ctx.translate(0, -bobbing); ctx.scale(1, breathScale);

                const eggGrad = ctx.createRadialGradient(-10, -15, 5, 0, 0, this.radius + 10);
                eggGrad.addColorStop(0, '#ffffff'); eggGrad.addColorStop(0.4, '#e4e6d9'); eggGrad.addColorStop(1, '#8b8e83');   

                ctx.fillStyle = eggGrad;
                ctx.beginPath(); ctx.moveTo(0, -this.radius * 1.2); 
                ctx.bezierCurveTo(this.radius, -this.radius * 1.2, this.radius, this.radius, 0, this.radius);
                ctx.bezierCurveTo(-this.radius, this.radius, -this.radius, -this.radius * 1.2, 0, -this.radius * 1.2); ctx.fill();

                ctx.save();
                const faceOffsetX = Math.cos(this.facingAngle) * 10; const faceOffsetY = Math.sin(this.facingAngle) * 8;
                ctx.translate(faceOffsetX, faceOffsetY);
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(-12, -4, 9, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10, -6, 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000';
                const pupilOffsetX = Math.cos(this.facingAngle) * 4; const pupilOffsetY = Math.sin(this.facingAngle) * 4;
                ctx.beginPath(); ctx.arc(-12 + pupilOffsetX, -4 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10 + pupilOffsetX, -6 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                this.drawWeapon(ctx, -25, 12, this.facingAngle, true, this.recoilL, this.flashL); 
                this.drawWeapon(ctx, 25, 12, this.facingAngle, false, this.recoilR, this.flashR); 

                ctx.restore();
            }

            drawWeapon(ctx, offsetX, offsetY, aimAngle, isLeft, recoil, flash) {
                ctx.save();
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (isLeft ? 0 : Math.PI)) * 5 : 0;
                ctx.translate(offsetX, offsetY + sway); ctx.rotate(aimAngle); ctx.translate(-recoil, 0);

                const isAimingLeft = Math.abs(aimAngle) > Math.PI / 2;
                if (isAimingLeft) ctx.scale(1, -1);
                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = isAimingLeft ? -10 : 10; 

                const gunGrad = ctx.createLinearGradient(0, -4, 0, 4);
                gunGrad.addColorStop(0, '#5a5a6a'); gunGrad.addColorStop(0.5, '#3b3b4c'); gunGrad.addColorStop(1, '#1c1c28');
                ctx.fillStyle = gunGrad;
                ctx.beginPath(); ctx.roundRect(5, -4, 20, 8, 2); ctx.roundRect(-2, -2, 10, 12, 2); ctx.fill();
                ctx.shadowColor = 'transparent'; ctx.fillStyle = '#050505'; ctx.fillRect(18, -2, 5, 4); ctx.fillStyle = '#888'; ctx.fillRect(8, -3, 8, 2); 

                if (flash > 0) {
                    if (isAimingLeft) ctx.scale(1, -1);
                    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 15; ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.moveTo(23, 0); ctx.lineTo(32 + Math.random()*8, -4 - Math.random()*4);
                    ctx.lineTo(30, 0); ctx.lineTo(32 + Math.random()*8, 4 + Math.random()*4); ctx.fill();
                    ctx.beginPath(); ctx.arc(26, 0, 7 * (flash/0.1), 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }

        // --- ENVIRONMENT ---
        function drawRoom(ctx) {
            const tileSize = 60;
            ctx.strokeStyle = 'rgba(10, 10, 12, 0.4)';
            ctx.lineWidth = 2;

            for (let x = 0; x < ROOM_SIZE; x += tileSize) {
                for (let y = 0; y < ROOM_SIZE; y += tileSize) {
                    if ((x/tileSize + y/tileSize) % 2 === 0) {
                        ctx.fillStyle = '#161412';
                    } else {
                        ctx.fillStyle = '#11100e';
                    }
                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            ctx.strokeStyle = '#0a0908'; 
            ctx.lineWidth = 40;
            ctx.strokeRect(0, 0, ROOM_SIZE, ROOM_SIZE);
        }

        function drawExitDoor(ctx) {
            ctx.save();
            ctx.translate(ROOM_SIZE, ROOM_SIZE / 2);
            if (hasKey && exitDoorProgress < 1) { exitDoorProgress += 0.015; }
            
            ctx.fillStyle = '#010102'; ctx.fillRect(-20, -70, 40, 140);
            
            const coreGrad = ctx.createLinearGradient(-20, 0, 20, 0);
            coreGrad.addColorStop(0, hasKey ? 'rgba(0, 255, 100, 0)' : 'rgba(255, 0, 0, 0)');
            coreGrad.addColorStop(1, hasKey ? 'rgba(0, 255, 100, 0.8)' : 'rgba(255, 0, 0, 0.5)');
            ctx.fillStyle = coreGrad; ctx.fillRect(-20, -70, 40, 140);
            
            const slideOffset = exitDoorProgress * 70; 

            ctx.fillStyle = '#111'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
            
            ctx.save(); ctx.translate(0, -slideOffset); ctx.beginPath();
            ctx.moveTo(-15, 0); ctx.lineTo(-15, -70); ctx.lineTo(15, -70); ctx.lineTo(15, 0);
            ctx.lineTo(5, -10); ctx.lineTo(-5, -10); ctx.closePath();
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = hasKey ? '#1a2b1a' : '#2b1a1a'; ctx.fillRect(-10, -50, 20, 30); ctx.restore();

            ctx.save(); ctx.translate(0, slideOffset); ctx.beginPath();
            ctx.moveTo(-15, 0); ctx.lineTo(-15, 70); ctx.lineTo(15, 70); ctx.lineTo(15, 0);
            ctx.lineTo(5, 10); ctx.lineTo(-5, 10); ctx.closePath();
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = hasKey ? '#1a2b1a' : '#2b1a1a'; ctx.fillRect(-10, 20, 20, 30); ctx.restore();

            ctx.fillStyle = '#18181c'; ctx.fillRect(-25, -80, 50, 10); ctx.fillRect(-25, 70, 50, 10); ctx.fillRect(-25, -70, 5, 140); 
            ctx.restore();
        }

        // --- DYNAMIC LIGHTING ---
        function drawLighting(ctx, camX, camY, sx, sy) {
            lightCtx.globalCompositeOperation = 'source-over';
            
            let opacity = 1 - settings.brightness;
            lightCtx.fillStyle = `rgba(4, 4, 6, ${opacity})`; 
            lightCtx.fillRect(0, 0, width, height);

            lightCtx.globalCompositeOperation = 'destination-out';

            lightCtx.save();
            lightCtx.translate(width / 2, height / 2);
            lightCtx.scale(settings.zoom, settings.zoom);
            lightCtx.translate(-camX + sx, -camY + sy);

            torches.forEach(t => {
                const radius = t.getLightRadius();
                const grad = lightCtx.createRadialGradient(t.x, t.y, 10, t.x, t.y, radius);
                grad.addColorStop(0, 'rgba(255, 255, 255, 1)'); grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.5)'); grad.addColorStop(1, 'rgba(255, 255, 255, 0)');      
                lightCtx.fillStyle = grad; lightCtx.beginPath(); lightCtx.arc(t.x, t.y, radius, 0, Math.PI * 2); lightCtx.fill();
            });

            const pRadius = 180;
            const pGrad = lightCtx.createRadialGradient(player.x, player.y, 20, player.x, player.y, pRadius);
            pGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)'); pGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            lightCtx.fillStyle = pGrad; lightCtx.beginPath(); lightCtx.arc(player.x, player.y, pRadius, 0, Math.PI*2); lightCtx.fill();

            // Candle Weapon Lights + Uncommon Weapon Lights
            player.orbitingWeapons.forEach((w, i) => {
                let orbitRadius = 75;
                if (w.id === 'knife' || w.id === 'chain') orbitRadius = 45;
                if (w.id === 'rib_cage' || w.id === 'bone_saw') orbitRadius = 50;
                if (w.id === 'church_bell' || w.id === 'raven') orbitRadius = 95;
                let speedFactor = 1.0;
                if (w.id === 'rib_cage') speedFactor = 2.8;
                if (w.id === 'bone_saw') speedFactor = 3.5;
                if (w.id === 'raven') speedFactor = 0.75;
                let angle = player.orbitTime * speedFactor + (i / player.orbitingWeapons.length) * Math.PI * 2;
                let wx = player.x + Math.cos(angle) * orbitRadius;
                let wy = player.y + Math.sin(angle) * orbitRadius;

                if (w.id === 'candle') {
                    const cGrad = lightCtx.createRadialGradient(wx, wy, 2, wx, wy, 60);
                    cGrad.addColorStop(0, 'rgba(255, 150, 0, 0.6)'); cGrad.addColorStop(1, 'rgba(255, 150, 0, 0)');
                    lightCtx.fillStyle = cGrad; lightCtx.beginPath(); lightCtx.arc(wx, wy, 60, 0, Math.PI*2); lightCtx.fill();
                } else if (w.id === 'black_candle') {
                    const bcGrad = lightCtx.createRadialGradient(wx, wy, 2, wx, wy, 55);
                    bcGrad.addColorStop(0, 'rgba(120, 0, 255, 0.5)'); bcGrad.addColorStop(1, 'rgba(120, 0, 255, 0)');
                    lightCtx.fillStyle = bcGrad; lightCtx.beginPath(); lightCtx.arc(wx, wy, 55, 0, Math.PI*2); lightCtx.fill();
                } else if (w.id === 'skull_staff') {
                    const ssGrad = lightCtx.createRadialGradient(wx, wy, 2, wx, wy, 45);
                    ssGrad.addColorStop(0, 'rgba(30, 255, 80, 0.35)'); ssGrad.addColorStop(1, 'rgba(30, 255, 80, 0)');
                    lightCtx.fillStyle = ssGrad; lightCtx.beginPath(); lightCtx.arc(wx, wy, 45, 0, Math.PI*2); lightCtx.fill();
                } else if (w.id === 'funeral_cross') {
                    const fcGrad = lightCtx.createRadialGradient(wx, wy, 2, wx, wy, 50);
                    fcGrad.addColorStop(0, 'rgba(255, 240, 100, 0.4)'); fcGrad.addColorStop(1, 'rgba(255, 240, 100, 0)');
                    lightCtx.fillStyle = fcGrad; lightCtx.beginPath(); lightCtx.arc(wx, wy, 50, 0, Math.PI*2); lightCtx.fill();
                } else if (w.id === 'church_bell') {
                    const bellGrad = lightCtx.createRadialGradient(wx, wy, 2, wx, wy, 50);
                    bellGrad.addColorStop(0, 'rgba(212, 175, 55, 0.35)'); bellGrad.addColorStop(1, 'rgba(212, 175, 55, 0)');
                    lightCtx.fillStyle = bellGrad; lightCtx.beginPath(); lightCtx.arc(wx, wy, 50, 0, Math.PI*2); lightCtx.fill();
                } else if (w.id === 'cursed_book') {
                    const cbGrad = lightCtx.createRadialGradient(wx, wy, 2, wx, wy, 40);
                    cbGrad.addColorStop(0, 'rgba(150, 50, 255, 0.35)'); cbGrad.addColorStop(1, 'rgba(150, 50, 255, 0)');
                    lightCtx.fillStyle = cbGrad; lightCtx.beginPath(); lightCtx.arc(wx, wy, 40, 0, Math.PI*2); lightCtx.fill();
                }
            });

            // Shockwave lights
            shockwaves.forEach(sw => {
                let a = sw.life / sw.maxLife;
                const swGrad = lightCtx.createRadialGradient(sw.x, sw.y, sw.radius * 0.8, sw.x, sw.y, sw.radius + 30);
                swGrad.addColorStop(0, `rgba(212,175,55,${a * 0.4})`); swGrad.addColorStop(1, 'rgba(212,175,55,0)');
                lightCtx.fillStyle = swGrad; lightCtx.beginPath(); lightCtx.arc(sw.x, sw.y, sw.radius + 30, 0, Math.PI*2); lightCtx.fill();
            });

            // Explosion lights
            explosionEffects.forEach(ef => {
                let a = ef.life / ef.maxLife;
                const efGrad = lightCtx.createRadialGradient(ef.x, ef.y, 0, ef.x, ef.y, ef.radius + 50);
                efGrad.addColorStop(0, `rgba(255,180,40,${a * 0.8})`); efGrad.addColorStop(0.5, `rgba(255,60,0,${a * 0.4})`); efGrad.addColorStop(1, 'rgba(255,60,0,0)');
                lightCtx.fillStyle = efGrad; lightCtx.beginPath(); lightCtx.arc(ef.x, ef.y, ef.radius + 50, 0, Math.PI*2); lightCtx.fill();
            });

            const dGrad = lightCtx.createRadialGradient(ROOM_SIZE, ROOM_SIZE / 2, 5, ROOM_SIZE, ROOM_SIZE / 2, 100 + (exitDoorProgress * 50));
            dGrad.addColorStop(0, hasKey ? 'rgba(0, 255, 0, 0.4)' : 'rgba(255, 0, 0, 0.4)'); dGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            lightCtx.fillStyle = dGrad; lightCtx.beginPath(); lightCtx.arc(ROOM_SIZE, ROOM_SIZE / 2, 150, 0, Math.PI * 2); lightCtx.fill();

            keys.forEach(k => {
                const kGrad = lightCtx.createRadialGradient(k.x, k.y, 5, k.x, k.y, 80);
                kGrad.addColorStop(0, 'rgba(255, 200, 0, 0.5)'); kGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                lightCtx.fillStyle = kGrad; lightCtx.beginPath(); lightCtx.arc(k.x, k.y, 80, 0, Math.PI * 2); lightCtx.fill();
            });

            gems.forEach(g => {
                const glowColor = g.type === 'purple' ? [168, 43, 255] : (g.type === 'blue' ? [0, 160, 255] : [255, 120, 0]);
                const bob = Math.sin(g.timeOffset) * 3.5;
                const gGrad = lightCtx.createRadialGradient(g.x, g.y + bob, 2, g.x, g.y + bob, 55);
                gGrad.addColorStop(0, `rgba(${glowColor.join(',')},0.55)`); gGrad.addColorStop(1, 'rgba(0,0,0,0)');
                lightCtx.fillStyle = gGrad; lightCtx.beginPath(); lightCtx.arc(g.x, g.y + bob, 55, 0, Math.PI * 2); lightCtx.fill();
            });

            enemyBullets.forEach(eb => {
                const grad = lightCtx.createRadialGradient(eb.x, eb.y, 0, eb.x, eb.y, 40);
                grad.addColorStop(0, 'rgba(210, 85, 255, 0.6)'); grad.addColorStop(1, 'rgba(210, 85, 255, 0)');
                lightCtx.fillStyle = grad; lightCtx.beginPath(); lightCtx.arc(eb.x, eb.y, 40, 0, Math.PI*2); lightCtx.fill();
            });

            enemies.forEach(enemy => {
                if (enemy.type === 'kneeler' && enemy.state === 'frozen') {
                    const kGlow = lightCtx.createRadialGradient(enemy.drawX, enemy.drawY, 2, enemy.drawX, enemy.drawY, 40);
                    kGlow.addColorStop(0, 'rgba(0,255,80,0.45)'); kGlow.addColorStop(1, 'rgba(0,255,80,0)');
                    lightCtx.fillStyle = kGlow; lightCtx.beginPath(); lightCtx.arc(enemy.drawX, enemy.drawY, 40, 0, Math.PI*2); lightCtx.fill();
                } else if (enemy.type === 'choir') {
                    const sGrad = lightCtx.createRadialGradient(enemy.drawX, enemy.drawY, 5, enemy.drawX, enemy.drawY, 60);
                    sGrad.addColorStop(0, 'rgba(180, 80, 255, 0.5)'); sGrad.addColorStop(1, 'rgba(180, 80, 255, 0)');
                    lightCtx.fillStyle = sGrad; lightCtx.beginPath(); lightCtx.arc(enemy.drawX, enemy.drawY, 60, 0, Math.PI*2); lightCtx.fill();
                } else if (enemy.type === 'smiler') {
                    const smileX = enemy.drawX + Math.cos(enemy.drawAngle) * 18; const smileY = enemy.drawY + Math.sin(enemy.drawAngle) * 18;
                    const sGrad = lightCtx.createRadialGradient(smileX, smileY, 2, smileX, smileY, 25);
                    sGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)'); sGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    lightCtx.fillStyle = sGrad; lightCtx.beginPath(); lightCtx.arc(smileX, smileY, 25, 0, Math.PI*2); lightCtx.fill();
                }
            });

            if (player.flashL > 0) drawMuzzleLight(player.muzzleX_L, player.muzzleY_L, player.flashL);
            if (player.flashR > 0) drawMuzzleLight(player.muzzleX_R, player.muzzleY_R, player.flashR);

            function drawMuzzleLight(x, y, flashAmount) {
                const fRadius = 250 * (flashAmount / 0.1); 
                const fGrad = lightCtx.createRadialGradient(x, y, 5, x, y, fRadius);
                fGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)'); fGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                lightCtx.fillStyle = fGrad; lightCtx.beginPath(); lightCtx.arc(x, y, fRadius, 0, Math.PI*2); lightCtx.fill();
            }

            lightCtx.restore();

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(lightCanvas, 0, 0);
            ctx.restore();
        }

        // --- UI / JOYSTICKS ---
        function drawJoysticks(ctx) {
            ctx.lineWidth = 3;
            if (input.left.active) {
                ctx.beginPath(); ctx.arc(input.left.baseX, input.left.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)'; ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.stroke();
                ctx.beginPath(); ctx.arc(input.left.currentX, input.left.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; ctx.fill();
            }
        }

        // --- MAIN LOOP ---
        const player = new Player();
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000; 
            lastTime = currentTime;
            if (dt > 0.1) dt = 0.1; 

            if (gameState === 'countdown') {
                countdownTimer -= dt;
                if (countdownTimer <= 0) {
                    countdownValue--;
                    if (countdownValue > 0) {
                        countdownTimer = 0.5; 
                        triggerCountdownAnim(countdownValue);
                    } else {
                        setGameState('playing');
                    }
                }
            }

            if (gameState === 'playing') {
                timeAlive += dt; // Track score

                if (shakeTime > 0) {
                    shakeTime -= dt;
                    currentShakeX = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                    currentShakeY = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                } else {
                    currentShakeX = 0; currentShakeY = 0;
                }

                if (roomTextTimer > 0) roomTextTimer -= dt;
                if (keyDroppedTimer > 0) keyDroppedTimer -= dt;

                player.update(dt);
                torches.forEach(t => t.update(dt));
                trapdoor.update(dt);

                for(let i = keys.length - 1; i >= 0; i--) {
                    let k = keys[i]; k.update(dt);
                    let dx = player.x - k.x; let dy = player.y - k.y;
                    if (dx*dx + dy*dy < 2500) { 
                        hasKey = true; keys.splice(i, 1);
                    }
                }

                // Gem pickup — gives growth/XP
                for (let i = gems.length - 1; i >= 0; i--) {
                    let g = gems[i]; g.update(dt);
                    const dx = player.x - g.x, dy = player.y - g.y;
                    if (dx*dx + dy*dy < 2000) {
                        player.xp += g.xpValue;
                        damageTexts.push({ x: g.x, y: g.y - 18, text: '+' + g.xpValue, life: 0.8, vy: -45 });
                        gems.splice(i, 1);
                        
                        // Handle level up overflow
                        while (player.xp >= player.maxXp) {
                            player.xp -= player.maxXp;
                            player.level++;
                            player.maxXp = Math.floor(player.maxXp * 1.4 + 10); // Much harder scaling
                            player.pendingLevels++;
                        }
                        updateHUD();
                    }
                }

                if (hasKey && player.x > ROOM_SIZE - 100 && Math.abs(player.y - ROOM_SIZE / 2) < 100) {
                    startNextRoom();
                }

                // Update Enemy Bullets
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    let eb = enemyBullets[i]; eb.update(dt);
                    let dx = player.x - eb.x; let dy = player.y - eb.y;
                    if (dx*dx + dy*dy < (player.radius + eb.radius) * (player.radius + eb.radius)) {
                        player.hp -= eb.damage; player.hurtTimer = 0.15; updateHUD();
                        damageTexts.push({ x: player.x + (Math.random() - 0.5) * 16, y: player.y - 30, text: "-" + eb.damage, life: 0.7, vy: -55 - Math.random() * 20 });
                        triggerShake(4, 0.1); enemyBullets.splice(i, 1);
                        
                        if (player.hp <= 0 && gameState === 'playing') {
                            lastDeathCause = 'the Choir'; setGameState('gameover');
                        }
                        continue;
                    }
                    if (eb.life <= 0) enemyBullets.splice(i, 1);
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i]; enemy.update(dt, player, enemies);

                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        if (b.hitEnemies && b.hitEnemies.has(enemy)) continue;

                        let dx = enemy.x - b.x; let dy = enemy.y - b.y;
                        if (dx*dx + dy*dy < enemy.radius * enemy.radius) {
                            enemy.hp -= b.damage; enemy.hitCount++;
                            damageTexts.push({ x: enemy.x + (Math.random() - 0.5) * 20, y: enemy.y - 20, text: "-" + b.damage, life: 0.6, vy: -40 - Math.random() * 20 });

                            // Bottle Shatter
                            if (b.type === 'bottle') {
                                for(let p=0; p<6; p++) {
                                    activeSplatter.push({
                                        x: enemy.x, y: enemy.y, vx: (Math.random()-0.5)*300, vy: (Math.random()-0.5)*300,
                                        size: Math.random()*2+1, color: '#2e8b57', friction: 0.9, scaleX: 1, angle: 0
                                    });
                                }
                                triggerShake(3, 0.1);
                            }
                            // Blood Syringe - inject the enemy for delayed explosion
                            if (b.type === 'blood_syringe' && b.isInjection && !enemy.injected) {
                                enemy.injected = 1.6; // Time until explosion
                            }

                            if (enemy.hitCount % 3 === 0) {
                                let hitAngle = Math.atan2(b.vy, b.vx); let numHit = 1 + Math.floor(Math.random() * 2);
                                for(let p = 0; p < numHit; p++) {
                                    let spread = (Math.random() - 0.5) * 0.6; let speed = 10 + Math.random() * 22; let size = 0.7 + Math.random() * 1.1;
                                    let colors = ['#100000']; if (enemy.type === 'choir') colors = ['#2a004a', '#110022'];
                                    activeSplatter.push({
                                        x: enemy.x + (Math.random()-0.5)*3, y: enemy.y + (Math.random()-0.5)*3,
                                        vx: Math.cos(hitAngle + spread) * speed, vy: Math.sin(hitAngle + spread) * speed,
                                        size, color: colors[0], friction: 0.50, scaleX: 1.0 + Math.random() * 0.3, angle: hitAngle + spread
                                    });
                                }
                            }
                            
                            // Handling bullet pierce and bounce
                            if (b.pierceCount > 0) {
                                b.hitEnemies.add(enemy); b.pierceCount--;
                                if (b.pierceCount <= 0) bullets.splice(j, 1);
                            } else if (b.bounceCount > 0) {
                                b.hitEnemies.add(enemy); b.bounceCount--;
                                if (b.bounceCount <= 0) { bullets.splice(j, 1); } 
                                else {
                                    let nextTarget = null; let minDist = Infinity;
                                    enemies.forEach(ne => {
                                        if (!b.hitEnemies.has(ne)) {
                                            let ndist = (ne.x - b.x)**2 + (ne.y - b.y)**2;
                                            if (ndist < minDist) { minDist = ndist; nextTarget = ne; }
                                        }
                                    });
                                    if (nextTarget) {
                                        let angle = Math.atan2(nextTarget.y - b.y, nextTarget.x - b.x);
                                        b.vx = Math.cos(angle) * b.speed; b.vy = Math.sin(angle) * b.speed;
                                        b.x += b.vx * 0.05; // tiny bump forward
                                    } else { bullets.splice(j, 1); }
                                }
                            } else {
                                bullets.splice(j, 1); 
                            }
                            break; 
                        }
                    }
                    if (enemy.hp <= 0) {
                        let numDeath = 7 + Math.floor(Math.random() * 5);
                        let colors = ['#6a040f', '#370617', '#9d0208', '#03071e'];
                        if (enemy.type === 'choir') colors = ['#3d0b6e', '#5e179e', '#2a004a', '#110022'];

                        for(let p = 0; p < numDeath; p++) {
                            let angle = Math.random() * Math.PI * 2; let speed = 15 + Math.random() * 65; let size = 1.2 + Math.random() * 3.0;
                            activeSplatter.push({
                                x: enemy.x + (Math.random()-0.5)*5, y: enemy.y + (Math.random()-0.5)*5,
                                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                                size, color: colors[Math.floor(Math.random() * colors.length)],
                                friction: 0.55 + Math.random() * 0.1, scaleX: 1.0 + Math.random() * 0.4, angle
                            });
                        }
                        let blobOffsets = [];
                        for(let b = 0; b < 14; b++) {
                            blobOffsets.push({ a: Math.random() * Math.PI * 2, distFrac: 0.15 + Math.random() * 0.45, rFrac: 0.55 + Math.random() * 0.55, ox: (Math.random()-0.5) * 0.25, oy: (Math.random()-0.5) * 0.2 });
                        }
                        
                        let bodyCol = '#0e0a0a'; if (enemy.type === 'kneeler') bodyCol = '#142e1c'; if (enemy.type === 'choir') bodyCol = '#2a1a36';
                        deadEnemies.push({
                            x: enemy.x, y: enemy.y, facingAngle: enemy.facingAngle || 0, legs: enemy.legs, life: 5.0, maxLife: 5.0,
                            growDuration: 4.5, puddleRadius: 2, maxPuddleRadius: 20 + Math.random() * 10, blobOffsets, bodyColor: bodyCol, type: enemy.type
                        });
                        
                        let gemType = 'blue'; if (enemy.type === 'kneeler') gemType = 'orange'; if (enemy.type === 'choir') gemType = 'purple';
                        gems.push(new Gem(enemy.x, enemy.y, gemType));
                        
                        enemies.splice(i, 1); enemiesKilledThisRoom++; totalKills++; triggerShake(6, 0.15);
                        if (enemiesKilledThisRoom === totalEnemiesThisRoom) { keys.push(new Key(enemy.x, enemy.y)); keyDroppedTimer = 3.0; }
                    }
                }

                for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].update(dt); if (bullets[i].life <= 0) bullets.splice(i, 1); }

                // Shockwave update (Church Bell)
                for (let i = shockwaves.length - 1; i >= 0; i--) {
                    let sw = shockwaves[i];
                    let prevRadius = sw.radius;
                    sw.life -= dt;
                    let progress = 1 - (sw.life / sw.maxLife);
                    sw.radius = sw.maxRadius * Math.sqrt(progress);
                    enemies.forEach(e => {
                        if (!sw.hitEnemies.has(e)) {
                            let dist = Math.sqrt((e.x - sw.x)**2 + (e.y - sw.y)**2);
                            if (dist <= sw.radius && dist >= prevRadius - 20) {
                                sw.hitEnemies.add(e);
                                e.hp -= sw.damage; e.hitCount++;
                                damageTexts.push({ x: e.x, y: e.y - 20, text: '-' + sw.damage, life: 0.6, vy: -38 });
                                for(let p=0; p<2; p++) activeSplatter.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*180, vy: (Math.random()-0.5)*180, size: Math.random()*3+1, color: e.type==='choir'?'#3d0b6e':'#6a040f', friction: 0.8, scaleX: 1, angle: 0 });
                            }
                        }
                    });
                    if (sw.life <= 0) shockwaves.splice(i, 1);
                }

                // Blood Syringe injection countdown & explosion
                enemies.forEach(e => {
                    if (e.injected > 0) {
                        e.injected -= dt;
                        if (e.injected <= 0) {
                            e.injected = 0;
                            let explodeDmg = 22;
                            enemies.forEach(other => {
                                let dx = other.x - e.x; let dy = other.y - e.y;
                                if (dx*dx + dy*dy < 8100) {
                                    other.hp -= explodeDmg; other.hitCount++;
                                    damageTexts.push({ x: other.x + (Math.random()-0.5)*16, y: other.y - 20, text: '-' + explodeDmg, life: 0.7, vy: -42 });
                                    for(let p=0; p<3; p++) activeSplatter.push({ x: other.x, y: other.y, vx: (Math.random()-0.5)*260, vy: (Math.random()-0.5)*260, size: Math.random()*4+2, color: other.type==='choir'?'#3d0b6e':'#8b0000', friction: 0.72, scaleX: 1, angle: 0 });
                                }
                            });
                            explosionEffects.push({ x: e.x, y: e.y, radius: 0, maxRadius: 90, life: 0.45, maxLife: 0.45 });
                            triggerShake(7, 0.18);
                        }
                    }
                });

                // Explosion effects update
                for (let i = explosionEffects.length - 1; i >= 0; i--) {
                    let ef = explosionEffects[i];
                    ef.life -= dt;
                    ef.radius = ef.maxRadius * Math.sqrt(1 - ef.life / ef.maxLife);
                    if (ef.life <= 0) explosionEffects.splice(i, 1);
                }

                for (let i = activeSplatter.length - 1; i >= 0; i--) {
                    let p = activeSplatter[i]; p.x += p.vx * dt; p.y += p.vy * dt;
                    p.x = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.x)); p.y = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.y));
                    let drag = Math.pow(p.friction, dt * 60); p.vx *= drag; p.vy *= drag;
                    if (Math.abs(p.vx) < 8 && Math.abs(p.vy) < 8) {
                        floorSplatters.push({x: p.x, y: p.y, size: p.size * 0.85, color: p.color, life: 5.0, scaleX: p.scaleX, angle: p.angle});
                        activeSplatter.splice(i, 1);
                    }
                }
                
                for (let i = floorSplatters.length - 1; i >= 0; i--) { floorSplatters[i].life -= dt; if (floorSplatters[i].life <= 0) floorSplatters.splice(i, 1); }

                for (let i = deadEnemies.length - 1; i >= 0; i--) {
                    let d = deadEnemies[i]; d.life -= dt;
                    let growFrac = Math.min(1, (d.maxLife - d.life) / d.growDuration);
                    let eased = 1 - Math.pow(1 - growFrac, 2.8); 
                    d.puddleRadius = 2 + (d.maxPuddleRadius - 2) * eased;
                    if (d.life <= 0) deadEnemies.splice(i, 1);
                }

                for (let i = damageTexts.length - 1; i >= 0; i--) { let d = damageTexts[i]; d.y += d.vy * dt; d.life -= dt; if (d.life <= 0) damageTexts.splice(i, 1); }
                
                if (player.pendingLevels > 0 && gameState === 'playing') {
                    player.pendingLevels--;
                    triggerLevelUp();
                }
            }

            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            let camX = player.x; let camY = player.y;

            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.scale(settings.zoom, settings.zoom);
            ctx.translate(-camX + currentShakeX, -camY + currentShakeY);

            drawRoom(ctx);
            drawExitDoor(ctx);

            deadEnemies.forEach(d => {
                const fadeStart = 2.0; const alpha = d.life > fadeStart ? 1.0 : (d.life / fadeStart); const pr = d.puddleRadius;
                ctx.save(); ctx.globalAlpha = alpha;

                ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.facingAngle); ctx.scale(1.32, 0.76); 
                d.blobOffsets.forEach(b => {
                    let bx = Math.cos(b.a) * pr * b.distFrac + b.ox * pr; let by = Math.sin(b.a) * pr * b.distFrac * 0.7 + b.oy * pr; let br = pr * b.rFrac;
                    let g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
                    if (d.type === 'choir') { g.addColorStop(0, 'rgba(61,11,110,0.80)'); g.addColorStop(0.55,'rgba(42,0,74,0.48)'); } 
                    else { g.addColorStop(0, 'rgba(90,4,4,0.80)'); g.addColorStop(0.55,'rgba(58,2,2,0.48)'); }
                    g.addColorStop(1, 'rgba(22,0,0,0)');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
                });

                const mainG = ctx.createRadialGradient(pr*0.05, pr*0.04, 0, 0, 0, pr * 0.9);
                if (d.type === 'choir') { mainG.addColorStop(0, 'rgba(42,26,54,0.98)'); mainG.addColorStop(0.28, 'rgba(29,14,46,0.95)'); mainG.addColorStop(0.55, 'rgba(17,0,34,0.84)'); } 
                else { mainG.addColorStop(0, 'rgba(72,3,3,0.98)'); mainG.addColorStop(0.28, 'rgba(55,2,2,0.95)'); mainG.addColorStop(0.55, 'rgba(40,1,1,0.84)'); }
                mainG.addColorStop(0.78, 'rgba(28,0,0,0.56)'); mainG.addColorStop(0.92, 'rgba(16,0,0,0.24)'); mainG.addColorStop(1, 'rgba(6,0,0,0)');
                ctx.fillStyle = mainG; ctx.beginPath(); ctx.arc(0, 0, pr * 0.9, 0, Math.PI * 2); ctx.fill();

                if (pr > 10) {
                    let sheenR = pr * 0.2; let sheenG = ctx.createRadialGradient(-pr*0.12, -pr*0.1, 0, -pr*0.12, -pr*0.1, sheenR);
                    if (d.type === 'choir') { sheenG.addColorStop(0, `rgba(94,23,158,${Math.min(0.28, pr/200)})`); } else { sheenG.addColorStop(0, `rgba(140,18,18,${Math.min(0.28, pr/200)})`); }
                    sheenG.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = sheenG; ctx.beginPath(); ctx.arc(-pr*0.12, -pr*0.1, sheenR, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();

                if (d.type === 'choir') {
                    ctx.save(); ctx.translate(d.x, d.y); ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
                    ctx.fillStyle = d.bodyColor || '#2a1a36';
                    ctx.beginPath(); ctx.arc(-8, -5, 14, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(8, 0, 14, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-2, 10, 14, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                } else {
                    if (d.legs) {
                        ctx.save(); ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.globalAlpha = alpha;
                        d.legs.forEach((leg, idx) => {
                            let attachX = d.x + Math.cos(d.facingAngle)*(leg.offsetX*0.5) - Math.sin(d.facingAngle)*(leg.offsetY*0.5);
                            let attachY = d.y + Math.sin(d.facingAngle)*(leg.offsetX*0.5) + Math.cos(d.facingAngle)*(leg.offsetY*0.5);
                            let sideSign = leg.offsetY < 0 ? -1 : 1;
                            let deadAng = d.facingAngle + sideSign * (Math.PI * 0.48) + (leg.offsetX < 0 ? Math.PI * 0.15 : -Math.PI * 0.05);
                            let legLen = 28 + idx * 2; let legEndX = d.x + Math.cos(deadAng) * legLen; let legEndY = d.y + Math.sin(deadAng) * legLen;
                            ctx.strokeStyle = '#1a1a1a'; ctx.beginPath(); ctx.moveTo(attachX, attachY);
                            let kneeX = attachX + Math.cos(deadAng) * legLen * 0.45; let kneeY = attachY + Math.sin(deadAng) * legLen * 0.45;
                            ctx.lineTo(kneeX, kneeY); ctx.stroke();
                            ctx.strokeStyle = '#141414'; ctx.beginPath(); ctx.moveTo(kneeX, kneeY); ctx.lineTo(legEndX, legEndY); ctx.stroke();
                        });
                        ctx.restore();
                    }
                    ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.facingAngle); ctx.globalAlpha = alpha; ctx.shadowColor = 'rgba(0,0,0,0.6)';
                    ctx.shadowBlur = 8; ctx.shadowOffsetY = 3; ctx.fillStyle = d.bodyColor || '#0e0a0a';
                    ctx.beginPath(); ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowColor = 'transparent'; ctx.fillStyle = d.bodyColor ? 'rgba(10,60,20,0.3)' : 'rgba(55,2,2,0.35)';
                    ctx.beginPath(); ctx.ellipse(-2, -2, 12, 6, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
                ctx.restore(); 
            });

            floorSplatters.forEach(s => {
                ctx.globalAlpha = Math.min(1, s.life / 2.5) * 0.72;
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle); ctx.scale(s.scaleX, 1);
                const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, s.size);
                sg.addColorStop(0, s.color); sg.addColorStop(1, 'rgba(22,0,0,0)');
                ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(0, 0, s.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            activeSplatter.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle); ctx.scale(p.scaleX, 1);
                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy); let rx = speed > 20 ? p.size + speed * 0.018 : p.size; let ry = p.size * 0.75;
                const ag = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(rx, ry));
                ag.addColorStop(0, p.color); ag.addColorStop(1, 'rgba(30,0,0,0)');
                ctx.fillStyle = ag; ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });
            
            trapdoor.draw(ctx);
            keys.forEach(k => k.draw(ctx));
            gems.forEach(g => g.draw(ctx));
            torches.forEach(t => t.draw(ctx));

            // Draw shockwaves (Church Bell)
            shockwaves.forEach(sw => {
                let alpha = (sw.life / sw.maxLife);
                ctx.save();
                ctx.globalAlpha = alpha * 0.75;
                ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI*2);
                ctx.strokeStyle = sw.color; ctx.lineWidth = 4;
                ctx.shadowColor = sw.color; ctx.shadowBlur = 18;
                ctx.stroke();
                ctx.globalAlpha = alpha * 0.12;
                ctx.fillStyle = sw.color; ctx.fill();
                ctx.globalAlpha = alpha * 0.35;
                ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius * 0.7, 0, Math.PI*2);
                ctx.strokeStyle = '#fffbe0'; ctx.lineWidth = 1.5; ctx.shadowBlur = 6;
                ctx.stroke();
                ctx.restore();
            });

            // Draw explosions (Blood Syringe)
            explosionEffects.forEach(ef => {
                let alpha = ef.life / ef.maxLife;
                ctx.save();
                let grad = ctx.createRadialGradient(ef.x, ef.y, 0, ef.x, ef.y, ef.radius);
                grad.addColorStop(0, `rgba(255,220,60,${alpha * 0.9})`);
                grad.addColorStop(0.3, `rgba(255,80,0,${alpha * 0.7})`);
                grad.addColorStop(0.7, `rgba(160,0,0,${alpha * 0.35})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.radius, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = alpha * 0.6;
                ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 2.5;
                ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 20;
                ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.radius, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            });

            bullets.forEach(bullet => bullet.draw(ctx));
            enemyBullets.forEach(eb => eb.draw(ctx));
            
            enemies.forEach(enemy => {
                enemy.drawBody(ctx);
                enemy.drawSmile(ctx);
                // Draw blood syringe injection indicator
                if (enemy.injected > 0) {
                    let pulse = 0.5 + Math.abs(Math.sin(Date.now() / 80)) * 0.5;
                    ctx.save();
                    ctx.translate(enemy.x, enemy.y);
                    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 12 + pulse * 8;
                    ctx.strokeStyle = `rgba(220,0,0,${0.5 + pulse * 0.5})`; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(0, 0, (enemy.radius || 18) + 5, 0, Math.PI*2); ctx.stroke();
                    // Syringe icon above enemy
                    ctx.shadowBlur = 0; ctx.fillStyle = `rgba(255,80,80,${0.7 + pulse * 0.3})`;
                    ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('💉', 0, -enemy.radius - 10);
                    ctx.restore();
                }
            }); 
            
            player.draw(ctx);

            damageTexts.forEach(d => {
                let alpha = Math.max(0, d.life / 0.6);
                ctx.globalAlpha = alpha;
                ctx.font = 'bold 10px "Barlow", Arial, sans-serif'; ctx.textAlign = 'center';
                ctx.fillStyle = '#cc3333'; ctx.shadowColor = 'rgba(0,0,0,1)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 1;
                ctx.fillText(d.text, d.x, d.y);
            });

            ctx.restore(); 

            drawLighting(ctx, camX, camY, currentShakeX, currentShakeY);

            if (player.hurtTimer > 0) {
                ctx.save();
                let alpha = (player.hurtTimer / 0.15) * 0.4; 
                let grad = ctx.createRadialGradient(width/2, height/2, height*0.4, width/2, height/2, height*0.8);
                grad.addColorStop(0, 'rgba(180, 0, 0, 0)'); grad.addColorStop(1, `rgba(180, 0, 0, ${alpha})`);
                ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height); ctx.restore();
            }

            if (roomTextTimer > 0) {
                let alpha = Math.min(1, roomTextTimer / 1.5); ctx.save(); ctx.globalAlpha = alpha;
                ctx.font = '700 40px "Bebas Neue", "Arial Black", Arial, sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(220,210,200,0.92)';
                ctx.shadowColor = 'rgba(0,0,0,0.95)'; ctx.shadowBlur = 22; ctx.shadowOffsetY = 3; ctx.fillText(`ROOM ${currentRoom}`, width/2, height/3); ctx.restore();
            }

            if (keyDroppedTimer > 0) {
                let alpha = Math.min(1, keyDroppedTimer / 1.5); ctx.save(); ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ffea00'; ctx.font = 'bold 30px system-ui, -apple-system, sans-serif'; ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,200,0,0.8)'; ctx.shadowBlur = 15; ctx.fillText(`KEY DROPPED!`, width/2, height/2 - 100); ctx.restore();
            }

            if (gameState === 'playing') {
                drawJoysticks(ctx);
            } else if (gameState === 'gameover') {
                if (Math.random() < 0.6) {
                    deathParticles.push({
                        x: Math.random() * width, y: height + 10, size: Math.random() * 3 + 0.5,
                        vx: (Math.random() - 0.5) * 25, vy: -15 - Math.random() * 60, life: 1.0, maxLife: 1.0,
                        alpha: Math.random() * 0.6 + 0.2, hue: Math.random() < 0.7 ? 0 : 15 
                    });
                }
                ctx.save();
                for (let i = deathParticles.length - 1; i >= 0; i--) {
                    let p = deathParticles[i];
                    p.x += p.vx * dt; p.y += p.vy * dt; p.vy -= dt * 5; p.vx += (Math.random() - 0.5) * 2; p.life -= dt;
                    let a = Math.max(0, (p.life / p.maxLife)) * p.alpha;
                    ctx.fillStyle = `hsla(${p.hue}, 90%, ${p.size > 1.5 ? 35 : 20}%, ${a})`; ctx.shadowColor = `hsla(${p.hue}, 100%, 40%, ${a * 0.6})`;
                    ctx.shadowBlur = 6; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    if (p.y < -20 || p.life <= 0) deathParticles.splice(i, 1);
                }
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
