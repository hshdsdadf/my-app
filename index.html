        class CeilingLight {
            constructor(x, y, w, h, angle) {
                this.x = x; this.y = y; this.w = w; this.h = h; this.angle = angle;
            }

            draw(ctx, camX, camY) {
                function getCorners(cx, cy, w, h, angle) {
                    const cos = Math.cos(angle); const sin = Math.sin(angle);
                    const pts = [ {x: -w/2, y: -h/2}, {x: w/2,  y: -h/2}, {x: w/2,  y: h/2}, {x: -w/2, y: h/2} ];
                    return pts.map(p => ({ x: cx + p.x * cos - p.y * sin, y: cy + p.x * sin + p.y * cos }));
                }

                const applyParallax = (worldPt, pFactor) => ({
                    x: worldPt.x + (worldPt.x - camX) * pFactor,
                    y: worldPt.y + (worldPt.y - camY) * pFactor
                });

                const pCeiling = 0.45; // Ceiling attachment point (highest parallax = closest to camera)
                const pLens = 0.38;    // The glowing lens (hangs down a bit closer to floor)

                const ceilingCorners = getCorners(this.x, this.y, this.w, this.h, this.angle).map(pt => applyParallax(pt, pCeiling));
                const lensCorners = getCorners(this.x, this.y, this.w, this.h, this.angle).map(pt => applyParallax(pt, pLens));

                ctx.save();
                ctx.lineJoin = 'round';

                // --- Base drop-shadow ---
                // We cast the shadow using only the lens boundaries so it doesn't get muddy
                ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                ctx.shadowBlur = 25;
                ctx.shadowOffsetY = 15;
                ctx.fillStyle = 'rgba(0,0,0,1)'; 
                ctx.beginPath();
                ctx.moveTo(lensCorners[0].x, lensCorners[0].y);
                for(let i=1; i<4; i++) ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                ctx.closePath();
                ctx.fill(); 

                // Clear shadow for crisp rendering of the physical light box
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // --- Draw Solid Metal Casing ---
                for(let i=0; i<4; i++) {
                    let j = (i+1)%4;
                    ctx.beginPath();
                    ctx.moveTo(ceilingCorners[i].x, ceilingCorners[i].y);
                    ctx.lineTo(ceilingCorners[j].x, ceilingCorners[j].y);
                    ctx.lineTo(lensCorners[j].x, lensCorners[j].y);
                    ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                    ctx.closePath();
                    
                    let dx = ceilingCorners[j].x - ceilingCorners[i].x;
                    let dy = ceilingCorners[j].y - ceilingCorners[i].y;
                    let nx = -dy; let ny = dx;
                    let len = Math.sqrt(nx*nx + ny*ny);
                    nx /= len; ny /= len;
                    
                    let dot = nx * -0.7 + ny * -0.7;
                    let brightness = Math.max(0.2, Math.min(1, (dot + 1) / 2));
                    
                    ctx.fillStyle = `rgb(${75*brightness}, ${80*brightness}, ${85*brightness})`;
                    ctx.fill();
                    ctx.strokeStyle = '#222222';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // --- Draw Lens Background (white glowing backplate) ---
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(lensCorners[0].x, lensCorners[0].y);
                for(let i=1; i<4; i++) ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                ctx.closePath();
                ctx.fill();

                // --- Draw Fluorescent Grid/Texture ---
                ctx.save();
                ctx.clip(); // Keep grating cleanly inside the lens border
                const lensCenter = applyParallax({x: this.x, y: this.y}, pLens);
                ctx.translate(lensCenter.x, lensCenter.y);
                ctx.rotate(this.angle); // Currently 0, but good for robust code
                
                ctx.strokeStyle = '#c5ccd6';
                ctx.lineWidth = 1.5;
                const gridStep = 8;
                for (let x = -this.w/2; x <= this.w/2; x += gridStep) {
                    ctx.beginPath(); ctx.moveTo(x, -this.h/2); ctx.lineTo(x, this.h/2); ctx.stroke();
                }
                for (let y = -this.h/2; y <= this.h/2; y += gridStep) {
                    ctx.beginPath(); ctx.moveTo(-this.w/2, y); ctx.lineTo(this.w/2, y); ctx.stroke();
                }
                ctx.restore();

                // --- Inner bright wash to simulate the bulb ---
                ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.beginPath();
                ctx.moveTo(lensCorners[0].x, lensCorners[0].y);
                for(let i=1; i<4; i++) ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        const ceilingLights = [
            new CeilingLight(ROOM_SIZE * 0.3, ROOM_SIZE * 0.3, 140, 35, 0),
            new CeilingLight(ROOM_SIZE * 0.7, ROOM_SIZE * 0.3, 140, 35, 0),
            new CeilingLight(ROOM_SIZE * 0.3, ROOM_SIZE * 0.7, 140, 35, 0),
            new CeilingLight(ROOM_SIZE * 0.7, ROOM_SIZE * 0.7, 140, 35, 0)
        ];

        // --- ENVIRONMENT ---
        function drawRoom(ctx) {
            ctx.fillStyle = '#1c1c22';
            ctx.fillRect(0, 0, ROOM_SIZE, ROOM_SIZE);

            const tileSize = 80;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.lineWidth = 2;

            for (let x = 0; x <= ROOM_SIZE; x += tileSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ROOM_SIZE); ctx.stroke();
            }
            for (let y = 0; y <= ROOM_SIZE; y += tileSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(ROOM_SIZE, y); ctx.stroke();
            }

            ctx.fillStyle = 'rgba(10, 15, 10, 0.2)';
            for(let x = 0; x < ROOM_SIZE; x+= tileSize) {
                for(let y = 0; y < ROOM_SIZE; y+= tileSize) {
                    let seed = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
                    let r = (seed - Math.floor(seed)) * 100;
                    
                    if(r < 20) {
                        ctx.beginPath();
                        ctx.arc(x + tileSize/2, y + tileSize/2, tileSize/1.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                    if(r > 85) {
                        ctx.fillStyle = 'rgba(50, 5, 5, 0.1)'; 
                        ctx.fillRect(x, y, tileSize, tileSize);
                        ctx.fillStyle = 'rgba(10, 15, 10, 0.2)';
                    }
                }
            }

            ctx.strokeStyle = '#050608'; 
            ctx.lineWidth = 40;
            ctx.strokeRect(0, 0, ROOM_SIZE, ROOM_SIZE);
        }

        // --- DYNAMIC LIGHTING ---
        function drawLighting(ctx, camX, camY, sx, sy) {
            lightCtx.globalCompositeOperation = 'source-over';
            
            let opacity = 1 - settings.brightness;
            lightCtx.fillStyle = `rgba(4, 4, 6, ${opacity})`; 
            lightCtx.fillRect(0, 0, width, height);

            lightCtx.globalCompositeOperation = 'destination-out';

            lightCtx.save();
            lightCtx.translate(width / 2, height / 2);
            lightCtx.scale(settings.zoom, settings.zoom);
            lightCtx.translate(-camX + sx, -camY + sy);

            ceilingLights.forEach(l => {
                const pFactor = 0.38; // Match the pLens height so the glow originates exactly from the grating
                const pX = l.x + (l.x - camX) * pFactor;
                const pY = l.y + (l.y - camY) * pFactor;
                
                const radius = 350;
                const grad = lightCtx.createRadialGradient(pX, pY, 10, pX, pY, radius);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.85)'); 
                grad.addColorStop(0.35, 'rgba(255, 255, 255, 0.3)');  
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');      
                
                lightCtx.fillStyle = grad;
                lightCtx.beginPath();
                // We use a pure circle (arc) now to avoid the ugly oval distortion
                lightCtx.arc(pX, pY, radius, 0, Math.PI * 2); 
                lightCtx.fill();
            });

            // Grinder ambient light — faint red from pit
            const grinderGlow = lightCtx.createRadialGradient(GRINDER_X, GRINDER_Y, 20, GRINDER_X, GRINDER_Y, 200);
            grinderGlow.addColorStop(0,   'rgba(160, 18, 8, 0.30)');
            grinderGlow.addColorStop(0.4, 'rgba(120, 10, 4, 0.14)');
            grinderGlow.addColorStop(1,   'rgba(60,  4, 2, 0)');
            lightCtx.fillStyle = grinderGlow;
            lightCtx.beginPath(); lightCtx.arc(GRINDER_X, GRINDER_Y, 200, 0, Math.PI * 2); lightCtx.fill();

            // Generator warning lamps cut a small red pocket through the room darkness.
            const generatorPulse = 0.45 + Math.abs(Math.sin(lastTime / 180)) * 0.35;
            const genGlowX = generator.x + Math.cos(GENERATOR_ANGLE) * 58 - Math.sin(GENERATOR_ANGLE) * -2;
            const genGlowY = generator.y + Math.sin(GENERATOR_ANGLE) * 58 + Math.cos(GENERATOR_ANGLE) * -2;
            const generatorGlow = lightCtx.createRadialGradient(genGlowX, genGlowY, 4, genGlowX, genGlowY, 145);
            generatorGlow.addColorStop(0, `rgba(255, 20, 12, ${0.42 + generatorPulse * 0.28})`);
            generatorGlow.addColorStop(0.28, `rgba(180, 8, 4, ${0.18 + generatorPulse * 0.12})`);
            generatorGlow.addColorStop(1, 'rgba(60, 0, 0, 0)');
            lightCtx.fillStyle = generatorGlow;
            lightCtx.beginPath(); lightCtx.arc(genGlowX, genGlowY, 145, 0, Math.PI * 2); lightCtx.fill();

            enemyBullets.forEach(eb => {
                const grad = lightCtx.createRadialGradient(eb.x, eb.y, 0, eb.x, eb.y, 40);
                grad.addColorStop(0, 'rgba(210, 85, 255, 0.6)'); grad.addColorStop(1, 'rgba(210, 85, 255, 0)');
                lightCtx.fillStyle = grad; lightCtx.beginPath(); lightCtx.arc(eb.x, eb.y, 40, 0, Math.PI*2); lightCtx.fill();
            });

            enemies.forEach(enemy => {
                if (enemy.type === 'kneeler' && enemy.state === 'frozen') {
                    const kGlow = lightCtx.createRadialGradient(enemy.drawX, enemy.drawY, 2, enemy.drawX, enemy.drawY, 40);
                    kGlow.addColorStop(0, 'rgba(0,255,80,0.45)'); kGlow.addColorStop(1, 'rgba(0,255,80,0)');
                    lightCtx.fillStyle = kGlow; lightCtx.beginPath(); lightCtx.arc(enemy.drawX, enemy.drawY, 40, 0, Math.PI*2); lightCtx.fill();
                } else if (enemy.type === 'choir') {
                    const sGrad = lightCtx.createRadialGradient(enemy.drawX, enemy.drawY, 5, enemy.drawX, enemy.drawY, 60);
                    sGrad.addColorStop(0, 'rgba(180, 80, 255, 0.5)'); sGrad.addColorStop(1, 'rgba(180, 80, 255, 0)');
                    lightCtx.fillStyle = sGrad; lightCtx.beginPath(); lightCtx.arc(enemy.drawX, enemy.drawY, 60, 0, Math.PI*2); lightCtx.fill();
                } else if (enemy.type === 'smiler') {
                    const smileX = enemy.drawX + Math.cos(enemy.drawAngle) * 18; const smileY = enemy.drawY + Math.sin(enemy.drawAngle) * 18;
                    const sGrad = lightCtx.createRadialGradient(smileX, smileY, 2, smileX, smileY, 25);
                    sGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)'); sGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    lightCtx.fillStyle = sGrad; lightCtx.beginPath(); lightCtx.arc(smileX, smileY, 25, 0, Math.PI*2); lightCtx.fill();
                }
            });

            if (player.flashL > 0) drawMuzzleLight(player.muzzleX_L, player.muzzleY_L, player.flashL);
            if (player.flashR > 0) drawMuzzleLight(player.muzzleX_R, player.muzzleY_R, player.flashR);

            function drawMuzzleLight(x, y, flashAmount) {
                const fRadius = 250 * (flashAmount / 0.1); 
                const fGrad = lightCtx.createRadialGradient(x, y, 5, x, y, fRadius);
                fGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)'); fGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                lightCtx.fillStyle = fGrad; lightCtx.beginPath(); lightCtx.arc(x, y, fRadius, 0, Math.PI*2); lightCtx.fill();
            }

            lightCtx.restore();

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(lightCanvas, 0, 0);
            ctx.restore();
        }

        // --- UI / JOYSTICKS ---
        function drawJoysticks(ctx) {
            ctx.lineWidth = 3;
            if (input.left.active) {
                ctx.beginPath(); ctx.arc(input.left.baseX, input.left.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)'; ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.stroke();
                ctx.beginPath(); ctx.arc(input.left.currentX, input.left.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; ctx.fill();
            }
        }

        // --- MAIN LOOP ---
        const player = new Player();
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000; 
            lastTime = currentTime;
            if (dt > 0.1) dt = 0.1; 

            if (gameState === 'countdown') {
                countdownTimer -= dt;
                if (countdownTimer <= 0) {
                    countdownValue--;
                    if (countdownValue > 0) {
                        countdownTimer = 0.5; 
                        triggerCountdownAnim(countdownValue);
                    } else {
                        setGameState('playing');
                    }
                }
            }

            if (gameState === 'playing') {
                timeAlive += dt; // Track score

                // --- GRINDER UPDATE ---
                grinderAngle += 9.0 * dt; // fast spin
                const generatorPower = Math.min(1, 0.35 + timeAlive / 12);
                generatorFanAngle += (18 + generatorPower * 32) * dt;
                generatorFlywheelAngle += (7 + generatorPower * 22) * dt;

                // Proximity rumble: shake when player near grinder
                const gdx = player.x - GRINDER_X, gdy = player.y - GRINDER_Y;
                const gDist = Math.sqrt(gdx*gdx + gdy*gdy);
                if (gDist < GRINDER_OUTER_R + 80) {
                    const proximity = 1 - Math.max(0, (gDist - GRINDER_PIT_R) / 80);
                    triggerShake(3.5 * proximity, 0.05);
                }
                // Kill player if they fall in
                if (gDist < GRINDER_DAMAGE_R) {
                    player.hp -= 120 * dt;
                    player.hurtTimer = 0.15;
                    updateHUD();
                    triggerShake(8, 0.12);
                    if (player.hp <= 0 && gameState === 'playing') {
                        setGameState('gameover');
                    }
                }

                if (shakeTime > 0) {
                    shakeTime -= dt;
                    currentShakeX = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                    currentShakeY = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                } else {
                    currentShakeX = 0; currentShakeY = 0;
                }

                player.update(dt);
                updateGeneratorPhysics(dt, player);

                // Update Enemy Bullets
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    let eb = enemyBullets[i]; eb.update(dt);
                    let dx = player.x - eb.x; let dy = player.y - eb.y;
                    if (dx*dx + dy*dy < (player.radius + eb.radius) * (player.radius + eb.radius)) {
                        player.hp -= eb.damage; player.hurtTimer = 0.15; updateHUD();
                        damageTexts.push({ x: player.x + (Math.random() - 0.5) * 16, y: player.y - 30, text: "-" + eb.damage, life: 0.7, vy: -55 - Math.random() * 20 });
                        triggerShake(4, 0.1); enemyBullets.splice(i, 1);
                        
                        if (player.hp <= 0 && gameState === 'playing') {
                            lastDeathCause = 'the Choir'; setGameState('gameover');
                        }
                        continue;
                    }
                    if (eb.life <= 0) enemyBullets.splice(i, 1);
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i]; enemy.update(dt, player, enemies);

                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        if (b.hitEnemies && b.hitEnemies.has(enemy)) continue;

                        let dx = enemy.x - b.x; let dy = enemy.y - b.y;
                        if (dx*dx + dy*dy < enemy.radius * enemy.radius) {
                            enemy.hp -= b.damage; enemy.hitCount++;
                            damageTexts.push({ x: enemy.x + (Math.random() - 0.5) * 20, y: enemy.y - 20, text: "-" + b.damage, life: 0.6, vy: -40 - Math.random() * 20 });

                            // Bottle Shatter
                            if (b.type === 'bottle') {
                                for(let p=0; p<6; p++) {
                                    activeSplatter.push({
                                        x: enemy.x, y: enemy.y, vx: (Math.random()-0.5)*300, vy: (Math.random()-0.5)*300,
                                        size: Math.random()*2+1, color: '#2e8b57', friction: 0.9, scaleX: 1, angle: 0
                                    });
                                }
                                triggerShake(3, 0.1);
                            }

                            if (enemy.hitCount % 3 === 0) {
                                let hitAngle = Math.atan2(b.vy, b.vx); let numHit = 1 + Math.floor(Math.random() * 2);
                                for(let p = 0; p < numHit; p++) {
                                    let spread = (Math.random() - 0.5) * 0.6; let speed = 10 + Math.random() * 22; let size = 0.7 + Math.random() * 1.1;
                                    let colors = ['#100000']; if (enemy.type === 'choir') colors = ['#2a004a', '#110022'];
                                    activeSplatter.push({
                                        x: enemy.x + (Math.random()-0.5)*3, y: enemy.y + (Math.random()-0.5)*3,
                                        vx: Math.cos(hitAngle + spread) * speed, vy: Math.sin(hitAngle + spread) * speed,
                                        size, color: colors[0], friction: 0.50, scaleX: 1.0 + Math.random() * 0.3, angle: hitAngle + spread
                                    });
                                }
                            }
                            
                            // Handling bullet pierce and bounce
                            if (b.pierceCount > 0) {
                                b.hitEnemies.add(enemy); b.pierceCount--;
                                if (b.pierceCount <= 0) bullets.splice(j, 1);
                            } else if (b.bounceCount > 0) {
                                b.hitEnemies.add(enemy); b.bounceCount--;
                                if (b.bounceCount <= 0) { bullets.splice(j, 1); } 
                                else {
                                    let nextTarget = null; let minDist = Infinity;
                                    enemies.forEach(ne => {
                                        if (!b.hitEnemies.has(ne)) {
                                            let ndist = (ne.x - b.x)**2 + (ne.y - b.y)**2;
                                            if (ndist < minDist) { minDist = ndist; nextTarget = ne; }
                                        }
                                    });
                                    if (nextTarget) {
                                        let angle = Math.atan2(nextTarget.y - b.y, nextTarget.x - b.x);
                                        b.vx = Math.cos(angle) * b.speed; b.vy = Math.sin(angle) * b.speed;
                                        b.x += b.vx * 0.05; // tiny bump forward
                                    } else { bullets.splice(j, 1); }
                                }
                            } else {
                                bullets.splice(j, 1); 
                            }
                            break; 
                        }
                    }
                    if (enemy.hp <= 0) {
                        let numDeath = 7 + Math.floor(Math.random() * 5);
                        let colors = ['#6a040f', '#370617', '#9d0208', '#03071e'];
                        if (enemy.type === 'choir') colors = ['#3d0b6e', '#5e179e', '#2a004a', '#110022'];

                        for(let p = 0; p < numDeath; p++) {
                            let angle = Math.random() * Math.PI * 2; let speed = 15 + Math.random() * 65; let size = 1.2 + Math.random() * 3.0;
                            activeSplatter.push({
                                x: enemy.x + (Math.random()-0.5)*5, y: enemy.y + (Math.random()-0.5)*5,
                                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                                size, color: colors[Math.floor(Math.random() * colors.length)],
                                friction: 0.55 + Math.random() * 0.1, scaleX: 1.0 + Math.random() * 0.4, angle
                            });
                        }
                        let blobOffsets = [];
                        for(let b = 0; b < 14; b++) {
                            blobOffsets.push({ a: Math.random() * Math.PI * 2, distFrac: 0.15 + Math.random() * 0.45, rFrac: 0.55 + Math.random() * 0.55, ox: (Math.random()-0.5) * 0.25, oy: (Math.random()-0.5) * 0.2 });
                        }
                        
                        let bodyCol = '#0e0a0a'; if (enemy.type === 'kneeler') bodyCol = '#142e1c'; if (enemy.type === 'choir') bodyCol = '#2a1a36';
                        deadEnemies.push({
                            x: enemy.x, y: enemy.y, facingAngle: enemy.facingAngle || 0, legs: enemy.legs, life: 5.0, maxLife: 5.0,
                            growDuration: 4.5, puddleRadius: 2, maxPuddleRadius: 20 + Math.random() * 10, blobOffsets, bodyColor: bodyCol, type: enemy.type
                        });
                        
                        enemies.splice(i, 1); totalKills++; triggerShake(6, 0.15);
                    }
                }

                for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].update(dt); if (bullets[i].life <= 0) bullets.splice(i, 1); }

                // Update shell casings
                for (let i = shellCasings.length - 1; i >= 0; i--) {
                    const c = shellCasings[i];
                    if (c.fading) {
                        c.alpha -= dt / c.fadeDuration;
                        if (c.alpha <= 0) { shellCasings.splice(i, 1); continue; }
                        continue;
                    }
                    if (c.atRest) {
                        c.restTimer += dt;
                        if (c.restTimer >= c.restDelay) { c.fading = true; }
                        continue;
                    }
                    // Gravity
                    const GRAVITY = 420;
                    c.vz -= GRAVITY * dt;
                    c.z  += c.vz * dt;
                    c.x  += c.vx * dt;
                    c.y  += c.vy * dt;
                    c.rotation += c.rotSpeed * dt;
                    // Floor bounce
                    if (c.z <= 0) {
                        c.z = 0;
                        c.bounces++;
                        if (c.bounces >= c.maxBounces) {
                            c.vx = 0; c.vy = 0; c.vz = 0;
                            c.atRest = true;
                        } else {
                            const bounceFac = 0.35 - c.bounces * 0.08;
                            c.vz = Math.abs(c.vz) * bounceFac;
                            c.vx *= 0.45;
                            c.vy *= 0.45;
                            c.rotSpeed *= 0.55;
                        }
                    }
                    // Clamp to room
                    c.x = Math.max(22, Math.min(ROOM_SIZE - 22, c.x));
                    c.y = Math.max(22, Math.min(ROOM_SIZE - 22, c.y));
                }

                for (let i = activeSplatter.length - 1; i >= 0; i--) {
                    let p = activeSplatter[i]; p.x += p.vx * dt; p.y += p.vy * dt;
                    p.x = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.x)); p.y = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.y));
                    let drag = Math.pow(p.friction, dt * 60); p.vx *= drag; p.vy *= drag;
                    if (Math.abs(p.vx) < 8 && Math.abs(p.vy) < 8) {
                        floorSplatters.push({x: p.x, y: p.y, size: p.size * 0.85, color: p.color, life: 5.0, scaleX: p.scaleX, angle: p.angle});
                        activeSplatter.splice(i, 1);
                    }
                }
                
                for (let i = floorSplatters.length - 1; i >= 0; i--) { floorSplatters[i].life -= dt; if (floorSplatters[i].life <= 0) floorSplatters.splice(i, 1); }

                for (let i = deadEnemies.length - 1; i >= 0; i--) {
                    let d = deadEnemies[i]; d.life -= dt;
                    let growFrac = Math.min(1, (d.maxLife - d.life) / d.growDuration);
                    let eased = 1 - Math.pow(1 - growFrac, 2.8); 
                    d.puddleRadius = 2 + (d.maxPuddleRadius - 2) * eased;
                    if (d.life <= 0) deadEnemies.splice(i, 1);
                }

                for (let i = damageTexts.length - 1; i >= 0; i--) { let d = damageTexts[i]; d.y += d.vy * dt; d.life -= dt; if (d.life <= 0) damageTexts.splice(i, 1); }
            }

            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            let camX = player.x; let camY = player.y;

            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.scale(settings.zoom, settings.zoom);
            ctx.translate(-camX + currentShakeX, -camY + currentShakeY);

            // Draw World Elements
            drawRoom(ctx);
            drawGrinder(ctx, lastTime / 1000);

            deadEnemies.forEach(d => {
                const fadeStart = 2.0; const alpha = d.life > fadeStart ? 1.0 : (d.life / fadeStart); const pr = d.puddleRadius;
                ctx.save(); ctx.globalAlpha = alpha;

                ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.facingAngle); ctx.scale(1.32, 0.76); 
                d.blobOffsets.forEach(b => {
                    let bx = Math.cos(b.a) * pr * b.distFrac + b.ox * pr; let by = Math.sin(b.a) * pr * b.distFrac * 0.7 + b.oy * pr; let br = pr * b.rFrac;
                    let g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
                    if (d.type === 'choir') { g.addColorStop(0, 'rgba(61,11,110,0.80)'); g.addColorStop(0.55,'rgba(42,0,74,0.48)'); } 
                    else { g.addColorStop(0, 'rgba(90,4,4,0.80)'); g.addColorStop(0.55,'rgba(58,2,2,0.48)'); }
                    g.addColorStop(1, 'rgba(22,0,0,0)');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
                });

                const mainG = ctx.createRadialGradient(pr*0.05, pr*0.04, 0, 0, 0, pr * 0.9);
                if (d.type === 'choir') { mainG.addColorStop(0, 'rgba(42,26,54,0.98)'); mainG.addColorStop(0.28, 'rgba(29,14,46,0.95)'); mainG.addColorStop(0.55, 'rgba(17,0,34,0.84)'); } 
                else { mainG.addColorStop(0, 'rgba(72,3,3,0.98)'); mainG.addColorStop(0.28, 'rgba(55,2,2,0.95)'); mainG.addColorStop(0.55, 'rgba(40,1,1,0.84)'); }
                mainG.addColorStop(0.78, 'rgba(28,0,0,0.56)'); mainG.addColorStop(0.92, 'rgba(16,0,0,0.24)'); mainG.addColorStop(1, 'rgba(6,0,0,0)');
                ctx.fillStyle = mainG; ctx.beginPath(); ctx.arc(0, 0, pr * 0.9, 0, Math.PI * 2); ctx.fill();

                if (pr > 10) {
                    let sheenR = pr * 0.2; let sheenG = ctx.createRadialGradient(-pr*0.12, -pr*0.1, 0, -pr*0.12, -pr*0.1, sheenR);
                    if (d.type === 'choir') { sheenG.addColorStop(0, `rgba(94,23,158,${Math.min(0.28, pr/200)})`); } else { sheenG.addColorStop(0, `rgba(140,18,18,${Math.min(0.28, pr/200)})`); }
                    sheenG.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = sheenG; ctx.beginPath(); ctx.arc(-pr*0.12, -pr*0.1, sheenR, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();

                if (d.type === 'choir') {
                    ctx.save(); ctx.translate(d.x, d.y); ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
                    ctx.fillStyle = d.bodyColor || '#2a1a36';
                    ctx.beginPath(); ctx.arc(-8, -5, 14, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(8, 0, 14, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-2, 10, 14, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                } else {
                    if (d.legs) {
                        ctx.save(); ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.globalAlpha = alpha;
                        d.legs.forEach((leg, idx) => {
                            let attachX = d.x + Math.cos(d.facingAngle)*(leg.offsetX*0.5) - Math.sin(d.facingAngle)*(leg.offsetY*0.5);
                            let attachY = d.y + Math.sin(d.facingAngle)*(leg.offsetX*0.5) + Math.cos(d.facingAngle)*(leg.offsetY*0.5);
                            let sideSign = leg.offsetY < 0 ? -1 : 1;
                            let deadAng = d.facingAngle + sideSign * (Math.PI * 0.48) + (leg.offsetX < 0 ? Math.PI * 0.15 : -Math.PI * 0.05);
                            let legLen = 28 + idx * 2; let legEndX = d.x + Math.cos(deadAng) * legLen; let legEndY = d.y + Math.sin(deadAng) * legLen;
                            ctx.strokeStyle = '#1a1a1a'; ctx.beginPath(); ctx.moveTo(attachX, attachY);
                            let kneeX = attachX + Math.cos(deadAng) * legLen * 0.45; let kneeY = attachY + Math.sin(deadAng) * legLen * 0.45;
                            ctx.lineTo(kneeX, kneeY); ctx.stroke();
                            ctx.strokeStyle = '#141414'; ctx.beginPath(); ctx.moveTo(kneeX, kneeY); ctx.lineTo(legEndX, legEndY); ctx.stroke();
                        });
                        ctx.restore();
                    }
                    ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.facingAngle); ctx.globalAlpha = alpha; ctx.shadowColor = 'rgba(0,0,0,0.6)';
                    ctx.shadowBlur = 8; ctx.shadowOffsetY = 3; ctx.fillStyle = d.bodyColor || '#0e0a0a';
                    ctx.beginPath(); ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowColor = 'transparent'; ctx.fillStyle = d.bodyColor ? 'rgba(10,60,20,0.3)' : 'rgba(55,2,2,0.35)';
                    ctx.beginPath(); ctx.ellipse(-2, -2, 12, 6, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
                ctx.restore(); 
            });

            // Draw shell casings (on floor, below splatter)
            shellCasings.forEach(c => {
                ctx.save();
                ctx.globalAlpha = c.alpha;
                ctx.translate(c.x, c.y);

                // Shadow (only when airborne or just landed)
                if (!c.atRest || c.z > 0) {
                    const shadowScale = Math.max(0.2, 1 - c.z / 80);
                    ctx.save();
                    ctx.globalAlpha = c.alpha * 0.35 * shadowScale;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.beginPath();
                    ctx.ellipse(c.z * 0.3, c.z * 0.15, 5 * shadowScale, 2.5 * shadowScale, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // Casing body — translate up by z to simulate height
                ctx.translate(0, -c.z * 0.4);
                ctx.rotate(c.rotation);

                // Brass body
                const casingLen = 7, casingW = 2.8;
                const brassGrad = ctx.createLinearGradient(-casingLen, -casingW, -casingLen, casingW);
                brassGrad.addColorStop(0,   '#8a6a10');
                brassGrad.addColorStop(0.3, '#c9920a');
                brassGrad.addColorStop(0.55,'#e8b820');
                brassGrad.addColorStop(0.75,'#b07c0c');
                brassGrad.addColorStop(1,   '#6a4e08');
                ctx.fillStyle = brassGrad;
                // Rounded rect body
                ctx.beginPath();
                ctx.roundRect(-casingLen, -casingW, casingLen * 1.8, casingW * 2, casingW * 0.6);
                ctx.fill();

                // Rim/base (darker end cap)
                ctx.fillStyle = '#5a3e06';
                ctx.beginPath();
                ctx.ellipse(-casingLen + 1, 0, casingW * 0.85, casingW, 0, 0, Math.PI * 2);
                ctx.fill();

                // Highlight streak
                ctx.strokeStyle = 'rgba(255,220,80,0.45)';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(-casingLen + 2, -casingW + 0.6);
                ctx.lineTo(casingLen * 0.6, -casingW + 0.6);
                ctx.stroke();

                ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            floorSplatters.forEach(s => {
                ctx.globalAlpha = Math.min(1, s.life / 2.5) * 0.72;
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle); ctx.scale(s.scaleX, 1);
                const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, s.size);
                sg.addColorStop(0, s.color); sg.addColorStop(1, 'rgba(22,0,0,0)');
                ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(0, 0, s.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            activeSplatter.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle); ctx.scale(p.scaleX, 1);
                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy); let rx = speed > 20 ? p.size + speed * 0.018 : p.size; let ry = p.size * 0.75;
                const ag = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(rx, ry));
                ag.addColorStop(0, p.color); ag.addColorStop(1, 'rgba(30,0,0,0)');
                ctx.fillStyle = ag; ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });

            drawGenerator(ctx, lastTime / 1000);
            
            bullets.forEach(bullet => bullet.draw(ctx));
            enemyBullets.forEach(eb => eb.draw(ctx));
            
            enemies.forEach(enemy => {
                enemy.drawBody(ctx);
                enemy.drawSmile(ctx);
            }); 
            
            player.draw(ctx);
            drawPlayerPushContact(ctx, player);

            damageTexts.forEach(d => {
                let alpha = Math.max(0, d.life / 0.6);
                ctx.globalAlpha = alpha;
                ctx.font = 'bold 10px "Barlow", Arial, sans-serif'; ctx.textAlign = 'center';
                ctx.fillStyle = '#cc3333'; ctx.shadowColor = 'rgba(0,0,0,1)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 1;
                ctx.fillText(d.text, d.x, d.y);
            });

            // DRAW CEILING LIGHTS AFTER EVERYTHING ELSE (so they sit above the player)
            ceilingLights.forEach(l => l.draw(ctx, camX, camY));

            ctx.restore(); 

            drawLighting(ctx, camX, camY, currentShakeX, currentShakeY);

            if (player.hurtTimer > 0) {
                ctx.save();
                let alpha = (player.hurtTimer / 0.15) * 0.4; 
                let grad = ctx.createRadialGradient(width/2, height/2, height*0.4, width/2, height/2, height*0.8);
                grad.addColorStop(0, 'rgba(180, 0, 0, 0)'); grad.addColorStop(1, `rgba(180, 0, 0, ${alpha})`);
                ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height); ctx.restore();
            }

            if (gameState === 'playing') {
                drawJoysticks(ctx);
            } else if (gameState === 'gameover') {
                if (Math.random() < 0.6) {
                    deathParticles.push({
                        x: Math.random() * width, y: height + 10, size: Math.random() * 3 + 0.5,
                        vx: (Math.random() - 0.5) * 25, vy: -15 - Math.random() * 60, life: 1.0, maxLife: 1.0,
                        alpha: Math.random() * 0.6 + 0.2, hue: Math.random() < 0.7 ? 0 : 15 
                    });
                }
                ctx.save();
                for (let i = deathParticles.length - 1; i >= 0; i--) {
                    let p = deathParticles[i];
                    p.x += p.vx * dt; p.y += p.vy * dt; p.vy -= dt * 5; p.vx += (Math.random() - 0.5) * 2; p.life -= dt;
                    let a = Math.max(0, (p.life / p.maxLife)) * p.alpha;
                    ctx.fillStyle = `hsla(${p.hue}, 90%, ${p.size > 1.5 ? 35 : 20}%, ${a})`; ctx.shadowColor = `hsla(${p.hue}, 100%, 40%, ${a * 0.6})`;
                    ctx.shadowBlur = 6; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    if (p.y < -20 || p.life <= 0) deathParticles.splice(i, 1);
                }
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
