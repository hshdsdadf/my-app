        class Player {
            constructor() {
                this.hp = 100;
                this.maxHp = 100;
                this.xp = 0;
                this.maxXp = 100;
                this.level = 1;
                this.weapons = 2; // dual pistols

                this.x = 200; 
                this.y = ROOM_SIZE / 2; 
                this.radius = 35;
                this.speed = 400; 
                this.animTime = 0;
                this.facingAngle = 0; 
                
                this.fireRate = 0.12; 
                this.fireTimer = 0;
                this.leftGunNext = true; 
                this.recoilL = 0;
                this.recoilR = 0;
                this.flashL = 0;
                this.flashR = 0;
                this.hurtTimer = 0;
                
                this.muzzleX_L = 0; this.muzzleY_L = 0;
                this.muzzleX_R = 0; this.muzzleY_R = 0;

                this.isDashing = false;
                this.dashTime = 0;
                this.dashDuration = 0.15; 
                this.dashSpeed = 1600;
                this.dashCooldown = 0;
                this.dashMaxCooldown = 0.8; 
                this.dashDirX = 0;
                this.dashDirY = 0;
                this.dashParticles = [];
                this.dashRings = [];
            }

            tryDash() {
                if (!this.isDashing && this.dashCooldown <= 0) {
                    let dx = 0, dy = 0;
                    
                    if (input.left.magnitude > 0.1) {
                        dx = input.left.vectorX;
                        dy = input.left.vectorY;
                    } else {
                        dx = Math.cos(this.facingAngle);
                        dy = Math.sin(this.facingAngle);
                    }
                    
                    const mag = Math.sqrt(dx*dx + dy*dy);
                    if (mag > 0) {
                        this.dashDirX = dx / mag;
                        this.dashDirY = dy / mag;
                        this.isDashing = true;
                        this.dashTime = this.dashDuration;
                        this.dashCooldown = this.dashMaxCooldown;
                        
                        this.dashRings.push({x: this.x, y: this.y, radius: 15, life: 0.2, maxLife: 0.2});
                    }
                }
            }

            update(dt) {
                if (this.hurtTimer > 0) this.hurtTimer -= dt;

                if (input.right.doubleTapped) {
                    this.tryDash();
                    input.right.doubleTapped = false; 
                }

                const moveMag = input.left.magnitude;
                const leanAngle = (moveMag > 0.1) ? input.left.vectorX * 0.15 * moveMag : 0;

                this.dashCooldown -= dt;

                if (this.isDashing) {
                    this.dashTime -= dt;
                    
                    this.dashParticles.push({
                        x: this.x + (Math.random() - 0.5) * 30,
                        y: this.y + (Math.random() - 0.5) * 30,
                        vx: -this.dashDirX * (800 + Math.random() * 400),
                        vy: -this.dashDirY * (800 + Math.random() * 400),
                        life: 0.15,
                        maxLife: 0.15,
                        size: Math.random() * 3 + 1
                    });
                    
                    this.x += this.dashDirX * this.dashSpeed * dt;
                    this.y += this.dashDirY * this.dashSpeed * dt;
                    
                    if (this.dashTime <= 0) {
                        this.isDashing = false;
                    }
                } else if (moveMag > 0) {
                    this.x += input.left.vectorX * this.speed * moveMag * dt;
                    this.y += input.left.vectorY * this.speed * moveMag * dt;
                    this.animTime += dt * (10 + moveMag * 15); 
                } else {
                    this.animTime += dt * 3;
                }

                for (let i = this.dashParticles.length - 1; i >= 0; i--) {
                    let p = this.dashParticles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    if (p.life <= 0) this.dashParticles.splice(i, 1);
                }
                for (let i = this.dashRings.length - 1; i >= 0; i--) {
                    let r = this.dashRings[i];
                    r.life -= dt;
                    r.radius += dt * 500; 
                    if (r.life <= 0) this.dashRings.splice(i, 1);
                }
                
                const wallThickness = 20;
                this.x = Math.max(this.radius + wallThickness, Math.min(ROOM_SIZE - this.radius - wallThickness, this.x));
                this.y = Math.max(this.radius + wallThickness, Math.min(ROOM_SIZE - this.radius - wallThickness, this.y));

                if (input.right.active && input.right.magnitude > 0.1) {
                    this.facingAngle = Math.atan2(input.right.vectorY, input.right.vectorX);
                } else if (input.left.active && moveMag > 0.1) {
                    this.facingAngle = Math.atan2(input.left.vectorY, input.left.vectorX);
                }

                this.recoilL = Math.max(0, this.recoilL - dt * 60);
                this.recoilR = Math.max(0, this.recoilR - dt * 60);
                this.flashL = Math.max(0, this.flashL - dt * 5);
                this.flashR = Math.max(0, this.flashR - dt * 5);

                this.fireTimer -= dt;
                if (!this.isDashing && input.right.active && input.right.magnitude > 0.1 && this.fireTimer <= 0) {
                    this.shoot();
                    this.fireTimer = this.fireRate;
                    triggerShake(2, 0.1); 
                }

                // Check death condition
                if (this.hp <= 0 && gameState === 'playing') {
                    setGameState('gameover');
                }
            }

            shoot() {
                const gunOffsetX = this.leftGunNext ? -25 : 25;
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (this.leftGunNext ? 0 : Math.PI)) * 5 : 0;
                const gunOffsetY = 12 + sway;
                
                const isMoving = input.left.magnitude > 0.1;
                const runIntensity = input.left.magnitude; 
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); 
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; 
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; 

                const scaledY = gunOffsetY * breathScale;
                const rotatedX = gunOffsetX * Math.cos(leanAngle) - scaledY * Math.sin(leanAngle);
                const rotatedY = gunOffsetX * Math.sin(leanAngle) + scaledY * Math.cos(leanAngle);
                
                const pivotX = this.x + rotatedX;
                const pivotY = this.y - bobbing + rotatedY;
                
                const barrelLength = 25;
                const tipX = pivotX + Math.cos(this.facingAngle) * barrelLength;
                const tipY = pivotY + Math.sin(this.facingAngle) * barrelLength;

                bullets.push(new Bullet(tipX, tipY, this.facingAngle));

                if (this.leftGunNext) {
                    this.recoilL = 12; 
                    this.flashL = 0.1; 
                    this.muzzleX_L = tipX; this.muzzleY_L = tipY;
                } else {
                    this.recoilR = 12;
                    this.flashR = 0.1;
                    this.muzzleX_R = tipX; this.muzzleY_R = tipY;
                }
                this.leftGunNext = !this.leftGunNext; 
            }

            draw(ctx) {
                const isMoving = input.left.magnitude > 0.1;
                const runIntensity = input.left.magnitude; 
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); 
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; 
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; 

                this.dashParticles.forEach(p => {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 0.05, p.y - p.vy * 0.05);
                    ctx.strokeStyle = `rgba(200, 210, 220, ${alpha * 0.7})`;
                    ctx.lineWidth = p.size;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    ctx.restore();
                });

                this.dashRings.forEach(r => {
                    const alpha = Math.max(0, r.life / r.maxLife);
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(220, 230, 240, ${alpha * 0.5})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.restore();
                });

                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(0, 35 - bobbing*0.5, 30 - bobbing, 15 - bobbing*0.5, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.rotate(leanAngle);
                ctx.translate(0, -bobbing);
                ctx.scale(1, breathScale);

                const eggGrad = ctx.createRadialGradient(-10, -15, 5, 0, 0, this.radius + 10);
                eggGrad.addColorStop(0, '#ffffff');    
                eggGrad.addColorStop(0.4, '#e4e6d9'); 
                eggGrad.addColorStop(1, '#8b8e83');   

                ctx.fillStyle = eggGrad;
                ctx.beginPath();
                ctx.moveTo(0, -this.radius * 1.2); 
                ctx.bezierCurveTo(this.radius, -this.radius * 1.2, this.radius, this.radius, 0, this.radius);
                ctx.bezierCurveTo(-this.radius, this.radius, -this.radius, -this.radius * 1.2, 0, -this.radius * 1.2);
                ctx.fill();

                ctx.save();
                const faceOffsetX = Math.cos(this.facingAngle) * 10;
                const faceOffsetY = Math.sin(this.facingAngle) * 8;
                ctx.translate(faceOffsetX, faceOffsetY);
                
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(-12, -4, 9, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10, -6, 7, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = '#000';
                const pupilOffsetX = Math.cos(this.facingAngle) * 4;
                const pupilOffsetY = Math.sin(this.facingAngle) * 4;
                ctx.beginPath(); ctx.arc(-12 + pupilOffsetX, -4 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10 + pupilOffsetX, -6 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                
                ctx.restore();

                this.drawWeapon(ctx, -25, 12, this.facingAngle, true, this.recoilL, this.flashL); 
                this.drawWeapon(ctx, 25, 12, this.facingAngle, false, this.recoilR, this.flashR); 

                ctx.restore();
            }

            drawWeapon(ctx, offsetX, offsetY, aimAngle, isLeft, recoil, flash) {
                ctx.save();
                
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (isLeft ? 0 : Math.PI)) * 5 : 0;
                ctx.translate(offsetX, offsetY + sway);
                ctx.rotate(aimAngle);
                ctx.translate(-recoil, 0);

                const isAimingLeft = Math.abs(aimAngle) > Math.PI / 2;
                if (isAimingLeft) ctx.scale(1, -1);

                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetY = isAimingLeft ? -10 : 10; 

                const gunGrad = ctx.createLinearGradient(0, -4, 0, 4);
                gunGrad.addColorStop(0, '#5a5a6a');
                gunGrad.addColorStop(0.5, '#3b3b4c');
                gunGrad.addColorStop(1, '#1c1c28');
                ctx.fillStyle = gunGrad;
                
                ctx.beginPath();
                ctx.roundRect(5, -4, 20, 8, 2); 
                ctx.roundRect(-2, -2, 10, 12, 2); 
                ctx.fill();

                ctx.shadowColor = 'transparent'; 
                ctx.fillStyle = '#050505';
                ctx.fillRect(18, -2, 5, 4); 
                ctx.fillStyle = '#888';
                ctx.fillRect(8, -3, 8, 2); 

                if (flash > 0) {
                    if (isAimingLeft) ctx.scale(1, -1);
                    
                    ctx.shadowColor = '#ffff00';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#ffffff';
                    
                    ctx.beginPath();
                    ctx.moveTo(23, 0);
                    ctx.lineTo(32 + Math.random()*8, -4 - Math.random()*4);
                    ctx.lineTo(30, 0);
                    ctx.lineTo(32 + Math.random()*8, 4 + Math.random()*4);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(26, 0, 7 * (flash/0.1), 0, Math.PI*2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // --- ENVIRONMENT ---
        function drawRoom(ctx) {
            const tileSize = 60;
            ctx.strokeStyle = 'rgba(10, 10, 12, 0.4)';
            ctx.lineWidth = 2;

            for (let x = 0; x < ROOM_SIZE; x += tileSize) {
                for (let y = 0; y < ROOM_SIZE; y += tileSize) {
                    if ((x/tileSize + y/tileSize) % 2 === 0) {
                        ctx.fillStyle = '#161412';
                    } else {
                        ctx.fillStyle = '#11100e';
                    }
                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            ctx.strokeStyle = '#0a0908'; 
            ctx.lineWidth = 40;
            ctx.strokeRect(0, 0, ROOM_SIZE, ROOM_SIZE);
        }

        function drawExitDoor(ctx) {
            ctx.save();
            ctx.translate(ROOM_SIZE, ROOM_SIZE / 2);
            
            // Blast door opening progress
            if (hasKey && exitDoorProgress < 1) {
                exitDoorProgress += 0.015; // Smooth opening speed
            }
            
            // Hallway background behind door
            ctx.fillStyle = '#010102';
            ctx.fillRect(-20, -70, 40, 140);
            
            // Glowing core light inside
            const coreGrad = ctx.createLinearGradient(-20, 0, 20, 0);
            coreGrad.addColorStop(0, hasKey ? 'rgba(0, 255, 100, 0)' : 'rgba(255, 0, 0, 0)');
            coreGrad.addColorStop(1, hasKey ? 'rgba(0, 255, 100, 0.8)' : 'rgba(255, 0, 0, 0.5)');
            ctx.fillStyle = coreGrad;
            ctx.fillRect(-20, -70, 40, 140);
            
            const slideOffset = exitDoorProgress * 70; // Doors slide up/down

            ctx.fillStyle = '#111';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            
            // Top Blast Panel
            ctx.save();
            ctx.translate(0, -slideOffset);
            ctx.beginPath();
            ctx.moveTo(-15, 0); ctx.lineTo(-15, -70); ctx.lineTo(15, -70); ctx.lineTo(15, 0);
            ctx.lineTo(5, -10); ctx.lineTo(-5, -10); ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // Hazard stripes on top panel
            ctx.fillStyle = hasKey ? '#1a2b1a' : '#2b1a1a';
            ctx.fillRect(-10, -50, 20, 30);
            ctx.restore();

            // Bottom Blast Panel
            ctx.save();
            ctx.translate(0, slideOffset);
            ctx.beginPath();
            ctx.moveTo(-15, 0); ctx.lineTo(-15, 70); ctx.lineTo(15, 70); ctx.lineTo(15, 0);
            ctx.lineTo(5, 10); ctx.lineTo(-5, 10); ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // Hazard stripes on bottom panel
            ctx.fillStyle = hasKey ? '#1a2b1a' : '#2b1a1a';
            ctx.fillRect(-10, 20, 20, 30);
            ctx.restore();

            // Heavy metallic frame casing
            ctx.fillStyle = '#18181c';
            ctx.fillRect(-25, -80, 50, 10); // Top frame
            ctx.fillRect(-25, 70, 50, 10);  // Bottom frame
            ctx.fillRect(-25, -70, 5, 140); // Left frame
            
            ctx.restore();
        }

        // --- DYNAMIC LIGHTING ---
        function drawLighting(ctx, camX, camY, sx, sy) {
            lightCtx.globalCompositeOperation = 'source-over';
            
            let opacity = 1 - settings.brightness;
            lightCtx.fillStyle = `rgba(4, 4, 6, ${opacity})`; 
            lightCtx.fillRect(0, 0, width, height);

            lightCtx.globalCompositeOperation = 'destination-out';

            lightCtx.save();
            lightCtx.translate(width / 2, height / 2);
            lightCtx.scale(settings.zoom, settings.zoom);
            lightCtx.translate(-camX + sx, -camY + sy);

            torches.forEach(t => {
                const radius = t.getLightRadius();
                const grad = lightCtx.createRadialGradient(t.x, t.y, 10, t.x, t.y, radius);
                grad.addColorStop(0, 'rgba(255, 255, 255, 1)');      
                grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.5)');  
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');      
                
                lightCtx.fillStyle = grad;
                lightCtx.beginPath();
                lightCtx.arc(t.x, t.y, radius, 0, Math.PI * 2);
                lightCtx.fill();
            });

            const pRadius = 180;
            const pGrad = lightCtx.createRadialGradient(player.x, player.y, 20, player.x, player.y, pRadius);
            pGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)'); 
            pGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            lightCtx.fillStyle = pGrad;
            lightCtx.beginPath();
            lightCtx.arc(player.x, player.y, pRadius, 0, Math.PI*2);
            lightCtx.fill();

            const dGrad = lightCtx.createRadialGradient(ROOM_SIZE, ROOM_SIZE / 2, 5, ROOM_SIZE, ROOM_SIZE / 2, 100 + (exitDoorProgress * 50));
            dGrad.addColorStop(0, hasKey ? 'rgba(0, 255, 0, 0.4)' : 'rgba(255, 0, 0, 0.4)');
            dGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            lightCtx.fillStyle = dGrad;
            lightCtx.beginPath();
            lightCtx.arc(ROOM_SIZE, ROOM_SIZE / 2, 150, 0, Math.PI * 2);
            lightCtx.fill();

            keys.forEach(k => {
                const kGrad = lightCtx.createRadialGradient(k.x, k.y, 5, k.x, k.y, 80);
                kGrad.addColorStop(0, 'rgba(255, 200, 0, 0.5)');
                kGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                lightCtx.fillStyle = kGrad;
                lightCtx.beginPath();
                lightCtx.arc(k.x, k.y, 80, 0, Math.PI * 2);
                lightCtx.fill();
            });

            enemies.forEach(enemy => {
                const smileX = enemy.drawX + Math.cos(enemy.drawAngle) * 18;
                const smileY = enemy.drawY + Math.sin(enemy.drawAngle) * 18;
                
                const sGrad = lightCtx.createRadialGradient(smileX, smileY, 2, smileX, smileY, 25);
                sGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                sGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                lightCtx.fillStyle = sGrad;
                lightCtx.beginPath();
                lightCtx.arc(smileX, smileY, 25, 0, Math.PI*2);
                lightCtx.fill();
            });

            if (player.flashL > 0) {
                drawMuzzleLight(player.muzzleX_L, player.muzzleY_L, player.flashL);
            }
            if (player.flashR > 0) {
                drawMuzzleLight(player.muzzleX_R, player.muzzleY_R, player.flashR);
            }

            function drawMuzzleLight(x, y, flashAmount) {
                const fRadius = 250 * (flashAmount / 0.1); 
                const fGrad = lightCtx.createRadialGradient(x, y, 5, x, y, fRadius);
                fGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
                fGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                lightCtx.fillStyle = fGrad;
                lightCtx.beginPath();
                lightCtx.arc(x, y, fRadius, 0, Math.PI*2);
                lightCtx.fill();
            }

            lightCtx.restore();

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(lightCanvas, 0, 0);
            ctx.restore();
        }

        // --- UI / JOYSTICKS ---
        function drawJoysticks(ctx) {
            ctx.lineWidth = 3;
            if (input.left.active) {
                ctx.beginPath();
                ctx.arc(input.left.baseX, input.left.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(input.left.currentX, input.left.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
            }
        }

        // --- MAIN LOOP ---
        const player = new Player();
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000; 
            lastTime = currentTime;
            if (dt > 0.1) dt = 0.1; 

            if (gameState === 'countdown') {
                countdownTimer -= dt;
                if (countdownTimer <= 0) {
                    countdownValue--;
                    if (countdownValue > 0) {
                        countdownTimer = 0.5; 
                        triggerCountdownAnim(countdownValue);
                    } else {
                        setGameState('playing');
                    }
                }
            }

            if (gameState === 'playing') {
                timeAlive += dt; // Track score

                if (shakeTime > 0) {
                    shakeTime -= dt;
                    currentShakeX = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                    currentShakeY = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                } else {
                    currentShakeX = 0;
                    currentShakeY = 0;
                }

                if (roomTextTimer > 0) roomTextTimer -= dt;
                if (keyDroppedTimer > 0) keyDroppedTimer -= dt;

                player.update(dt);
                torches.forEach(t => t.update(dt));
                trapdoor.update(dt);

                for(let i = keys.length - 1; i >= 0; i--) {
                    let k = keys[i];
                    k.update(dt);
                    let dx = player.x - k.x;
                    let dy = player.y - k.y;
                    if (dx*dx + dy*dy < 2500) { 
                        hasKey = true;
                        keys.splice(i, 1);
                    }
                }

                if (hasKey && player.x > ROOM_SIZE - 100 && Math.abs(player.y - ROOM_SIZE / 2) < 100) {
                    startNextRoom();
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i];
                    enemy.update(dt, player, enemies);

                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        let dx = enemy.x - b.x;
                        let dy = enemy.y - b.y;
                        if (dx*dx + dy*dy < enemy.radius * enemy.radius) {
                            enemy.hp -= b.damage;
                            
                            damageTexts.push({
                                x: enemy.x + (Math.random() - 0.5) * 20,
                                y: enemy.y - 20,
                                text: "-" + b.damage,
                                life: 0.6,
                                vy: -40 - Math.random() * 20
                            });

                            let hitAngle = Math.atan2(b.vy, b.vx);
                            // Main blood spray - fast droplets in direction of bullet
                            let numMain = 5 + Math.floor(Math.random() * 4);
                            for(let p = 0; p < numMain; p++) {
                                let spread = (Math.random() - 0.5) * 1.8;
                                let speed = 80 + Math.random() * 280;
                                let size = 2 + Math.random() * 5;
                                let dark = Math.floor(Math.random() * 50);
                                let color = `rgb(${55+dark}, ${dark/3}, ${dark/3})`;
                                activeSplatter.push({
                                    x: enemy.x,
                                    y: enemy.y,
                                    vx: Math.cos(hitAngle + spread) * speed,
                                    vy: Math.sin(hitAngle + spread) * speed,
                                    size, color,
                                    friction: 0.72 + Math.random() * 0.1,
                                    scaleX: 1.3 + Math.random() * 1.2,
                                    angle: hitAngle + spread
                                });
                            }
                            // Small satellite droplets - scatter widely
                            let numSat = 3 + Math.floor(Math.random() * 3);
                            for(let p = 0; p < numSat; p++) {
                                let spread = (Math.random() - 0.5) * Math.PI;
                                let speed = 30 + Math.random() * 80;
                                let size = 1 + Math.random() * 2.5;
                                activeSplatter.push({
                                    x: enemy.x + (Math.random()-0.5)*8,
                                    y: enemy.y + (Math.random()-0.5)*8,
                                    vx: Math.cos(hitAngle + spread) * speed,
                                    vy: Math.sin(hitAngle + spread) * speed,
                                    size, color: '#3a0000',
                                    friction: 0.65 + Math.random() * 0.1,
                                    scaleX: 1.0 + Math.random() * 0.5,
                                    angle: hitAngle + spread
                                });
                            }

                            bullets.splice(j, 1);
                            break; 
                        }
                    }
                    if (enemy.hp <= 0) {
                        // Spawn a burst of blood on death
                        let numDeath = 10 + Math.floor(Math.random() * 6);
                        for(let p = 0; p < numDeath; p++) {
                            let angle = Math.random() * Math.PI * 2;
                            let speed = 40 + Math.random() * 200;
                            let size = 2 + Math.random() * 7;
                            let dark = Math.floor(Math.random() * 40);
                            activeSplatter.push({
                                x: enemy.x + (Math.random()-0.5)*10,
                                y: enemy.y + (Math.random()-0.5)*10,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                size, color: `rgb(${45+dark},0,0)`,
                                friction: 0.65 + Math.random() * 0.12,
                                scaleX: 1.0 + Math.random() * 0.8,
                                angle
                            });
                        }
                        // Add fallen body/puddle that persists for 5 seconds
                        deadEnemies.push({
                            x: enemy.x, y: enemy.y,
                            facingAngle: enemy.facingAngle,
                            legs: enemy.legs,
                            life: 5.0, maxLife: 5.0,
                            puddleRadius: 4,
                            maxPuddleRadius: 28 + Math.random() * 18,
                            drips: [] // small satellite drip offsets
                        });
                        enemies.splice(i, 1);
                        enemiesKilledThisRoom++;
                        totalKills++;
                        triggerShake(6, 0.15);
                        if (enemiesKilledThisRoom === totalEnemiesThisRoom) {
                            keys.push(new Key(enemy.x, enemy.y));
                            keyDroppedTimer = 3.0;
                        }
                    }
                }

                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].update(dt);
                    if (bullets[i].life <= 0) {
                        bullets.splice(i, 1);
                    }
                }

                for (let i = activeSplatter.length - 1; i >= 0; i--) {
                    let p = activeSplatter[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    
                    p.x = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.x));
                    p.y = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.y));
                    
                    let drag = Math.pow(p.friction, dt * 60);
                    p.vx *= drag;
                    p.vy *= drag;

                    if (Math.abs(p.vx) < 8 && Math.abs(p.vy) < 8) {
                        // Floor splatters fade over 5 seconds
                        floorSplatters.push({x: p.x, y: p.y, size: p.size * 0.85, color: p.color, life: 5.0, scaleX: p.scaleX, angle: p.angle});
                        activeSplatter.splice(i, 1);
                    }
                }
                
                // Fade out floor splatters
                for (let i = floorSplatters.length - 1; i >= 0; i--) {
                    floorSplatters[i].life -= dt;
                    if (floorSplatters[i].life <= 0) {
                        floorSplatters.splice(i, 1);
                    }
                }

                // Update dead enemy bodies/puddles
                for (let i = deadEnemies.length - 1; i >= 0; i--) {
                    let d = deadEnemies[i];
                    d.life -= dt;
                    // Puddle grows over first 1.2 seconds
                    let growFrac = Math.min(1, (d.maxLife - d.life) / 1.2);
                    d.puddleRadius = 4 + (d.maxPuddleRadius - 4) * growFrac;
                    if (d.life <= 0) deadEnemies.splice(i, 1);
                }

                for (let i = damageTexts.length - 1; i >= 0; i--) {
                    let d = damageTexts[i];
                    d.y += d.vy * dt;
                    d.life -= dt;
                    if (d.life <= 0) damageTexts.splice(i, 1);
                }
            }

            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            let camX = player.x;
            let camY = player.y;

            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.scale(settings.zoom, settings.zoom);
            ctx.translate(-camX + currentShakeX, -camY + currentShakeY);

            drawRoom(ctx);
            drawExitDoor(ctx);

            // Draw fallen enemy corpses & blood puddles
            deadEnemies.forEach(d => {
                const alpha = d.life > 2.5 ? 1.0 : d.life / 2.5;
                ctx.save();
                ctx.globalAlpha = alpha;

                // Blood puddle - organic ellipse with gradient
                const pr = d.puddleRadius;
                const puddleGrad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, pr);
                puddleGrad.addColorStop(0, 'rgba(60,0,0,0.95)');
                puddleGrad.addColorStop(0.45, 'rgba(38,0,0,0.85)');
                puddleGrad.addColorStop(0.78, 'rgba(20,0,0,0.55)');
                puddleGrad.addColorStop(1, 'rgba(8,0,0,0)');
                ctx.fillStyle = puddleGrad;
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.rotate(d.facingAngle);
                ctx.scale(1.4, 0.9);
                ctx.beginPath();
                ctx.arc(0, 0, pr, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Tiny irregular drip blobs around puddle edge
                let seed = d.x * 137 + d.y * 31; // deterministic fake-random
                for (let k = 0; k < 6; k++) {
                    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
                    let blobAngle = (seed & 0xff) / 255 * Math.PI * 2;
                    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
                    let blobDist = pr * (0.6 + ((seed & 0xff) / 255) * 0.55);
                    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
                    let blobSize = 2 + ((seed & 0xff) / 255) * 4;
                    ctx.fillStyle = 'rgba(45,0,0,0.7)';
                    ctx.beginPath();
                    ctx.arc(d.x + Math.cos(blobAngle) * blobDist, d.y + Math.sin(blobAngle) * blobDist, blobSize, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Flattened/crumpled body on the ground
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.rotate(d.facingAngle);
                ctx.scale(1, 0.28); // squash flat
                ctx.fillStyle = '#060606';
                ctx.beginPath();
                ctx.ellipse(0, 0, 24, 11, 0, 0, Math.PI * 2);
                ctx.fill();
                // Legs splayed out flat
                if (d.legs) {
                    ctx.restore();
                    ctx.save();
                    ctx.strokeStyle = 'rgba(5,5,5,0.7)';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    d.legs.forEach((leg, idx) => {
                        ctx.beginPath();
                        let attachX = d.x + Math.cos(d.facingAngle) * (leg.offsetX * 0.5) - Math.sin(d.facingAngle) * (leg.offsetY * 0.5);
                        let attachY = d.y + Math.sin(d.facingAngle) * (leg.offsetX * 0.5) + Math.cos(d.facingAngle) * (leg.offsetY * 0.5);
                        // Droop legs to a static spread position
                        let deadAngle = d.facingAngle + (leg.offsetY < 0 ? -1.2 : 1.2) + (leg.offsetX < 0 ? 0.4 : -0.4);
                        let legEndX = d.x + Math.cos(deadAngle) * 28;
                        let legEndY = d.y + Math.sin(deadAngle) * 28;
                        ctx.moveTo(attachX, attachY);
                        ctx.quadraticCurveTo((attachX + legEndX)/2 + Math.cos(deadAngle + Math.PI/2)*8, (attachY + legEndY)/2 + Math.sin(deadAngle + Math.PI/2)*8, legEndX, legEndY);
                        ctx.stroke();
                    });
                } else {
                    ctx.restore();
                    ctx.save();
                }
                ctx.restore();
                ctx.restore();
            });
            // Floor blood splatters (landed droplets)
            floorSplatters.forEach(s => {
                // Fade out visually over the last 3 seconds of life
                ctx.globalAlpha = Math.min(1, s.life / 3.0) * 0.82;
                ctx.fillStyle = s.color;
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.angle);
                ctx.scale(s.scaleX, 1);
                ctx.beginPath();
                ctx.arc(0, 0, s.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            activeSplatter.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.scale(p.scaleX, 1);
                ctx.beginPath();
                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                if (speed > 50) {
                    ctx.ellipse(0, 0, p.size + speed * 0.015, p.size, 0, 0, Math.PI * 2);
                } else {
                    ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.restore();
            });
            
            trapdoor.draw(ctx);
            keys.forEach(k => k.draw(ctx));
            torches.forEach(t => t.draw(ctx));
            bullets.forEach(bullet => bullet.draw(ctx));
            
            enemies.forEach(enemy => {
                enemy.drawBody(ctx);
                enemy.drawSmile(ctx);
            }); 
            
            player.draw(ctx);

            damageTexts.forEach(d => {
                let alpha = Math.max(0, d.life / 0.6);
                ctx.globalAlpha = alpha;
                
                ctx.font = 'bold 9px "Courier New", Courier, monospace';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#cc3333';
                ctx.shadowColor = 'rgba(0,0,0,1)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetY = 1;
                
                ctx.fillText(d.text, d.x, d.y);
            });

            ctx.restore(); 

            drawLighting(ctx, camX, camY, currentShakeX, currentShakeY);

            // Screen damage flash (Clean radial vignette instead of full block color)
            if (player.hurtTimer > 0) {
                ctx.save();
                let alpha = (player.hurtTimer / 0.2) * 0.7; // Max opacity 0.7
                let grad = ctx.createRadialGradient(width/2, height/2, height*0.3, width/2, height/2, height*0.8);
                grad.addColorStop(0, 'rgba(180, 0, 0, 0)');
                grad.addColorStop(1, `rgba(180, 0, 0, ${alpha})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }

            if (roomTextTimer > 0) {
                let alpha = Math.min(1, roomTextTimer / 1.5);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.font = 'bold 36px "Courier New", Courier, monospace';
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(200,180,160,0.9)';
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetY = 3;
                ctx.fillText(`— ROOM ${currentRoom} —`, width/2, height/3);
                ctx.restore();
            }

            if (keyDroppedTimer > 0) {
                let alpha = Math.min(1, keyDroppedTimer / 1.5);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ffea00';
                ctx.font = 'bold 30px system-ui, -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(255,200,0,0.8)';
                ctx.shadowBlur = 15;
                ctx.fillText(`KEY DROPPED!`, width/2, height/2 - 100);
                ctx.restore();
            }

            if (gameState === 'playing') {
                drawJoysticks(ctx);
            } else if (gameState === 'gameover') {
                // Rising blood embers / ash particles
                if (Math.random() < 0.6) {
                    deathParticles.push({
                        x: Math.random() * width,
                        y: height + 10,
                        size: Math.random() * 3 + 0.5,
                        vx: (Math.random() - 0.5) * 25,
                        vy: -15 - Math.random() * 60,
                        life: 1.0,
                        maxLife: 1.0,
                        alpha: Math.random() * 0.6 + 0.2,
                        hue: Math.random() < 0.7 ? 0 : 15 // red or dark orange
                    });
                }
                
                ctx.save();
                for (let i = deathParticles.length - 1; i >= 0; i--) {
                    let p = deathParticles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy -= dt * 5; // slight upward acceleration
                    p.vx += (Math.random() - 0.5) * 2; // drift
                    p.life -= dt;
                    
                    let a = Math.max(0, (p.life / p.maxLife)) * p.alpha;
                    ctx.fillStyle = `hsla(${p.hue}, 90%, ${p.size > 1.5 ? 35 : 20}%, ${a})`;
                    ctx.shadowColor = `hsla(${p.hue}, 100%, 40%, ${a * 0.6})`;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (p.y < -20 || p.life <= 0) deathParticles.splice(i, 1);
                }
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
