<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egg Survivor">
    <title>Egg Survivor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            overflow: hidden;
            touch-action: none; /* Prevents pull-to-refresh and scrolling */
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- PORTRAIT MODE WARNING --- */
        #orientation-warning {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            color: #8b8e83;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #orientation-warning h2 {
            margin-bottom: 10px;
            font-size: 24px;
            color: #e4e6d9;
        }

        #orientation-warning p {
            font-size: 18px;
        }

        /* Show the warning only when the device is held vertically */
        @media screen and (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
            #gameCanvas {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <h2>Please tilt your phone the other way.</h2>
        <p>Rocktato plays in landscape.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 

        // Dynamic Lighting Canvas (Offscreen for performance)
        const lightCanvas = document.createElement('canvas');
        const lightCtx = lightCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            lightCanvas.width = width;
            lightCanvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- GLOBAL EFFECTS ---
        let shakeTime = 0;
        let shakeMag = 0;
        function triggerShake(magnitude, duration) {
            if (shakeMag < magnitude || shakeTime <= 0) {
                shakeMag = magnitude;
                shakeTime = duration;
            }
        }

        // --- INPUT MANAGEMENT (Multi-touch Joysticks) ---
        const input = {
            left: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 },
            right: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0, lastTapTime: 0, doubleTapped: false }
        };

        const JOYSTICK_MAX_RADIUS = 60;

        function handleTouch(e) {
            e.preventDefault();
            const halfWidth = width / 2;
            let leftFound = false;
            let rightFound = false;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.clientX < halfWidth) {
                    leftFound = true;
                    if (!input.left.active) {
                        input.left.active = true;
                        input.left.id = touch.identifier;
                        input.left.baseX = touch.clientX;
                        input.left.baseY = touch.clientY;
                    }
                    if (input.left.id === touch.identifier) {
                        input.left.currentX = touch.clientX;
                        input.left.currentY = touch.clientY;
                    }
                } 
                else {
                    rightFound = true;
                    if (!input.right.active) {
                        const now = performance.now();
                        // Check for double tap (within 300 milliseconds)
                        if (now - input.right.lastTapTime < 300) {
                            input.right.doubleTapped = true;
                            input.right.lastTapTime = 0; // Reset to prevent triple-tap firing twice
                        } else {
                            input.right.lastTapTime = now;
                        }

                        input.right.active = true;
                        input.right.id = touch.identifier;
                        input.right.baseX = touch.clientX;
                        input.right.baseY = touch.clientY;
                    }
                    if (input.right.id === touch.identifier) {
                        input.right.currentX = touch.clientX;
                        input.right.currentY = touch.clientY;
                    }
                }
            }

            if (!leftFound) input.left.active = false;
            if (!rightFound) input.right.active = false;

            ['left', 'right'].forEach(side => {
                const stick = input[side];
                if (stick.active) {
                    let dx = stick.currentX - stick.baseX;
                    let dy = stick.currentY - stick.baseY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > JOYSTICK_MAX_RADIUS) {
                        dx = (dx / dist) * JOYSTICK_MAX_RADIUS;
                        dy = (dy / dist) * JOYSTICK_MAX_RADIUS;
                        dist = JOYSTICK_MAX_RADIUS;
                        
                        stick.baseX = stick.currentX - dx;
                        stick.baseY = stick.currentY - dy;
                    }
                    
                    stick.vectorX = dx / JOYSTICK_MAX_RADIUS;
                    stick.vectorY = dy / JOYSTICK_MAX_RADIUS;
                    stick.magnitude = dist / JOYSTICK_MAX_RADIUS;
                } else {
                    stick.vectorX = 0;
                    stick.vectorY = 0;
                    stick.magnitude = 0;
                }
            });
        }

        window.addEventListener('touchstart', handleTouch, { passive: false });
        window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false });
        window.addEventListener('touchcancel', handleTouch, { passive: false });

        let mouseDown = false;
        window.addEventListener('mousedown', (e) => {
            mouseDown = true;
            handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] });
        });
        window.addEventListener('mousemove', (e) => {
            if (mouseDown) handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] });
        });
        window.addEventListener('mouseup', (e) => {
            mouseDown = false;
            handleTouch({ preventDefault: ()=>{}, touches: [] });
        });

        // --- GAME OBJECTS ---
        const ROOM_SIZE = 1200; // Smaller, more claustrophobic room

        const bullets = [];
        const enemies = [];
        const activeBlood = [];
        const floorSplatters = [];
        const damageTexts = [];

        class Bullet {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.speed = 1200; 
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.life = 1.0; // Shorter life since room is smaller
                this.damage = 25; // Bullets do 25 dmg each
            }
            
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.life -= dt;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.atan2(this.vy, this.vx));

                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetY = 5;
                
                const bulletGrad = ctx.createLinearGradient(0, -2, 0, 2);
                bulletGrad.addColorStop(0, '#666666'); 
                bulletGrad.addColorStop(0.5, '#222222'); 
                bulletGrad.addColorStop(1, '#000000'); 

                ctx.fillStyle = bulletGrad;
                
                ctx.beginPath();
                ctx.moveTo(8, 0);   
                ctx.lineTo(2, -2.5); 
                ctx.lineTo(-8, -2.5);
                ctx.lineTo(-8, 2.5);  
                ctx.lineTo(2, 2.5);   
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        class CreepyLeg {
            constructor(offsetX, offsetY) {
                this.offsetX = offsetX;
                this.offsetY = offsetY;
                this.x = 0;
                this.y = 0;
                this.targetX = 0;
                this.targetY = 0;
                this.startX = 0;
                this.startY = 0;
                this.stepProgress = 1;
                this.initialized = false;
            }

            update(bodyX, bodyY, facingAngle, dt) {
                // Calculate where the foot SHOULD be
                const idealX = bodyX + Math.cos(facingAngle) * this.offsetX - Math.sin(facingAngle) * this.offsetY;
                const idealY = bodyY + Math.sin(facingAngle) * this.offsetX + Math.cos(facingAngle) * this.offsetY;

                if (!this.initialized) {
                    this.x = idealX;
                    this.y = idealY;
                    this.initialized = true;
                }

                if (this.stepProgress >= 1) {
                    let dx = idealX - this.x;
                    let dy = idealY - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // If the foot gets too far behind, take a step forward
                    if (dist > 25) {
                        this.stepProgress = 0;
                        this.startX = this.x;
                        this.startY = this.y;
                        // Overshoot the target slightly so it plants ahead of the crawl
                        this.targetX = idealX + Math.cos(facingAngle) * 15;
                        this.targetY = idealY + Math.sin(facingAngle) * 15;
                    }
                } else {
                    this.stepProgress += dt * 7; // Speed of the leg snapping to new position
                    if (this.stepProgress >= 1) {
                        this.stepProgress = 1;
                        this.x = this.targetX;
                        this.y = this.targetY;
                    } else {
                        // Interpolate position during step
                        this.x = this.startX + (this.targetX - this.startX) * this.stepProgress;
                        this.y = this.startY + (this.targetY - this.startY) * this.stepProgress;
                    }
                }
            }
        }

        class Smiler {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15; // Much smaller collision hit box for the slender body
                this.hp = 100;
                this.speed = 130; // Creeping speed
                this.facingAngle = 0;
                this.distToPlayer = 1000;
                
                // Attack mechanics
                this.isAttacking = false;
                this.attackTime = 0;
                this.attackCooldown = 0;
                
                // 4 articulated procedural legs
                this.legs = [
                    new CreepyLeg(12, -18), // Front Left
                    new CreepyLeg(12, 18),  // Front Right
                    new CreepyLeg(-15, -18), // Back Left
                    new CreepyLeg(-15, 18)   // Back Right
                ];
                
                this.drawX = x;
                this.drawY = y;
                this.drawAngle = 0;
            }

            update(dt, player, allEnemies) {
                let dx = player.x - this.x;
                let dy = player.y - this.y;
                this.distToPlayer = Math.sqrt(dx*dx + dy*dy);
                
                if (this.distToPlayer > 0) {
                    this.facingAngle = Math.atan2(dy, dx);
                    
                    let separationX = 0;
                    let separationY = 0;
                    for (let other of allEnemies) {
                        if (other !== this) {
                            let odx = this.x - other.x;
                            let ody = this.y - other.y;
                            let odist = Math.sqrt(odx*odx + ody*ody);
                            let minDist = this.radius + other.radius + 15; // Keep them spread out
                            if (odist > 0 && odist < minDist) {
                                let push = (minDist - odist) / 2;
                                separationX += (odx / odist) * push * 5;
                                separationY += (ody / odist) * push * 5;
                            }
                        }
                    }

                    // Stop forward movement when hitting the edge of the player
                    let forwardSpeed = 0;
                    // Player radius is 35, plus ~25 for the long body of the smiler
                    if (this.distToPlayer > player.radius + 25) {
                        forwardSpeed = this.speed;
                    } else {
                        // Close enough to attack! Trigger the bite animation.
                        if (this.attackCooldown <= 0) {
                            this.isAttacking = true;
                            this.attackTime = 0.3; // 0.3 second bite duration
                            this.attackCooldown = 1.0; // Wait 1 second before biting again
                        }
                    }

                    // Update attack timers
                    if (this.attackCooldown > 0) this.attackCooldown -= dt;
                    if (this.isAttacking) {
                        this.attackTime -= dt;
                        if (this.attackTime <= 0) this.isAttacking = false;
                    }

                    this.x += (Math.cos(this.facingAngle) * forwardSpeed + separationX) * dt;
                    this.y += (Math.sin(this.facingAngle) * forwardSpeed + separationY) * dt;
                    
                    // Update procedural legs based on new body position
                    this.legs.forEach(leg => leg.update(this.x, this.y, this.facingAngle, dt));
                }
            }

            drawBody(ctx) {
                ctx.save();
                
                // Draw Legs (beneath body)
                ctx.strokeStyle = '#000000'; // Pure black sticks
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                this.legs.forEach(leg => {
                    ctx.beginPath();
                    // Joint attachment on the body
                    let attachX = this.x + Math.cos(this.facingAngle) * (leg.offsetX*0.5) - Math.sin(this.facingAngle) * (leg.offsetY*0.5);
                    let attachY = this.y + Math.sin(this.facingAngle) * (leg.offsetX*0.5) + Math.cos(this.facingAngle) * (leg.offsetY*0.5);
                    
                    ctx.moveTo(attachX, attachY);
                    
                    // Calculate a knee joint that bends upwards and outwards
                    let midX = (attachX + leg.x) / 2;
                    let midY = (attachY + leg.y) / 2;
                    
                    // Lift knee while stepping
                    let stepLift = 0;
                    if (leg.stepProgress < 1) {
                        stepLift = Math.sin(leg.stepProgress * Math.PI) * 15;
                    }
                    
                    let perpX = -(leg.y - attachY);
                    let perpY = (leg.x - attachX);
                    let len = Math.sqrt(perpX*perpX + perpY*perpY);
                    if(len > 0) { perpX /= len; perpY /= len; }
                    
                    let kneeOutward = 12;
                    let sign = leg.offsetY < 0 ? -1 : 1; 
                    
                    let kneeX = midX + perpX * kneeOutward * sign;
                    let kneeY = midY + perpY * kneeOutward * sign - stepLift;

                    // Draw leg from body -> knee -> foot
                    ctx.quadraticCurveTo(kneeX, kneeY, leg.x, leg.y);
                    ctx.stroke();
                });

                // Draw Torso (Black crawling pill shape)
                ctx.translate(this.x, this.y);
                ctx.rotate(this.facingAngle);
                
                ctx.fillStyle = '#030303';
                ctx.beginPath();
                ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2); // Long and skinny
                ctx.fill();
                
                // Save coordinates for the smile layer
                this.drawX = this.x;
                this.drawY = this.y;
                this.drawAngle = this.facingAngle;

                ctx.restore();
            }

            drawSmile(ctx) {
                ctx.save();
                ctx.translate(this.drawX, this.drawY);
                ctx.rotate(this.drawAngle);
                
                let lungeOffset = 0;
                let attackOpenness = 0;
                
                // Apply a sudden snap forward and wide open mouth if attacking
                if (this.isAttacking) {
                    let progress = 1 - (this.attackTime / 0.3); // 0 to 1
                    lungeOffset = Math.sin(progress * Math.PI) * 12; // Snap forward
                    attackOpenness = Math.sin(progress * Math.PI) * 10; // Open mouth wide
                }

                // Move to the very front tip of the creature, plus the attack lunge
                ctx.translate(18 + lungeOffset, 0); 
                
                // Distance factor (subtler scaling)
                let factor = 1 - Math.min(1, Math.max(0, (this.distToPlayer - 80) / 400));
                
                // Tiny, creepy grin (adds the attack openness when biting)
                let smileWidth = 4 + factor * 4; // Max half-width is 8
                let smileHeight = 2 + factor * 3 + attackOpenness; 

                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 6 + factor * 4;
                ctx.fillStyle = '#ffffff';

                // Draw the white mouth curve
                ctx.beginPath();
                ctx.moveTo(0, -smileWidth); // Top corner
                ctx.quadraticCurveTo(smileHeight, 0, 0, smileWidth); // Front curve to bottom corner
                ctx.quadraticCurveTo(smileHeight * 0.3, 0, 0, -smileWidth); // Back curve
                ctx.fill();

                // Draw jagged, thin needle teeth
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.lineJoin = 'miter';
                
                ctx.beginPath();
                ctx.moveTo(0, -smileWidth + 1);
                
                let isOuter = true;
                for (let y = -smileWidth + 2; y <= smileWidth - 1; y += 1.5) {
                    ctx.lineTo(isOuter ? smileHeight * 0.7 : smileHeight * 0.2, y);
                    isOuter = !isOuter;
                }
                ctx.stroke();
                
                ctx.restore();
            }
        }

        class Trapdoor {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 140;
                this.height = 100;
                this.state = 'waiting'; 
                this.timer = 0;
                this.enemiesToSpawn = 4; // Wave 1 limit
                this.delayTimer = 4.0; // Wait 4 FULL seconds before starting wave
                this.openAngle = 0; 
            }

            update(dt) {
                if (this.state === 'waiting') {
                    this.delayTimer -= dt;
                    if (this.delayTimer <= 0 && this.enemiesToSpawn > 0) {
                        this.state = 'opening';
                        this.timer = 0.25; // Speed of opening
                        triggerShake(8, 0.2); // Rumble as it opens
                    }
                }
                else if (this.state === 'opening') {
                    this.openAngle = 1 - (this.timer / 0.25);
                    this.timer -= dt;
                    if (this.timer <= 0) {
                        this.openAngle = 1;
                        this.state = 'open';
                        this.timer = 0.3; // Stay open briefly
                        
                        // Spawn 1 Enemy
                        enemies.push(new Smiler(this.x, this.y));
                        this.enemiesToSpawn--;
                        
                        triggerShake(15, 0.3); // Heavy slam when doors hit the floor
                    }
                }
                else if (this.state === 'open') {
                    this.timer -= dt;
                    if (this.timer <= 0) {
                        this.state = 'closing';
                        this.timer = 0.2; // Fast slam shut
                    }
                }
                else if (this.state === 'closing') {
                    this.openAngle = Math.max(0, this.timer / 0.2);
                    this.timer -= dt;
                    if (this.timer <= 0) {
                        this.openAngle = 0;
                        this.state = 'waiting';
                        // Random delay between 4.0 and 7.0 seconds before next spawn (Much Slower)
                        this.delayTimer = Math.random() * 3.0 + 4.0; 
                        
                        triggerShake(6, 0.15); // Slam shut shake
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Thick cellar door base/rim
                ctx.fillStyle = '#2a2a30';
                ctx.strokeStyle = '#050505';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.roundRect(-this.width/2 - 10, -this.height/2 - 10, this.width + 20, this.height + 20, 8);
                ctx.fill();
                ctx.stroke();

                // Deep Dark Pit 
                ctx.fillStyle = '#020202';
                ctx.beginPath();
                ctx.roundRect(-this.width/2, -this.height/2, this.width, this.height, 4);
                ctx.fill();
                
                // Inner rim shading (gives the hole depth)
                ctx.fillStyle = '#111';
                ctx.fillRect(-this.width/2, -this.height/2, this.width, 20);

                // Simulate 2.5D perspective for the doors swinging upwards
                const scaleX = Math.cos(this.openAngle * (Math.PI / 2));
                const popUpHeight = Math.sin(this.openAngle * (Math.PI / 2)) * 50;

                const flapW = this.width / 2;
                const numPlanks = 4;
                const plankW = flapW / numPlanks;

                // Helper function to draw a textured, 3D angled door flap
                const drawTexturedFlap = (sign) => { // sign: -1 for left flap, 1 for right flap
                    ctx.save();
                    ctx.translate(sign * -flapW, -this.height/2); // Move to outer hinge
                    
                    // Draw Wooden Planks
                    for(let i = 0; i < numPlanks; i++) {
                        // Drawing inwards towards the center pit line
                        let startX = i * plankW * sign; 
                        let endX = (i + 1) * plankW * sign;
                        
                        let sStartX = startX * scaleX;
                        let sEndX = endX * scaleX;
                        
                        let startYOffset = (Math.abs(startX) / flapW) * popUpHeight;
                        let endYOffset = (Math.abs(endX) / flapW) * popUpHeight;
                        
                        ctx.beginPath();
                        ctx.moveTo(sStartX, -startYOffset);
                        ctx.lineTo(sStartX, this.height - startYOffset);
                        ctx.lineTo(sEndX, this.height - endYOffset);
                        ctx.lineTo(sEndX, -endYOffset);
                        ctx.closePath();
                        
                        // Realistic rich wood gradient per plank
                        let gradStartX = sign === 1 ? sStartX : sEndX;
                        let gradEndX = sign === 1 ? sEndX : sStartX;
                        let grad = ctx.createLinearGradient(gradStartX, 0, gradEndX, 0);
                        grad.addColorStop(0, '#22120a');
                        grad.addColorStop(0.5, '#402414');
                        grad.addColorStop(1, '#1a0d07');
                        
                        ctx.fillStyle = grad;
                        ctx.fill();
                        
                        // Wood plank dividing seams
                        ctx.strokeStyle = '#050505';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    // Draw Iron Reinforcing Bands
                    const bandHeights = [15, this.height - 30];
                    const bandThickness = 12;
                    ctx.fillStyle = '#111113'; 
                    
                    bandHeights.forEach(yBase => {
                        ctx.beginPath();
                        ctx.moveTo(0, yBase);
                        ctx.lineTo(0, yBase + bandThickness);
                        ctx.lineTo(flapW * sign * scaleX, yBase + bandThickness - popUpHeight);
                        ctx.lineTo(flapW * sign * scaleX, yBase - popUpHeight);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        
                        // Small Silver Iron Nails
                        ctx.fillStyle = '#555';
                        for(let i = 0; i < numPlanks; i++) {
                            let midX = (i + 0.5) * plankW * sign * scaleX;
                            let midYOffset = (Math.abs((i + 0.5) * plankW) / flapW) * popUpHeight;
                            let nailY = yBase + (bandThickness/2) - midYOffset;
                            
                            ctx.beginPath();
                            ctx.arc(midX, nailY, 2 * Math.max(0.3, scaleX), 0, Math.PI*2);
                            ctx.fill();
                        }
                        ctx.fillStyle = '#111113'; 
                    });

                    // Outer thick iron frame for the flap
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, this.height);
                    ctx.lineTo(flapW * sign * scaleX, this.height - popUpHeight);
                    ctx.lineTo(flapW * sign * scaleX, -popUpHeight);
                    ctx.closePath();
                    ctx.strokeStyle = '#050505';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    
                    ctx.restore();
                };

                // Draw Left (-1) and Right (1) Flaps
                drawTexturedFlap(-1);
                drawTexturedFlap(1);

                ctx.restore();
            }
        }

        const trapdoor = new Trapdoor(ROOM_SIZE / 2, ROOM_SIZE / 2);

        class Torch {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.angle = angle; 
                this.timeOffset = Math.random() * 100;
            }

            update(dt) {
                this.timeOffset += dt * 15;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // --- 1. Draw Angled Base and Arm ---
                ctx.save();
                ctx.rotate(this.angle);

                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 5;

                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.roundRect(-10, -12, 12, 24, 3);
                ctx.fill();

                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(-5, -3, 15, 6);

                const woodGrad = ctx.createLinearGradient(0, -6, 25, 6);
                woodGrad.addColorStop(0, '#2d1606');
                woodGrad.addColorStop(0.5, '#4a2511');
                woodGrad.addColorStop(1, '#1a0d04');
                ctx.fillStyle = woodGrad;
                ctx.beginPath();
                ctx.moveTo(5, -5);
                ctx.lineTo(25, -7);
                ctx.lineTo(25, 7);
                ctx.lineTo(5, 5);
                ctx.fill();
                
                ctx.restore(); 

                // --- 2. Draw Upright Basket and Fire ---
                ctx.save();
                const poleEndX = Math.cos(this.angle) * 25;
                const poleEndY = Math.sin(this.angle) * 25;
                ctx.translate(poleEndX, poleEndY);

                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 5;

                const ironGrad = ctx.createLinearGradient(-8, -10, 8, 10);
                ironGrad.addColorStop(0, '#555');
                ironGrad.addColorStop(0.5, '#222');
                ironGrad.addColorStop(1, '#111');
                ctx.fillStyle = ironGrad;
                ctx.beginPath();
                ctx.moveTo(-10, -12);
                ctx.lineTo(10, -12);
                ctx.lineTo(6, 10);
                ctx.lineTo(-6, 10);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#ff5500';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.ellipse(0, -12, 8, 4, 0, 0, Math.PI*2);
                ctx.fill();

                ctx.shadowColor = 'transparent'; 
                
                const f1 = Math.sin(this.timeOffset * 2.0);
                const f2 = Math.cos(this.timeOffset * 1.5);
                const f3 = Math.sin(this.timeOffset * 3.1);

                function drawFlame(ctx, height, width, yOff, color, blurColor, blurAmt) {
                    ctx.shadowColor = blurColor;
                    ctx.shadowBlur = blurAmt;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(0, yOff);
                    ctx.bezierCurveTo(-width, yOff - height/3, -width/2 + f2*3, yOff - height + 5, f3*4, yOff - height - Math.abs(f1)*5);
                    ctx.bezierCurveTo(width/2 + f2*3, yOff - height + 5, width, yOff - height/3, 0, yOff);
                    ctx.fill();
                }

                for(let i = 0; i < 3; i++) {
                    const sparkY = -15 - ((this.timeOffset * 20 + i * 15) % 30);
                    const sparkX = Math.sin(this.timeOffset * 5 + i) * 6;
                    const alpha = Math.max(0, 1 - Math.abs(sparkY)/40); 
                    
                    ctx.shadowColor = '#ff9900';
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = `rgba(255, 200, 0, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(sparkX, sparkY - 12, 1.5, 0, Math.PI*2); 
                    ctx.fill();
                }

                drawFlame(ctx, 40, 14, -10, 'rgba(220, 40, 0, 0.8)', '#ff2200', 15); 
                drawFlame(ctx, 28, 9, -12, 'rgba(255, 140, 0, 0.9)', '#ff8800', 10); 
                drawFlame(ctx, 15, 4, -14, '#ffffff', 'transparent', 0);             

                ctx.restore();
                ctx.restore(); 
            }

            getLightRadius() {
                const flicker = Math.sin(this.timeOffset * 0.8) * 10 + Math.random() * 5;
                return 320 + flicker; 
            }
        }

        const torches = [
            new Torch(70, 70, Math.PI / 4),                  
            new Torch(ROOM_SIZE - 70, 70, 3 * Math.PI / 4),  
            new Torch(70, ROOM_SIZE - 70, -Math.PI / 4),     
            new Torch(ROOM_SIZE - 70, ROOM_SIZE - 70, -3 * Math.PI / 4) 
        ];

        class Player {
            constructor() {
                this.x = ROOM_SIZE / 2;
                this.y = ROOM_SIZE / 2 + 200; // Start slightly away from the trapdoor
                this.radius = 35;
                this.speed = 400; 
                this.animTime = 0;
                this.facingAngle = -Math.PI / 2; // Facing the trapdoor
                
                this.fireRate = 0.12; 
                this.fireTimer = 0;
                this.leftGunNext = true; 
                this.recoilL = 0;
                this.recoilR = 0;
                this.flashL = 0;
                this.flashR = 0;
                
                this.muzzleX_L = 0; this.muzzleY_L = 0;
                this.muzzleX_R = 0; this.muzzleY_R = 0;

                // Dash mechanics
                this.isDashing = false;
                this.dashTime = 0;
                this.dashDuration = 0.15; 
                this.dashSpeed = 1600;
                this.dashCooldown = 0;
                this.dashMaxCooldown = 0.8; 
                this.dashDirX = 0;
                this.dashDirY = 0;
                this.dashParticles = [];
                this.dashRings = [];
            }

            tryDash() {
                if (!this.isDashing && this.dashCooldown <= 0) {
                    let dx = 0, dy = 0;
                    
                    if (input.left.magnitude > 0.1) {
                        dx = input.left.vectorX;
                        dy = input.left.vectorY;
                    } else {
                        dx = Math.cos(this.facingAngle);
                        dy = Math.sin(this.facingAngle);
                    }
                    
                    const mag = Math.sqrt(dx*dx + dy*dy);
                    if (mag > 0) {
                        this.dashDirX = dx / mag;
                        this.dashDirY = dy / mag;
                        this.isDashing = true;
                        this.dashTime = this.dashDuration;
                        this.dashCooldown = this.dashMaxCooldown;
                        
                        this.dashRings.push({x: this.x, y: this.y, radius: 15, life: 0.2, maxLife: 0.2});
                    }
                }
            }

            update(dt) {
                if (input.right.doubleTapped) {
                    this.tryDash();
                    input.right.doubleTapped = false; 
                }

                const moveMag = input.left.magnitude;
                const leanAngle = (moveMag > 0.1) ? input.left.vectorX * 0.15 * moveMag : 0;

                this.dashCooldown -= dt;

                if (this.isDashing) {
                    this.dashTime -= dt;
                    
                    this.dashParticles.push({
                        x: this.x + (Math.random() - 0.5) * 30,
                        y: this.y + (Math.random() - 0.5) * 30,
                        vx: -this.dashDirX * (800 + Math.random() * 400),
                        vy: -this.dashDirY * (800 + Math.random() * 400),
                        life: 0.15,
                        maxLife: 0.15,
                        size: Math.random() * 3 + 1
                    });
                    
                    this.x += this.dashDirX * this.dashSpeed * dt;
                    this.y += this.dashDirY * this.dashSpeed * dt;
                    
                    if (this.dashTime <= 0) {
                        this.isDashing = false;
                    }
                } else if (moveMag > 0) {
                    this.x += input.left.vectorX * this.speed * moveMag * dt;
                    this.y += input.left.vectorY * this.speed * moveMag * dt;
                    this.animTime += dt * (10 + moveMag * 15); 
                } else {
                    this.animTime += dt * 3;
                }

                for (let i = this.dashParticles.length - 1; i >= 0; i--) {
                    let p = this.dashParticles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    if (p.life <= 0) this.dashParticles.splice(i, 1);
                }
                for (let i = this.dashRings.length - 1; i >= 0; i--) {
                    let r = this.dashRings[i];
                    r.life -= dt;
                    r.radius += dt * 500; 
                    if (r.life <= 0) this.dashRings.splice(i, 1);
                }
                
                const wallThickness = 20;
                this.x = Math.max(this.radius + wallThickness, Math.min(ROOM_SIZE - this.radius - wallThickness, this.x));
                this.y = Math.max(this.radius + wallThickness, Math.min(ROOM_SIZE - this.radius - wallThickness, this.y));

                if (input.right.active && input.right.magnitude > 0.1) {
                    this.facingAngle = Math.atan2(input.right.vectorY, input.right.vectorX);
                } else if (input.left.active && moveMag > 0.1) {
                    this.facingAngle = Math.atan2(input.left.vectorY, input.left.vectorX);
                }

                this.recoilL = Math.max(0, this.recoilL - dt * 60);
                this.recoilR = Math.max(0, this.recoilR - dt * 60);
                this.flashL = Math.max(0, this.flashL - dt * 5);
                this.flashR = Math.max(0, this.flashR - dt * 5);

                this.fireTimer -= dt;
                if (!this.isDashing && input.right.active && input.right.magnitude > 0.1 && this.fireTimer <= 0) {
                    this.shoot();
                    this.fireTimer = this.fireRate;
                }
            }

            shoot() {
                const gunOffsetX = this.leftGunNext ? -25 : 25;
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (this.leftGunNext ? 0 : Math.PI)) * 5 : 0;
                const gunOffsetY = 12 + sway;
                
                const isMoving = input.left.magnitude > 0.1;
                const runIntensity = input.left.magnitude; 
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); 
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; 
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; 

                const scaledY = gunOffsetY * breathScale;
                const rotatedX = gunOffsetX * Math.cos(leanAngle) - scaledY * Math.sin(leanAngle);
                const rotatedY = gunOffsetX * Math.sin(leanAngle) + scaledY * Math.cos(leanAngle);
                
                const pivotX = this.x + rotatedX;
                const pivotY = this.y - bobbing + rotatedY;
                
                const barrelLength = 25;
                const tipX = pivotX + Math.cos(this.facingAngle) * barrelLength;
                const tipY = pivotY + Math.sin(this.facingAngle) * barrelLength;

                bullets.push(new Bullet(tipX, tipY, this.facingAngle));

                if (this.leftGunNext) {
                    this.recoilL = 12; 
                    this.flashL = 0.1; 
                    this.muzzleX_L = tipX; this.muzzleY_L = tipY;
                } else {
                    this.recoilR = 12;
                    this.flashR = 0.1;
                    this.muzzleX_R = tipX; this.muzzleY_R = tipY;
                }
                this.leftGunNext = !this.leftGunNext; 
            }

            draw(ctx) {
                const isMoving = input.left.magnitude > 0.1;
                const runIntensity = input.left.magnitude; 
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); 
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; 
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; 

                this.dashParticles.forEach(p => {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 0.05, p.y - p.vy * 0.05);
                    ctx.strokeStyle = `rgba(200, 210, 220, ${alpha * 0.7})`;
                    ctx.lineWidth = p.size;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    ctx.restore();
                });

                this.dashRings.forEach(r => {
                    const alpha = Math.max(0, r.life / r.maxLife);
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(220, 230, 240, ${alpha * 0.5})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.restore();
                });

                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(0, 35 - bobbing*0.5, 30 - bobbing, 15 - bobbing*0.5, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.rotate(leanAngle);
                ctx.translate(0, -bobbing);
                ctx.scale(1, breathScale);

                const eggGrad = ctx.createRadialGradient(-10, -15, 5, 0, 0, this.radius + 10);
                eggGrad.addColorStop(0, '#ffffff');    
                eggGrad.addColorStop(0.4, '#e4e6d9'); 
                eggGrad.addColorStop(1, '#8b8e83');   

                ctx.fillStyle = eggGrad;
                ctx.beginPath();
                ctx.moveTo(0, -this.radius * 1.2); 
                ctx.bezierCurveTo(this.radius, -this.radius * 1.2, this.radius, this.radius, 0, this.radius);
                ctx.bezierCurveTo(-this.radius, this.radius, -this.radius, -this.radius * 1.2, 0, -this.radius * 1.2);
                ctx.fill();

                ctx.save();
                const faceOffsetX = Math.cos(this.facingAngle) * 10;
                const faceOffsetY = Math.sin(this.facingAngle) * 8;
                ctx.translate(faceOffsetX, faceOffsetY);
                
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(-12, -4, 9, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10, -6, 7, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = '#000';
                const pupilOffsetX = Math.cos(this.facingAngle) * 4;
                const pupilOffsetY = Math.sin(this.facingAngle) * 4;
                ctx.beginPath(); ctx.arc(-12 + pupilOffsetX, -4 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10 + pupilOffsetX, -6 + pupilOffsetY, 1.5, 0, Math.PI*2); ctx.fill();
                
                ctx.restore();

                this.drawWeapon(ctx, -25, 12, this.facingAngle, true, this.recoilL, this.flashL); 
                this.drawWeapon(ctx, 25, 12, this.facingAngle, false, this.recoilR, this.flashR); 

                ctx.restore();
            }

            drawWeapon(ctx, offsetX, offsetY, aimAngle, isLeft, recoil, flash) {
                ctx.save();
                
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (isLeft ? 0 : Math.PI)) * 5 : 0;
                ctx.translate(offsetX, offsetY + sway);
                ctx.rotate(aimAngle);
                ctx.translate(-recoil, 0);

                const isAimingLeft = Math.abs(aimAngle) > Math.PI / 2;
                if (isAimingLeft) ctx.scale(1, -1);

                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetY = isAimingLeft ? -10 : 10; 

                const gunGrad = ctx.createLinearGradient(0, -4, 0, 4);
                gunGrad.addColorStop(0, '#5a5a6a');
                gunGrad.addColorStop(0.5, '#3b3b4c');
                gunGrad.addColorStop(1, '#1c1c28');
                ctx.fillStyle = gunGrad;
                
                ctx.beginPath();
                ctx.roundRect(5, -4, 20, 8, 2); 
                ctx.roundRect(-2, -2, 10, 12, 2); 
                ctx.fill();

                ctx.shadowColor = 'transparent'; 
                ctx.fillStyle = '#050505';
                ctx.fillRect(18, -2, 5, 4); 
                ctx.fillStyle = '#888';
                ctx.fillRect(8, -3, 8, 2); 

                if (flash > 0) {
                    if (isAimingLeft) ctx.scale(1, -1);
                    
                    ctx.shadowColor = '#ffff00';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#ffffff';
                    
                    ctx.beginPath();
                    ctx.moveTo(23, 0);
                    ctx.lineTo(32 + Math.random()*8, -4 - Math.random()*4);
                    ctx.lineTo(30, 0);
                    ctx.lineTo(32 + Math.random()*8, 4 + Math.random()*4);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(26, 0, 7 * (flash/0.1), 0, Math.PI*2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // --- ENVIRONMENT ---
        function drawRoom(ctx, camX, camY) {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(-camX, -camY);

            const tileSize = 60;
            ctx.strokeStyle = 'rgba(10, 10, 12, 0.4)';
            ctx.lineWidth = 2;

            for (let x = 0; x < ROOM_SIZE; x += tileSize) {
                for (let y = 0; y < ROOM_SIZE; y += tileSize) {
                    if ((x/tileSize + y/tileSize) % 2 === 0) {
                        ctx.fillStyle = '#161412';
                    } else {
                        ctx.fillStyle = '#11100e';
                    }
                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            ctx.strokeStyle = '#0a0908'; 
            ctx.lineWidth = 40;
            ctx.strokeRect(0, 0, ROOM_SIZE, ROOM_SIZE);

            ctx.restore();
        }

        // --- DYNAMIC LIGHTING ---
        function drawLighting(ctx, camX, camY) {
            lightCtx.globalCompositeOperation = 'source-over';
            // Decreased the opacity from 0.70 to 0.55 to make the room brighter
            lightCtx.fillStyle = 'rgba(4, 4, 6, 0.55)'; 
            lightCtx.fillRect(0, 0, width, height);

            lightCtx.globalCompositeOperation = 'destination-out';

            torches.forEach(t => {
                const screenX = t.x - camX;
                const screenY = t.y - camY;
                const radius = t.getLightRadius();
                
                if (screenX > -radius && screenX < width + radius && screenY > -radius && screenY < height + radius) {
                    const grad = lightCtx.createRadialGradient(screenX, screenY, 10, screenX, screenY, radius);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');      
                    grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.5)');  
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');      
                    
                    lightCtx.fillStyle = grad;
                    lightCtx.beginPath();
                    lightCtx.arc(screenX, screenY, radius, 0, Math.PI * 2);
                    lightCtx.fill();
                }
            });

            const pScreenX = player.x - camX;
            const pScreenY = player.y - camY;
            const pRadius = 180;
            const pGrad = lightCtx.createRadialGradient(pScreenX, pScreenY, 20, pScreenX, pScreenY, pRadius);
            pGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)'); 
            pGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            lightCtx.fillStyle = pGrad;
            lightCtx.beginPath();
            lightCtx.arc(pScreenX, pScreenY, pRadius, 0, Math.PI*2);
            lightCtx.fill();

            // Give the Smilers a tiny face glow so their smiles pierce the darkness
            enemies.forEach(enemy => {
                const smileX = enemy.drawX + Math.cos(enemy.drawAngle) * 18 - camX;
                const smileY = enemy.drawY + Math.sin(enemy.drawAngle) * 18 - camY;
                
                const sGrad = lightCtx.createRadialGradient(smileX, smileY, 2, smileX, smileY, 25);
                sGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                sGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                lightCtx.fillStyle = sGrad;
                lightCtx.beginPath();
                lightCtx.arc(smileX, smileY, 25, 0, Math.PI*2);
                lightCtx.fill();
            });

            if (player.flashL > 0) {
                drawMuzzleLight(player.muzzleX_L - camX, player.muzzleY_L - camY, player.flashL);
            }
            if (player.flashR > 0) {
                drawMuzzleLight(player.muzzleX_R - camX, player.muzzleY_R - camY, player.flashR);
            }

            function drawMuzzleLight(x, y, flashAmount) {
                const fRadius = 250 * (flashAmount / 0.1); 
                const fGrad = lightCtx.createRadialGradient(x, y, 5, x, y, fRadius);
                fGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
                fGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                lightCtx.fillStyle = fGrad;
                lightCtx.beginPath();
                lightCtx.arc(x, y, fRadius, 0, Math.PI*2);
                lightCtx.fill();
            }

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(lightCanvas, 0, 0);
            ctx.restore();
        }

        // --- UI / JOYSTICKS ---
        function drawJoysticks(ctx) {
            ctx.lineWidth = 3;
            if (input.left.active) {
                ctx.beginPath();
                ctx.arc(input.left.baseX, input.left.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(input.left.currentX, input.left.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
            }
        }

        // --- MAIN LOOP ---
        const player = new Player();
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            const dt = (currentTime - lastTime) / 1000; 
            lastTime = currentTime;

            // Compute Screen Shake Once Per Frame
            let currentShakeX = 0;
            let currentShakeY = 0;
            if (shakeTime > 0) {
                shakeTime -= dt;
                currentShakeX = (Math.random() - 0.5) * shakeMag * 2;
                currentShakeY = (Math.random() - 0.5) * shakeMag * 2;
            }

            // Updates
            player.update(dt);
            torches.forEach(t => t.update(dt));
            trapdoor.update(dt);

            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.update(dt, player, enemies);

                // Bullet Collision
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let dx = enemy.x - b.x;
                    let dy = enemy.y - b.y;
                    if (dx*dx + dy*dy < enemy.radius * enemy.radius) {
                        enemy.hp -= b.damage;
                        
                        // --- DAMAGE TEXT ---
                        damageTexts.push({
                            x: enemy.x + (Math.random() - 0.5) * 20,
                            y: enemy.y - 20,
                            text: "-" + b.damage,
                            life: 0.8,
                            vy: -60 - Math.random() * 20
                        });

                        // --- BLOOD SPLATTER ---
                        let hitAngle = Math.atan2(b.vy, b.vx);
                        let numParticles = 6 + Math.floor(Math.random() * 5);
                        for(let p = 0; p < numParticles; p++) {
                            let spread = (Math.random() - 0.5) * 1.5; // Splatter cone
                            let speed = 150 + Math.random() * 400; // Burst speed
                            let size = 1.5 + Math.random() * 4;
                            // Dark gritty goop colors (Crimsons to pitch black)
                            let colors = ['#4a0505', '#240101', '#110101', '#050505'];
                            let color = colors[Math.floor(Math.random() * colors.length)];
                            
                            activeBlood.push({
                                x: enemy.x - Math.cos(hitAngle)*10, // Start slightly inside the enemy
                                y: enemy.y - Math.sin(hitAngle)*10,
                                vx: Math.cos(hitAngle + spread) * speed,
                                vy: Math.sin(hitAngle + spread) * speed,
                                size: size,
                                color: color,
                                friction: 0.80 + Math.random() * 0.1
                            });
                        }

                        bullets.splice(j, 1);
                        break; 
                    }
                }
                if (enemy.hp <= 0) {
                    enemies.splice(i, 1);
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update(dt);
                if (bullets[i].life <= 0) {
                    bullets.splice(i, 1);
                }
            }

            // Update Goop Splatter Particles
            for (let i = activeBlood.length - 1; i >= 0; i--) {
                let p = activeBlood[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                
                // Keep splatters inside the room bounds
                p.x = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.x));
                p.y = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.y));
                
                // Realistic drag
                let drag = Math.pow(p.friction, dt * 60);
                p.vx *= drag;
                p.vy *= drag;

                // When slow enough, settle and stain the floor
                if (Math.abs(p.vx) < 5 && Math.abs(p.vy) < 5) {
                    floorSplatters.push({x: p.x, y: p.y, size: p.size, color: p.color});
                    activeBlood.splice(i, 1);
                }
            }
            // Memory limit for permanent stains
            if (floorSplatters.length > 1000) {
                floorSplatters.splice(0, floorSplatters.length - 1000);
            }

            // Update Damage Texts
            for (let i = damageTexts.length - 1; i >= 0; i--) {
                let d = damageTexts[i];
                d.y += d.vy * dt;
                d.life -= dt;
                if (d.life <= 0) damageTexts.splice(i, 1);
            }

            // Camera Setup
            let camX = player.x - width / 2 + currentShakeX;
            let camY = player.y - height / 2 + currentShakeY;
            
            // Render Background
            drawRoom(ctx, camX, camY);

            // Render Entities (World Space) - Beneath Lighting
            ctx.save();
            ctx.translate(-camX, -camY);

            // Draw settled floor splatters
            floorSplatters.forEach(s => {
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw actively moving blood physics
            activeBlood.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                // Stretch moving liquid based on its speed for realism
                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                if (speed > 50) {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(Math.atan2(p.vy, p.vx));
                    ctx.ellipse(0, 0, p.size + speed * 0.015, p.size, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                } else {
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            trapdoor.draw(ctx);
            torches.forEach(t => t.draw(ctx));
            bullets.forEach(bullet => bullet.draw(ctx));
            
            // Draw enemy bodies AND smiles under the light, but BEFORE the player
            enemies.forEach(enemy => {
                enemy.drawBody(ctx);
                enemy.drawSmile(ctx);
            }); 
            
            player.draw(ctx);
            
            ctx.restore();

            // Render Dynamic Lighting Overlay (Screen Space)
            drawLighting(ctx, camX, camY);

            // Draw floating damage texts over everything (World space)
            ctx.save();
            ctx.translate(-camX, -camY);
            damageTexts.forEach(d => {
                let alpha = Math.max(0, d.life / 0.8);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ff3333';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                ctx.font = 'bold 22px system-ui, -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.strokeText(d.text, d.x, d.y);
                ctx.fillText(d.text, d.x, d.y);
            });
            ctx.restore();

            // Render UI
            drawJoysticks(ctx);

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
