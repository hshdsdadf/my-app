<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egg Survivor">
    <title>Egg Survivor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050508; overflow: hidden;
            touch-action: none;
            font-family: 'Barlow', Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* --- PORTRAIT MODE WARNING --- */
        #orientation-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050508; color: #8b8e83; z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #orientation-warning h2 { margin-bottom: 10px; font-size: 24px; color: #e4e6d9; }
        #orientation-warning p { font-size: 18px; }

        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
            #gameCanvas, #ui-layer { display: none !important; }
        }

        /* --- UI & MENUS --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        /* HUD: Health & XP Bars */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 12px 80px 12px 16px; 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 5px;
            pointer-events: none;
        }
        .bar-bg {
            width: 100%; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 3px; position: relative; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .bar-bg.vitals-bg { height: 12px; border-radius: 6px; }
        .bar-bg.growth-bg { height: 6px; border-radius: 3px; border-color: rgba(255,255,255,0.04); }
        .bar-fill { height: 100%; width: 100%; transition: width 0.15s ease-out; }
        .vitals-fill {
            background: linear-gradient(90deg, #5a0000 0%, #9d0208 50%, #d00000 80%, #ff2222 100%);
            box-shadow: 0 0 12px #aa0000, inset 0 1px 0 rgba(255,100,100,0.3);
        }
        .growth-fill {
            background: linear-gradient(90deg, #003a5a, #0077b6, #00b4d8);
            box-shadow: 0 0 8px #0077b6;
        }
        .bar-label {
            position: absolute; top: 0; left: 8px; font-weight: 900; color: rgba(255,255,255,0.85);
            text-shadow: 1px 1px 2px black; letter-spacing: 2px;
            font-family: 'Barlow', Arial, sans-serif;
        }
        .vitals-label { font-size: 8px; line-height: 12px; }
        .growth-label { font-size: 5px; line-height: 6px; opacity: 0.6; }

        #pause-btn {
            position: absolute; top: 15px; right: 20px; width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; pointer-events: auto; cursor: pointer;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #pause-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        #pause-btn:active { transform: scale(0.95); }
        .pause-bar { width: 6px; height: 20px; background: white; margin: 0 3px; border-radius: 3px; }

        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 6, 0.88); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto; opacity: 1; transition: opacity 0.3s ease;
        }
        .menu-overlay.hidden, #pause-btn.hidden, #hud.hidden { opacity: 0; pointer-events: none; }

        .menu-box {
            background: rgba(12, 10, 10, 0.95); border: 1px solid rgba(255,255,255,0.08);
            border-top: 2px solid rgba(255,255,255,0.15); padding: 44px 52px; border-radius: 2px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.95), 0 0 0 1px rgba(0,0,0,0.5);
            transform: translateY(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; text-align: center; min-width: 340px;
        }
        .menu-overlay.hidden .menu-box { transform: translateY(20px); }

        .menu-overlay h2 {
            color: #ffffff; margin: 0 0 32px 0; font-family: 'Bebas Neue', sans-serif;
            font-size: 38px; font-weight: 400; letter-spacing: 6px;
            text-shadow: 0 2px 20px rgba(255,255,255,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 24px; width: 100%;
        }

        /* --- LEVEL UP CARDS (Holographic & Textured) --- */
        #levelup-menu .menu-box {
            background: transparent; border: none; box-shadow: none; padding: 0; width: 100%; max-width: 800px;
        }
        #levelup-menu h2 {
            font-size: 50px; color: #00b4d8; text-shadow: 0 0 30px rgba(0,180,216,0.6); 
            border: none; margin-bottom: 30px; letter-spacing: 8px;
        }
        .cards-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        
        .card {
            width: 210px; height: 330px;
            border-radius: 18px; padding: 25px 15px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: radial-gradient(circle at top, #3a3a4a 0%, #15151e 100%);
            border: 2px solid #555;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        
        /* Grid Texture Overlay */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 6px);
            z-index: 0; pointer-events: none;
        }
        /* Holographic Light Sweep */
        .card::after {
            content: ''; position: absolute; top: -100%; left: -100%; width: 50%; height: 300%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(35deg); animation: sweep 3.5s infinite linear;
            z-index: 1; pointer-events: none; mix-blend-mode: overlay;
        }
        @keyframes sweep { 0% { left: -100%; } 20%, 100% { left: 200%; } }
        
        .card:hover {
            transform: translateY(-12px) scale(1.05);
            border-color: rgba(220, 230, 255, 0.9);
            box-shadow: 0 15px 40px rgba(120, 150, 255, 0.3), inset 0 0 40px rgba(220, 230, 255, 0.25);
        }

        .card-common { 
            border-color: rgba(180, 200, 255, 0.5); 
            box-shadow: 0 10px 30px rgba(100, 120, 200, 0.2), inset 0 0 30px rgba(180, 200, 255, 0.15);
        }

        .card-uncommon {
            background: radial-gradient(circle at top, #1a3020 0%, #080f0a 100%);
            border-color: rgba(60, 200, 100, 0.7);
            box-shadow: 0 10px 35px rgba(30, 160, 70, 0.35), inset 0 0 30px rgba(40, 180, 80, 0.12),
                        0 0 0 1px rgba(60, 200, 100, 0.15);
        }
        .card-uncommon::before {
            background-image: repeating-linear-gradient(45deg, rgba(60,200,100,0.04) 0px, rgba(60,200,100,0.04) 2px, transparent 2px, transparent 6px);
        }
        .card-uncommon::after {
            background: linear-gradient(to right, rgba(60,200,100,0) 0%, rgba(60,200,100,0.35) 50%, rgba(60,200,100,0) 100%);
        }
        .card-uncommon:hover {
            border-color: rgba(100, 255, 140, 0.95);
            box-shadow: 0 15px 45px rgba(40, 200, 80, 0.45), inset 0 0 45px rgba(60, 220, 100, 0.2),
                        0 0 60px rgba(40, 180, 80, 0.2);
        }
        .card-uncommon .rarity { color: #3ddc6a; }
        .card-uncommon h3 { color: #b8f5cc; text-shadow: 0 0 12px rgba(60,220,100,0.5); }
        .card-uncommon .card-icon-container {
            border-color: rgba(60,200,100,0.4);
            box-shadow: inset 0 0 20px rgba(40,180,80,0.2), 0 5px 15px rgba(0,0,0,0.8), 0 0 15px rgba(40,180,80,0.2);
            background: radial-gradient(circle, #0d1f12 0%, #030a05 100%);
        }
        .card-uncommon .menu-btn { border-color: rgba(60,200,100,0.5); color: #b8f5cc; background: rgba(20,80,40,0.3); }
        .card-uncommon .menu-btn:hover { background: rgba(30,140,60,0.45); border-color: rgba(80,240,120,0.8); color: #fff; box-shadow: 0 0 20px rgba(40,200,80,0.3); }

        .card-content { z-index: 2; position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        
        .card-icon-container {
            width: 76px; height: 76px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2); box-shadow: inset 0 0 20px rgba(255,255,255,0.15), 0 5px 15px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 12px; position: relative;
            background: radial-gradient(circle, #2a2a35 0%, #0a0a0f 100%);
        }

        .card h3 { 
            color: white; margin: 0 0 5px 0; text-transform: uppercase; font-size: 24px; 
            font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; text-align: center;
        }
        .card .rarity { 
            font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; 
            margin-bottom: 12px; font-weight: 800; background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 4px;
        }
        .card .desc { 
            color: #ccc; font-size: 13px; text-align: center; line-height: 1.4; flex-grow: 1; font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); padding: 0 5px;
        }
        .card .menu-btn {
            width: 100%; margin: 0; padding: 10px; font-size: 13px; margin-top: auto;
        }

        /* --- GAME OVER MENU --- */
        @keyframes glitch-title {
            0%, 88%, 100% { transform: none; opacity: 1; }
            89% { transform: translateX(-3px); opacity: 0.9; }
            91% { transform: translateX(3px); opacity: 1; }
            93% { transform: translateX(-1px); opacity: 0.95; }
            95% { transform: none; }
        }
        @keyframes bleed-in { 0% { opacity: 0; transform: translateY(-16px); } 100% { opacity: 1; transform: translateY(0); } }
        #gameover-menu { background: rgba(5, 2, 2, 0.97); overflow-y: auto; }
        #gameover-menu .menu-box {
            background: rgba(14, 8, 8, 0.98); border: 1px solid rgba(100, 0, 0, 0.3);
            border-top: 2px solid rgba(160, 0, 0, 0.55); padding: 28px 36px 24px; border-radius: 2px;
            box-shadow: 0 16px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(0,0,0,0.4);
            animation: bleed-in 0.5s ease-out forwards; min-width: unset; width: min(380px, 88vw);
        }
        .death-eyebrow {
            font-family: 'Barlow', Arial, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 5px;
            color: rgba(140, 20, 20, 0.9); text-transform: uppercase; margin-bottom: 10px;
        }
        .death-title {
            font-family: 'Bebas Neue', 'Arial Black', Arial, sans-serif; font-size: 30px; font-weight: 400; letter-spacing: 2px;
            color: #f0f0f0; text-shadow: 0 0 28px rgba(160,0,0,0.45), 0 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 20px; line-height: 1.15; animation: glitch-title 6s infinite;
        }
        .death-stats {
            width: 100%; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 0; margin-bottom: 20px;
        }
        .stat-row {
            display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0;
            font-family: 'Barlow', Arial, sans-serif; font-size: 13px; font-weight: 600;
        }
        .stat-row span:first-child { color: #666; letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
        .stat-row span:last-child { color: #ccc; font-size: 15px; font-weight: 700; }
        .stat-row.stat-score { margin-top: 10px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
        .stat-row.stat-score span:first-child { color: rgba(160,20,20,0.8); }
        .stat-row.stat-score span:last-child { color: #fff; font-size: 18px; }

        .menu-btn {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.14); color: #cccccc; padding: 15px 40px; margin: 6px;
            font-family: 'Barlow', Arial, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            border-radius: 2px; cursor: pointer; transition: all 0.18s; width: 280px;
        }
        .menu-btn.primary { border-color: rgba(200,30,30,0.6); color: #fff; background: rgba(140,0,0,0.25); text-shadow: 0 0 12px rgba(255,60,60,0.4); }
        .menu-btn:hover { background: rgba(160,10,10,0.4); color: #fff; border-color: rgba(220,40,40,0.8); box-shadow: 0 0 24px rgba(160,0,0,0.3); transform: scale(1.02); }
        .menu-btn:active { transform: scale(0.98); }

        .slider-container { width: 300px; margin: 12px 0; display: flex; flex-direction: column; align-items: stretch; }
        .slider-container label {
            color: #aaa; font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; justify-content: space-between;
            letter-spacing: 1px; text-transform: uppercase;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 2px; background: #ddd; cursor: pointer;
            margin-top: -7px; box-shadow: 0 0 8px rgba(255,255,255,0.3); transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; cursor: pointer; background: rgba(255,255,255,0.15); border-radius: 1px; }

        #countdown-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', 'Arial Black', Arial, sans-serif; font-size: 160px; font-weight: 400; color: white;
            text-shadow: 0 8px 40px rgba(0,0,0,0.9), 0 0 30px rgba(255,255,255,0.3); pointer-events: none; opacity: 0; letter-spacing: 8px;
        }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 40% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
        .pop-anim { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <h2>Please tilt your phone the other way.</h2>
        <p>Rocktato plays in landscape.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay Layer -->
    <div id="ui-layer">
        
        <!-- HUD -->
        <div id="hud">
            <div class="bar-bg vitals-bg">
                <div id="vitals-bar" class="bar-fill vitals-fill" style="width: 100%;"></div>
                <div class="bar-label vitals-label">VITALS</div>
            </div>
            <div class="bar-bg growth-bg">
                <div id="growth-bar" class="bar-fill growth-fill" style="width: 0%;"></div>
                <div class="bar-label growth-label">GROWTH</div>
            </div>
        </div>

        <button id="pause-btn" onclick="setGameState('paused')">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
        </button>

        <!-- Level Up Menu -->
        <div id="levelup-menu" class="menu-overlay hidden">
            <h2>NEW ARSENAL</h2>
            <div class="menu-box">
                <div id="cards-container" class="cards-container">
                    <!-- Cards injected via JS -->
                </div>
            </div>
        </div>

        <!-- Pause Menu -->
        <div id="pause-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <h2>PAUSED</h2>
                <button class="menu-btn primary" onclick="startCountdown()">Resume</button>
                <button class="menu-btn" onclick="setGameState('settings')">Settings</button>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="settings-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <h2>SETTINGS</h2>
                <div class="slider-container">
                    <label>Brightness <span id="val-brightness">55%</span></label>
                    <input type="range" id="set-brightness" min="10" max="75" value="55" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Camera Zoom <span id="val-zoom">100%</span></label>
                    <input type="range" id="set-zoom" min="80" max="150" value="100" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Screen Shake <span id="val-shake">100%</span></label>
                    <input type="range" id="set-shake" min="0" max="200" value="100" oninput="updateSettingsUI()">
                </div>
                <button class="menu-btn primary" style="margin-top: 20px;" onclick="setGameState('paused')">Back</button>
            </div>
        </div>

        <!-- Game Over Menu -->
        <div id="gameover-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <div class="death-eyebrow">— You Died —</div>
                <div id="death-title" class="death-title"></div>
                <div class="death-stats">
                    <div class="stat-row"><span>Kills</span><span id="ds-kills">—</span></div>
                    <div class="stat-row"><span>Time Alive</span><span id="ds-time">—</span></div>
                    <div class="stat-row"><span>Rooms Cleared</span><span id="ds-rooms">—</span></div>
                    <div class="stat-row stat-score"><span>Score</span><span id="ds-score">—</span></div>
                </div>
                <button class="menu-btn primary" onclick="restartRun()">Restart Run</button>
            </div>
        </div>

        <div id="countdown-display"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        const lightCanvas = document.createElement('canvas');
        const lightCtx = lightCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            lightCanvas.width = width; lightCanvas.height = height;
        }
        window.addEventListener('resize', resize); resize();

        // --- GLOBAL STATE, PROGRESSION, & SETTINGS ---
        let gameState = 'playing'; // playing, paused, settings, countdown, gameover, levelup
        let countdownValue = 0; let countdownTimer = 0;
        let currentRoom = 1; let totalEnemiesThisRoom = 4; let enemiesKilledThisRoom = 0; let hasKey = false;
        let roomTextTimer = 2.0; let keyDroppedTimer = 0; let exitDoorProgress = 0; 
        let totalKills = 0; let timeAlive = 0; let deathParticles = [];

        // Weapons Library (With scales and power rankings)
        const WEAPONS = {
            'nailgun': { name: 'Rusty Nail Gun', rarity: 'common', chance: '62%', desc: 'Auto-fires short rusty spikes.\nDamage: 3', scale: 1.2, power: 10 },
            'candle': { name: 'Candle Holder', rarity: 'common', chance: '66%', desc: 'Shoots small flickering flames.\nDamage: 2', scale: 0.9, power: 8 },
            'revolver': { name: 'Broken Revolver', rarity: 'common', chance: '58%', desc: 'Fires slow, heavy slugs.\nDamage: 10', scale: 1.3, power: 15 },
            'knife': { name: 'Kitchen Knife', rarity: 'common', chance: '64%', desc: 'Orbits close and stabs rapidly.\nDamage: 4', scale: 1.1, power: 12 },
            'needle': { name: 'Sewing Needle', rarity: 'common', chance: '65%', desc: 'Fast shots that pierce 3 targets.\nDamage: 5', scale: 0.6, power: 11 },
            'bone': { name: 'Bone Fragment', rarity: 'common', chance: '60%', desc: 'Violently bounces between foes.\nDamage: 3', scale: 0.8, power: 9 },
            'bottle': { name: 'Cracked Bottle', rarity: 'common', chance: '61%', desc: 'Shatters into glass shrapnel.\nDamage: 4', scale: 1.0, power: 11 },
            'chain': { name: 'Iron Chain', rarity: 'common', chance: '59%', desc: 'Whips in a wide arc.\nDamage: 6', scale: 1.4, power: 13 },
            'feather': { name: 'Crow Feather', rarity: 'common', chance: '63%', desc: 'Piercing dark feathers.\nDamage: 4', scale: 0.7, power: 10 },
            // --- UNCOMMON WEAPONS ---
            'coffin_nail': { name: 'Coffin Nail', rarity: 'uncommon', chance: '50%', desc: 'Heavy piercing shot.\nDamage: 14', scale: 1.2, power: 18 },
            'church_bell': { name: 'Church Bell', rarity: 'uncommon', chance: '45%', desc: 'Rings out a deadly shockwave.\nDamage: 12', scale: 1.3, power: 20 },
            'skull_staff': { name: 'Skull Staff', rarity: 'uncommon', chance: '52%', desc: 'Shoots homing skulls.\nDamage: 9', scale: 1.1, power: 16 },
            'cursed_book': { name: 'Cursed Book', rarity: 'uncommon', chance: '48%', desc: 'Fires random magic bolts.\nDamage: 6', scale: 1.0, power: 14 },
            'rib_cage': { name: 'Rib Cage', rarity: 'uncommon', chance: '55%', desc: 'Spins close, shredding enemies.\nDamage: 5', scale: 1.2, power: 15 },
            'blood_syringe': { name: 'Blood Syringe', rarity: 'uncommon', chance: '42%', desc: 'Injects enemies, causing explosions.\nDamage: 5+20', scale: 1.1, power: 19 },
            'black_candle': { name: 'Black Candle', rarity: 'uncommon', chance: '53%', desc: 'Summons seeking ghost flames.\nDamage: 8', scale: 1.0, power: 15 },

        function triggerLevelUp() {
            setGameState('levelup');
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            const commons = Object.keys(WEAPONS).filter(k => WEAPONS[k].rarity === 'common');
            const uncommons = Object.keys(WEAPONS).filter(k => WEAPONS[k].rarity === 'uncommon');
            const choices = [];
            const used = new Set();

            for (let i = 0; i < 3; i++) {
                // 50% chance of an uncommon card each slot
                let useUncommon = Math.random() < 0.5 && uncommons.length > 0;
                let pool = useUncommon ? uncommons.filter(k => !used.has(k)) : commons.filter(k => !used.has(k));
                // Fallback to other pool if empty
                if (pool.length === 0) pool = (useUncommon ? commons : uncommons).filter(k => !used.has(k));
                if (pool.length === 0) pool = Object.keys(WEAPONS).filter(k => !used.has(k));
                if (pool.length === 0) break;
                const pick = pool[Math.floor(Math.random() * pool.length)];
                choices.push(pick);
                used.add(pick);
            }
            
            choices.forEach((key, index) => {
                const w = WEAPONS[key];
                const card = document.createElement('div');
                card.className = `card card-${w.rarity}`;
                card.innerHTML = `
                    <div class="card-content">
                        <canvas id="icon-canvas-${index}" class="card-icon-container" width="76" height="76"></canvas>
                        <h3>${w.name}</h3>
                        <div class="rarity">${w.rarity} <span style="color: #666; margin: 0 4px;">|</span> ${w.chance}</div>
                        <div class="desc">${w.desc.replace('\n', '<br>')}</div>
                        <button class="menu-btn primary">Select</button>
                    </div>
                `;
                card.onclick = (e) => { selectCard(key); };
                container.appendChild(card);

                // Draw the custom weapon icon onto the card's canvas
                setTimeout(() => {
                    const c = document.getElementById(`icon-canvas-${index}`);
                    if(c) {
                        const ctxIcon = c.getContext('2d');
                        ctxIcon.translate(38, 38);
                        ctxIcon.scale(1.8 * w.scale, 1.8 * w.scale);
                        ctxIcon.rotate(-Math.PI/4); // Point up and right
                        drawWeaponEntity(ctxIcon, key, 0);
                    }
                }, 50);
            });
        }

        window.selectCard = function(key) {
            let fireRate = 0.5;
            if (key === 'nailgun') fireRate = 0.15;
            if (key === 'candle') fireRate = 0.35;
            if (key === 'revolver') fireRate = 1.2;
            if (key === 'knife') fireRate = 0.4;
            if (key === 'needle') fireRate = 0.6;
            if (key === 'bone') fireRate = 0.8;
            if (key === 'bottle') fireRate = 0.9;
            if (key === 'chain') fireRate = 0.8;
            if (key === 'feather') fireRate = 0.5;
            // Uncommon weapons
            if (key === 'coffin_nail') fireRate = 1.0;
            if (key === 'church_bell') fireRate = 1.8;
            if (key === 'skull_staff') fireRate = 0.9;
            if (key === 'cursed_book') fireRate = 1.2;
            if (key === 'rib_cage') fireRate = 0.08;
            if (key === 'blood_syringe') fireRate = 2.2;
            if (key === 'black_candle') fireRate = 1.0;
            if (key === 'bone_saw') fireRate = 0.09;
            if (key === 'funeral_cross') fireRate = 0.9;
            if (key === 'raven') fireRate = 1.6;

            const newWeapon = { id: key, fireTimer: 0, rate: fireRate, lastAimAngle: 0, lungeTimer: 0, hasHit: false, lungeOffset: 0, sweepAngle: 0 };

            if (player.orbitingWeapons.length >= 12) {
                // Find weakest weapon to replace
                let weakestIdx = 0; let minPower = Infinity;
                player.orbitingWeapons.forEach((w, i) => {
                    if (WEAPONS[w.id].power < minPower) { minPower = WEAPONS[w.id].power; weakestIdx = i; }
                });
                player.orbitingWeapons[weakestIdx] = newWeapon;
            } else {
                player.orbitingWeapons.push(newWeapon);
                player.weapons++;
            }
            setGameState('playing');
        };

        function startNextRoom() {
            currentRoom++;
            trapdoor.choirsLeft = currentRoom >= 5 ? Math.floor(Math.random() * 2) + 1 : 0;
            totalEnemiesThisRoom = 4 + Math.min(currentRoom - 1, 9) + trapdoor.choirsLeft;

            trapdoor.state = 'waiting'; trapdoor.timer = 0; trapdoor.enemiesToSpawn = totalEnemiesThisRoom; trapdoor.delayTimer = 2.0; trapdoor.openAngle = 0;
            trapdoor.kneelersLeft = currentRoom >= 3 ? Math.min(5, 2 + (currentRoom - 3)) : 0;
            roomTextTimer = 1.5; keyDroppedTimer = 0;
        }

        let shakeTime = 0; let shakeMag = 0; let currentShakeX = 0; let currentShakeY = 0;
        function triggerShake(magnitude, duration) { if (shakeMag < magnitude || shakeTime <= 0) { shakeMag = magnitude; shakeTime = duration; } }

        const input = { left: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 }, right: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0, lastTapTime: 0, doubleTapped: false } };
        const JOYSTICK_MAX_RADIUS = 60;

        function handleTouch(e) {
