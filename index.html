<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egg Survivor">
    <title>Egg Survivor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f13;
            overflow: hidden;
            touch-action: none; /* Prevents pull-to-refresh and scrolling */
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for no transparency on base layer

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- INPUT MANAGEMENT (Multi-touch Joysticks) ---
        const input = {
            left: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 },
            right: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 }
        };

        const JOYSTICK_MAX_RADIUS = 60;

        function handleTouch(e) {
            e.preventDefault();
            const halfWidth = width / 2;

            // Reset active states for tracking
            let leftFound = false;
            let rightFound = false;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                
                // Left Side Touch (Movement)
                if (touch.clientX < halfWidth) {
                    leftFound = true;
                    if (!input.left.active) {
                        input.left.active = true;
                        input.left.id = touch.identifier;
                        input.left.baseX = touch.clientX;
                        input.left.baseY = touch.clientY;
                    }
                    if (input.left.id === touch.identifier) {
                        input.left.currentX = touch.clientX;
                        input.left.currentY = touch.clientY;
                    }
                } 
                // Right Side Touch (Aim/Fire)
                else {
                    rightFound = true;
                    if (!input.right.active) {
                        input.right.active = true;
                        input.right.id = touch.identifier;
                        input.right.baseX = touch.clientX;
                        input.right.baseY = touch.clientY;
                    }
                    if (input.right.id === touch.identifier) {
                        input.right.currentX = touch.clientX;
                        input.right.currentY = touch.clientY;
                    }
                }
            }

            // Clean up released touches
            if (!leftFound) input.left.active = false;
            if (!rightFound) input.right.active = false;

            // Calculate Vectors
            ['left', 'right'].forEach(side => {
                const stick = input[side];
                if (stick.active) {
                    let dx = stick.currentX - stick.baseX;
                    let dy = stick.currentY - stick.baseY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > JOYSTICK_MAX_RADIUS) {
                        dx = (dx / dist) * JOYSTICK_MAX_RADIUS;
                        dy = (dy / dist) * JOYSTICK_MAX_RADIUS;
                        dist = JOYSTICK_MAX_RADIUS;
                        
                        // Optional: Make the base follow the finger if pulled too far (floating joystick)
                        stick.baseX = stick.currentX - dx;
                        stick.baseY = stick.currentY - dy;
                    }
                    
                    stick.vectorX = dx / JOYSTICK_MAX_RADIUS;
                    stick.vectorY = dy / JOYSTICK_MAX_RADIUS;
                    stick.magnitude = dist / JOYSTICK_MAX_RADIUS; // 0.0 to 1.0
                } else {
                    stick.vectorX = 0;
                    stick.vectorY = 0;
                    stick.magnitude = 0;
                }
            });
        }

        window.addEventListener('touchstart', handleTouch, { passive: false });
        window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false });
        window.addEventListener('touchcancel', handleTouch, { passive: false });

        // Mouse fallback for desktop testing
        let mouseDown = false;
        window.addEventListener('mousedown', (e) => {
            mouseDown = true;
            handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] });
        });
        window.addEventListener('mousemove', (e) => {
            if (mouseDown) handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] });
        });
        window.addEventListener('mouseup', (e) => {
            mouseDown = false;
            handleTouch({ preventDefault: ()=>{}, touches: [] });
        });


        // --- GAME OBJECTS ---
        const ROOM_SIZE = 2000;

        class Player {
            constructor() {
                this.x = ROOM_SIZE / 2;
                this.y = ROOM_SIZE / 2;
                this.radius = 35;
                this.speed = 400; // max pixels per second
                this.animTime = 0;
                this.facingAngle = 0;
            }

            update(dt) {
                // Movement
                const moveMag = input.left.magnitude;
                if (moveMag > 0) {
                    // Magnitude dictates speed (walk vs run)
                    this.x += input.left.vectorX * this.speed * moveMag * dt;
                    this.y += input.left.vectorY * this.speed * moveMag * dt;
                    
                    // Keep in room bounds
                    this.x = Math.max(this.radius, Math.min(ROOM_SIZE - this.radius, this.x));
                    this.y = Math.max(this.radius, Math.min(ROOM_SIZE - this.radius, this.y));

                    // Animation speed increases with movement magnitude
                    this.animTime += dt * (10 + moveMag * 15); 
                } else {
                    // Idle animation speed
                    this.animTime += dt * 3;
                }

                // Facing Angle (Aim overrides movement facing)
                if (input.right.active && input.right.magnitude > 0.1) {
                    this.facingAngle = Math.atan2(input.right.vectorY, input.right.vectorX);
                } else if (input.left.active && moveMag > 0.1) {
                    this.facingAngle = Math.atan2(input.left.vectorY, input.left.vectorX);
                }
            }

            draw(ctx) {
                const isMoving = input.left.magnitude > 0.1;
                const runIntensity = input.left.magnitude; // 0 to 1
                
                // Procedural Animation calculations
                const bobbing = Math.sin(this.animTime) * (isMoving ? 5 * runIntensity : 2); // Body bounces
                const leanAngle = isMoving ? input.left.vectorX * 0.15 * runIntensity : 0; // Leans into run
                const breathScale = 1 + Math.sin(this.animTime * 0.5) * 0.02; // Gentle breathing

                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                // Shadow shrinks slightly as player bobs up
                ctx.ellipse(0, 35 - bobbing*0.5, 30 - bobbing, 15 - bobbing*0.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Apply body transformations (bobbing, leaning)
                ctx.rotate(leanAngle);
                ctx.translate(0, -bobbing);
                ctx.scale(1, breathScale);

                // --- LEGS (Procedural) ---
                if (isMoving) {
                    const legStride = 20 * runIntensity;
                    const leftLegY = Math.sin(this.animTime) * legStride;
                    const rightLegY = Math.sin(this.animTime + Math.PI) * legStride;
                    
                    ctx.fillStyle = '#333';
                    // Left leg
                    ctx.beginPath();
                    ctx.arc(-12, 25 + Math.max(0, -leftLegY*0.5), 8, 0, Math.PI * 2);
                    ctx.fill();
                    // Right leg
                    ctx.beginPath();
                    ctx.arc(12, 25 + Math.max(0, -rightLegY*0.5), 8, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Idle legs
                    ctx.fillStyle = '#333';
                    ctx.beginPath(); ctx.arc(-10, 25, 8, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(10, 25, 8, 0, Math.PI*2); ctx.fill();
                }

                // --- BODY (The Egg) ---
                // Create a beautiful 3D radial gradient for the egg
                const eggGrad = ctx.createRadialGradient(-10, -15, 5, 0, 0, this.radius + 10);
                eggGrad.addColorStop(0, '#ffffff');    // Highlight
                eggGrad.addColorStop(0.5, '#f4ecd8');  // Base egg color
                eggGrad.addColorStop(1, '#c2b69d');    // Shadow edge

                ctx.fillStyle = eggGrad;
                ctx.beginPath();
                // Draw an egg shape using bezier curves
                ctx.moveTo(0, -this.radius * 1.2); 
                ctx.bezierCurveTo(
                    this.radius, -this.radius * 1.2, 
                    this.radius, this.radius, 
                    0, this.radius
                );
                ctx.bezierCurveTo(
                    -this.radius, this.radius, 
                    -this.radius, -this.radius * 1.2, 
                    0, -this.radius * 1.2
                );
                ctx.fill();

                // --- EYES (Track aiming direction) ---
                ctx.save();
                // Offset eyes based on facing angle to give 3D rotation effect
                const eyeOffsetX = Math.cos(this.facingAngle) * 12;
                const eyeOffsetY = Math.sin(this.facingAngle) * 10 - 5;
                
                ctx.translate(eyeOffsetX, eyeOffsetY);
                
                // Sclera (Whites)
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.ellipse(-8, 0, 6, 8, 0, 0, Math.PI*2); ctx.fill(); // Left eye
                ctx.beginPath(); ctx.ellipse(8, 0, 6, 8, 0, 0, Math.PI*2); ctx.fill();  // Right eye
                
                // Pupils
                ctx.fillStyle = '#111';
                const pupilOffsetX = Math.cos(this.facingAngle) * 3;
                const pupilOffsetY = Math.sin(this.facingAngle) * 3;
                ctx.beginPath(); ctx.arc(-8 + pupilOffsetX, pupilOffsetY, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(8 + pupilOffsetX, pupilOffsetY, 3, 0, Math.PI*2); ctx.fill();
                
                // Angry Eyebrows
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#333';
                ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(-15, -8); ctx.lineTo(-3, -4); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(15, -8); ctx.lineTo(3, -4); ctx.stroke();
                
                ctx.restore();

                // --- WEAPONS (Dual Pistols) ---
                this.drawWeapon(ctx, -25, 10, this.facingAngle, true); // Left Gun
                this.drawWeapon(ctx, 25, 10, this.facingAngle, false); // Right Gun

                ctx.restore();
            }

            drawWeapon(ctx, offsetX, offsetY, aimAngle, isLeft) {
                ctx.save();
                
                // Weapon sway while moving
                const sway = (input.left.magnitude > 0.1) ? Math.sin(this.animTime + (isLeft ? 0 : Math.PI)) * 5 : 0;
                
                ctx.translate(offsetX, offsetY + sway);
                
                // Rotate gun towards aim angle. 
                // We need to adjust rotation slightly if the gun is on the left/right of the body to point to the exact crosshair, 
                // but for top-down parallel aiming looks great.
                ctx.rotate(aimAngle);

                // Gun Shadow
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetY = 10;

                // Gun Body (Metallic gradient)
                const gunGrad = ctx.createLinearGradient(0, -4, 0, 4);
                gunGrad.addColorStop(0, '#7a7a8c');
                gunGrad.addColorStop(0.5, '#4b4b5c');
                gunGrad.addColorStop(1, '#2c2c38');

                ctx.fillStyle = gunGrad;
                
                // Draw Pistol Shape
                ctx.beginPath();
                ctx.roundRect(5, -4, 20, 8, 2); // Barrel
                ctx.roundRect(-2, -2, 10, 12, 2); // Grip (rotated slightly down implicitly by shape)
                ctx.fill();

                // Gun Details (Highlights)
                ctx.shadowColor = 'transparent'; // turn off shadow for details
                ctx.fillStyle = '#111';
                ctx.fillRect(18, -2, 5, 4); // Muzzle opening
                ctx.fillStyle = '#999';
                ctx.fillRect(8, -3, 8, 2); // Slide highlight

                ctx.restore();
            }
        }

        // --- ENVIRONMENT ---
        function drawRoom(ctx, camX, camY) {
            // Fill background with a dark void color
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(-camX, -camY);

            // Draw Floor Grid/Tiles
            const tileSize = 100;
            const startX = Math.floor(camX / tileSize) * tileSize;
            const startY = Math.floor(camY / tileSize) * tileSize;
            const endX = startX + width + tileSize;
            const endY = startY + height + tileSize;

            ctx.strokeStyle = 'rgba(40, 45, 60, 0.4)';
            ctx.lineWidth = 2;

            for (let x = Math.max(0, startX); x <= Math.min(ROOM_SIZE, endX); x += tileSize) {
                for (let y = Math.max(0, startY); y <= Math.min(ROOM_SIZE, endY); y += tileSize) {
                    // Create a subtle checkerboard pattern
                    if ((x/tileSize + y/tileSize) % 2 === 0) {
                        ctx.fillStyle = '#16171d';
                    } else {
                        ctx.fillStyle = '#1a1c23';
                    }
                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            // Draw Room Walls (Bounds)
            ctx.strokeStyle = '#4a90e2'; // Sci-fi glowing border
            ctx.lineWidth = 10;
            ctx.shadowColor = '#4a90e2';
            ctx.shadowBlur = 20;
            ctx.strokeRect(0, 0, ROOM_SIZE, ROOM_SIZE);

            ctx.restore();
        }

        // --- UI / JOYSTICKS ---
        function drawJoysticks(ctx) {
            ctx.lineWidth = 3;
            
            // Draw Left Joystick (Movement)
            if (input.left.active) {
                // Base
                ctx.beginPath();
                ctx.arc(input.left.baseX, input.left.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.stroke();

                // Thumb
                ctx.beginPath();
                ctx.arc(input.left.currentX, input.left.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            }

            // Draw Right Joystick (Aiming)
            if (input.right.active) {
                // Base
                ctx.beginPath();
                ctx.arc(input.right.baseX, input.right.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 50, 50, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 50, 50, 0.3)';
                ctx.stroke();

                // Thumb
                ctx.beginPath();
                ctx.arc(input.right.currentX, input.right.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 50, 50, 0.6)';
                ctx.fill();
                
                // Draw crosshair line indicating direction
                ctx.beginPath();
                ctx.moveTo(input.right.currentX, input.right.currentY);
                const aimAngle = Math.atan2(input.right.vectorY, input.right.vectorX);
                ctx.lineTo(
                    input.right.currentX + Math.cos(aimAngle) * 60, 
                    input.right.currentY + Math.sin(aimAngle) * 60
                );
                ctx.strokeStyle = 'rgba(255, 50, 50, 0.8)';
                ctx.stroke();
            }
        }


        // --- MAIN LOOP ---
        const player = new Player();
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            const dt = (currentTime - lastTime) / 1000; // Delta time in seconds
            lastTime = currentTime;

            // Update
            player.update(dt);

            // Camera calculations (Center player)
            // Clamp camera to room bounds so we don't see outside the walls if close to edge
            let camX = player.x - width / 2;
            let camY = player.y - height / 2;
            
            // Optional: Clamp camera inside room (Uncomment to lock camera to room edges)
            /*
            camX = Math.max(-50, Math.min(ROOM_SIZE - width + 50, camX));
            camY = Math.max(-50, Math.min(ROOM_SIZE - height + 50, camY));
            */

            // Render
            drawRoom(ctx, camX, camY);

            // Render entities relative to camera
            ctx.save();
            ctx.translate(-camX, -camY);
            player.draw(ctx);
            ctx.restore();

            // Render UI over everything
            drawJoysticks(ctx);

            requestAnimationFrame(gameLoop);
        }

        // Start game
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
