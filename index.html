<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Mobile Game</title>

    <!-- Import Three.js for high-quality procedural 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- THE CANVAS --- */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in; 
        }

        /* --- ORIENTATION LOCK UI --- */
        #orientation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #ffffff;
            text-align: center;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #f8fafc;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            max-width: 80%;
            line-height: 1.5;
        }

        .device-icon { width: 120px; height: 120px; }

        @keyframes tiltPhone {
            0%, 15% { transform: rotate(0deg); }
            45%, 55% { transform: rotate(-90deg); }
            85%, 100% { transform: rotate(0deg); }
        }

        @keyframes pulseArrow {
            0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 2px #38bdf8); }
            50% { opacity: 1; filter: drop-shadow(0 0 10px #38bdf8); }
        }

        .phone-group {
            transform-origin: 50px 50px;
            animation: tiltPhone 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .arrow-group {
            animation: pulseArrow 1.5s ease-in-out infinite;
        }

        @media screen and (orientation: landscape) {
            #orientation-overlay { display: none; }
            #gameCanvas { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <svg class="device-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g class="arrow-group">
                <path d="M 20 60 A 35 35 0 0 1 80 60" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>
                <polygon points="85,55 80,68 73,56" fill="#38bdf8" />
            </g>
            <g class="phone-group">
                <rect x="32" y="20" width="36" height="60" rx="6" fill="#0f172a" stroke="#ffffff" stroke-width="3"/>
                <line x1="45" y1="26" x2="55" y2="26" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
                <circle cx="50" cy="73" r="2.5" fill="#cbd5e1"/>
            </g>
        </svg>
        <h1 class="title">Rotate Device</h1>
        <p class="subtitle">Please turn your device to landscape mode to play.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 3D ENGINE SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x020202, 10, 50);

        // Dynamic Camera
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        let cameraOffset = new THREE.Vector3(0, 12, 16);
        camera.position.copy(cameraOffset);

        // High-Quality Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xaaccff, 2.5);
        spotLight.position.set(5, 20, 10);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.8;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        spotLight.shadow.bias = -0.001;
        scene.add(spotLight);

        // Ground with subtle grid texture for speed reference during fall
        const gridHelper = new THREE.GridHelper(100, 50, 0x111111, 0x111111);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1.0, metalness: 0.0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- HIGH QUALITY CHARACTER RIGGING ---
        const suitMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
        const armorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.5, metalness: 0.3 });
        const detailMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7 });
        const visorMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 1.0 });

        const charGroup = new THREE.Group();
        scene.add(charGroup);
        
        // Hips are the root bone. All math is calculated from here to prevent clipping.
        const hips = new THREE.Group(); 
        charGroup.add(hips);

        // Utility function for smooth limbs
        function createSmoothBone(topRad, botRad, len, mat, yPos) {
            const geo = new THREE.CylinderGeometry(topRad, botRad, len, 16);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = yPos;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        // Add spherical joints to hide gaps
        function addJoint(parent, radius, mat, yOffset = 0) {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 16, 16), mat);
            mesh.position.y = yOffset;
            mesh.castShadow = true;
            parent.add(mesh);
            return mesh;
        }

        // 1. Torso & Belt
        const torsoGroup = new THREE.Group();
        torsoGroup.position.y = 0; // Relative to hips
        hips.add(torsoGroup);

        const belt = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.1, 16, 32), detailMat);
        belt.rotation.x = Math.PI / 2;
        torsoGroup.add(belt);

        const abdomen = createSmoothBone(0.45, 0.45, 0.8, suitMat, 0.4);
        torsoGroup.add(abdomen);
        const chest = createSmoothBone(0.6, 0.45, 0.8, armorMat, 1.2);
        torsoGroup.add(chest);

        // 2. Head & Helmet
        const headJoint = new THREE.Group();
        headJoint.position.y = 1.8;
        torsoGroup.add(headJoint);
        addJoint(headJoint, 0.2, suitMat, -0.1); // Neck

        const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), armorMat);
        helmet.position.y = 0.2;
        helmet.castShadow = true;
        headJoint.add(helmet);

        // Curved Visor
        const visorGeo = new THREE.CylinderGeometry(0.46, 0.46, 0.35, 32, 1, false, -Math.PI/2.5, Math.PI/1.25);
        const visor = new THREE.Mesh(visorGeo, visorMat);
        visor.position.set(0, 0.2, 0);
        visor.rotation.y = -Math.PI / 1.35; // Align to front
        headJoint.add(visor);

        // 3. Limbs Function
        function createLimb(parent, x, y, upperRad, lowerRad, len) {
            const upperJoint = new THREE.Group();
            upperJoint.position.set(x, y, 0);
            parent.add(upperJoint);
            
            addJoint(upperJoint, upperRad, armorMat); // Shoulder/Hip socket
            
            const upper = createSmoothBone(upperRad, lowerRad, len, suitMat, -len/2);
            upperJoint.add(upper);
            
            const lowerJoint = new THREE.Group();
            lowerJoint.position.y = -len;
            upperJoint.add(lowerJoint);
            
            addJoint(lowerJoint, lowerRad*1.1, detailMat); // Knee/Elbow pad
            
            const lower = createSmoothBone(lowerRad, lowerRad*0.8, len, suitMat, -len/2);
            lowerJoint.add(lower);
            
            return { upper: upperJoint, lower: lowerJoint };
        }

        // Arms & Legs
        const armL = createLimb(torsoGroup, -0.7, 1.4, 0.2, 0.15, 0.8);
        const armR = createLimb(torsoGroup, 0.7, 1.4, 0.2, 0.15, 0.8);
        
        const legL = createLimb(hips, -0.25, -0.1, 0.25, 0.2, 0.9);
        const legR = createLimb(hips, 0.25, -0.1, 0.25, 0.2, 0.9);

        // --- EFFECTS ---
        // Wind speed lines
        const windGeo = new THREE.CylinderGeometry(0.01, 0.01, 6, 4);
        const windMat = new THREE.MeshBasicMaterial({ color: 0x557799, transparent: true, opacity: 0.4 });
        const winds = [];
        for(let i=0; i<40; i++) {
            const w = new THREE.Mesh(windGeo, windMat);
            scene.add(w);
            winds.push(w);
        }

        // High quality dust explosion
        const dustGeo = new THREE.DodecahedronGeometry(0.3, 0);
        const dustMat = new THREE.MeshStandardMaterial({ color: 0x444444, transparent: true, opacity: 0.8, roughness: 1 });
        const dustParticles = [];
        for(let i=0; i<25; i++) {
            const d = new THREE.Mesh(dustGeo, dustMat);
            d.visible = false;
            scene.add(d);
            dustParticles.push({
                mesh: d, 
                vel: new THREE.Vector3((Math.random()-0.5)*20, Math.random()*8, (Math.random()-0.5)*20),
                spin: new THREE.Vector3(Math.random(), Math.random(), Math.random())
            });
        }

        // --- ANIMATION STATE ---
        const clock = new THREE.Clock();
        let gameState = 'waiting';
        let animStartTime = 0;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            renderer.setPixelRatio(dpr);
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
        function easeInOutQuad(t) { return t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
        function lerp(start, end, amt) { return (1-amt)*start+amt*end; }

        // Start Character high in the air
        let fallHeight = 80;
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameState === 'waiting' && window.innerWidth > window.innerHeight) {
                gameState = 'falling';
                animStartTime = clock.getElapsedTime();
            }

            const time = clock.getElapsedTime();
            const elapsed = time - animStartTime;
            let shake = new THREE.Vector3(0,0,0);

            if (gameState === 'falling') {
                if (elapsed < 4.0) {
                    const fallProgress = elapsed / 4.0;
                    
                    // Wind rushing up
                    winds.forEach((w, i) => {
                        w.position.y += 1.0;
                        if(w.position.y > hips.position.y + 10) {
                            w.position.set(
                                hips.position.x + (Math.random()-0.5)*15, 
                                hips.position.y - 20 - Math.random()*10, 
                                hips.position.z + (Math.random()-0.5)*15
                            );
                        }
                    });

                    // Fast drop calculation
                    hips.position.y = lerp(fallHeight, 0.5, Math.pow(fallProgress, 2.5));

                    // Character poses (Terminal velocity air resistance)
                    hips.rotation.x = Math.PI / 2.5; // Tilted forward
                    hips.rotation.z = Math.sin(time * 20) * 0.03; // Hard turbulence
                    
                    torsoGroup.rotation.x = -0.2;
                    headJoint.rotation.x = -0.5; // Looking down

                    armL.upper.rotation.set(0.5, 0, 1.5 + Math.sin(time*15)*0.1);
                    armL.lower.rotation.set(-0.5, 0, 0);
                    armR.upper.rotation.set(0.5, 0, -1.5 - Math.sin(time*17)*0.1);
                    armR.lower.rotation.set(-0.5, 0, 0);
                    
                    legL.upper.rotation.set(-0.3, 0, 0.2);
                    legL.lower.rotation.set(0.6, 0, 0);
                    legR.upper.rotation.set(-0.4, 0, -0.2);
                    legR.lower.rotation.set(0.5, 0, 0);

                } 
                else if (elapsed >= 4.0 && elapsed < 4.1) {
                    // IMPACT!
                    gameState = 'impact';
                    
                    // Precise clipping math: Chest thickness is ~0.6, so center must rest exactly at Y = 0.5 when flat
                    hips.position.y = 0.5; 
                    hips.rotation.x = Math.PI / 2; // Perfectly flat
                    hips.rotation.z = 0;
                    torsoGroup.rotation.x = 0;
                    headJoint.rotation.x = 0.2; // Head snaps back slightly
                    
                    winds.forEach(w => w.visible = false);

                    dustParticles.forEach(d => {
                        d.mesh.visible = true;
                        d.mesh.position.copy(hips.position);
                        d.mesh.position.y = 0;
                        d.mesh.scale.set(1,1,1);
                    });
                }
            }
            
            else if (gameState === 'impact' || gameState === 'lying') {
                gameState = 'lying';
                
                const shakeIntensity = Math.max(0, 1.5 - (elapsed - 4.0) * 3);
                shake.set((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity, 0);

                dustParticles.forEach(d => {
                    if(d.mesh.visible) {
                        d.mesh.position.addScaledVector(d.vel, 0.016);
                        d.mesh.rotation.x += d.spin.x * 0.1;
                        d.mesh.rotation.y += d.spin.y * 0.1;
                        d.mesh.scale.multiplyScalar(0.93);
                        if(d.mesh.scale.x < 0.05) d.mesh.visible = false;
                    }
                });

                // Body completely limp on the ground
                armL.upper.rotation.set(-0.2, 0, 2);
                armL.lower.rotation.set(0, 0, 0);
                armR.upper.rotation.set(0.5, 0, -1.8);
                armR.lower.rotation.set(0, 0, 0);
                legL.upper.rotation.set(0, 0, 0.1);
                legL.lower.rotation.set(0.1, 0, 0);
                legR.upper.rotation.set(0, 0, -0.1);
                legR.lower.rotation.set(0.2, 0, 0);

                if (elapsed > 6.0) gameState = 'getting_up';
            }
            
            else if (gameState === 'getting_up') {
                const getUpTime = elapsed - 6.0;
                
                if (getUpTime < 1.0) {
                    // Phase 1: Push up with arms
                    const t = easeInOutQuad(getUpTime);
                    hips.rotation.x = lerp(Math.PI / 2, Math.PI / 3, t); // Shoulders rise
                    hips.position.y = lerp(0.5, 0.8, t); // Body lifts off floor
                    
                    headJoint.rotation.x = lerp(0.2, -0.3, t); // Look forward
                    
                    armL.upper.rotation.set(lerp(-0.2, 1.2, t), 0, lerp(2, 0.5, t));
                    armR.upper.rotation.set(lerp(0.5, 1.2, t), 0, lerp(-1.8, -0.5, t));
                    armL.lower.rotation.x = lerp(0, -1.5, t); // Arms bend to push
                    armR.lower.rotation.x = lerp(0, -1.5, t);
                }
                else if (getUpTime < 2.0) {
                    // Phase 2: Pull one knee up
                    const t = easeInOutQuad(getUpTime - 1.0);
                    hips.rotation.x = lerp(Math.PI / 3, 0.1, t);
                    hips.position.y = lerp(0.8, 1.5, t); // Hips rising
                    
                    legL.upper.rotation.x = lerp(0, -1.2, t);
                    legL.lower.rotation.x = lerp(0.1, 1.2, t); // Knee bent, foot on floor
                    legR.upper.rotation.x = lerp(0, -0.2, t);
                    legR.lower.rotation.x = lerp(0.2, 0.8, t); // Knee on floor
                    
                    armL.upper.rotation.x = lerp(1.2, 0.2, t);
                    armR.upper.rotation.x = lerp(1.2, 0.2, t);
                }
                else if (getUpTime < 3.0) {
                    // Phase 3: Stand tall
                    const t = easeInOutQuad(getUpTime - 2.0);
                    hips.rotation.x = lerp(0.1, 0, t);
                    hips.position.y = lerp(1.5, 1.9, t); // Full standing height (legs + hips)
                    
                    legL.upper.rotation.x = lerp(-1.2, 0, t);
                    legL.lower.rotation.x = lerp(1.2, 0, t);
                    legR.upper.rotation.x = lerp(-0.2, 0, t);
                    legR.lower.rotation.x = lerp(0.8, 0, t);
                    
                    // Arms to tactical idle
                    armL.upper.rotation.set(lerp(0.2, 0.3, t), 0, lerp(0.5, 0.2, t));
                    armR.upper.rotation.set(lerp(0.2, 0.3, t), 0, lerp(-0.5, -0.2, t));
                    armL.lower.rotation.x = lerp(-1.5, -0.3, t);
                    armR.lower.rotation.x = lerp(-1.5, -0.3, t);
                }
                else {
                    gameState = 'idle';
                }
            }
            
            else if (gameState === 'idle') {
                // Tactical Breathing
                const breath = Math.sin(time * 2.5) * 0.03;
                hips.position.y = 1.9 + breath;
                chest.scale.set(1 + breath*0.5, 1, 1 + breath*0.5);
                armL.upper.rotation.z = 0.2 + breath;
                armR.upper.rotation.z = -0.2 - breath;
            }

            // Smooth Camera Follow: The camera dynamic tracks the hips as they fall and stand
            let targetCamY = hips.position.y + 12;
            camera.position.y += (targetCamY - camera.position.y) * 0.1; 
            camera.position.x = shake.x;
            camera.position.z = 16 + shake.y;
            camera.lookAt(0, hips.position.y - 2, 0);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
