<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Egg Survivor">
    <title>Egg Survivor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050508; overflow: hidden;
            touch-action: none;
            font-family: 'Barlow', Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* --- PORTRAIT MODE WARNING --- */
        #orientation-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050508; color: #8b8e83; z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #orientation-warning h2 { margin-bottom: 10px; font-size: 24px; color: #e4e6d9; }
        #orientation-warning p { font-size: 18px; }

        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
            #gameCanvas, #ui-layer { display: none !important; }
        }

        /* --- UI & MENUS --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        /* HUD: Health Bar Only */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 12px 80px 12px 16px; 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 5px;
            pointer-events: none;
        }
        .bar-bg {
            width: 100%; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 3px; position: relative; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .bar-bg.vitals-bg { height: 14px; border-radius: 6px; max-width: 400px; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.15s ease-out; }
        .vitals-fill {
            background: linear-gradient(90deg, #5a0000 0%, #9d0208 50%, #d00000 80%, #ff2222 100%);
            box-shadow: 0 0 12px #aa0000, inset 0 1px 0 rgba(255,100,100,0.3);
        }
        .bar-label {
            position: absolute; top: 0; left: 8px; font-weight: 900; color: rgba(255,255,255,0.85);
            text-shadow: 1px 1px 2px black; letter-spacing: 2px;
            font-family: 'Barlow', Arial, sans-serif;
        }
        .vitals-label { font-size: 10px; line-height: 14px; }

        #pause-btn {
            position: absolute; top: 15px; right: 20px; width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; pointer-events: auto; cursor: pointer;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #pause-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        #pause-btn:active { transform: scale(0.95); }
        .pause-bar { width: 6px; height: 20px; background: white; margin: 0 3px; border-radius: 3px; }

        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 6, 0.88); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto; opacity: 1; transition: opacity 0.3s ease;
        }
        .menu-overlay.hidden, #pause-btn.hidden, #hud.hidden { opacity: 0; pointer-events: none; }

        .menu-box {
            background: rgba(12, 10, 10, 0.95); border: 1px solid rgba(255,255,255,0.08);
            border-top: 2px solid rgba(255,255,255,0.15); padding: 44px 52px; border-radius: 2px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.95), 0 0 0 1px rgba(0,0,0,0.5);
            transform: translateY(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; text-align: center; min-width: 340px;
        }
        .menu-overlay.hidden .menu-box { transform: translateY(20px); }

        .menu-overlay h2 {
            color: #ffffff; margin: 0 0 32px 0; font-family: 'Bebas Neue', sans-serif;
            font-size: 38px; font-weight: 400; letter-spacing: 6px;
            text-shadow: 0 2px 20px rgba(255,255,255,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 24px; width: 100%;
        }

        /* --- GAME OVER MENU --- */
        @keyframes glitch-title {
            0%, 88%, 100% { transform: none; opacity: 1; }
            89% { transform: translateX(-3px); opacity: 0.9; }
            91% { transform: translateX(3px); opacity: 1; }
            93% { transform: translateX(-1px); opacity: 0.95; }
            95% { transform: none; }
        }
        @keyframes bleed-in { 0% { opacity: 0; transform: translateY(-16px); } 100% { opacity: 1; transform: translateY(0); } }
        #gameover-menu { background: rgba(5, 2, 2, 0.97); overflow-y: auto; }
        #gameover-menu .menu-box {
            background: rgba(14, 8, 8, 0.98); border: 1px solid rgba(100, 0, 0, 0.3);
            border-top: 2px solid rgba(160, 0, 0, 0.55); padding: 28px 36px 24px; border-radius: 2px;
            box-shadow: 0 16px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(0,0,0,0.4);
            animation: bleed-in 0.5s ease-out forwards; min-width: unset; width: min(380px, 88vw);
        }
        .death-eyebrow {
            font-family: 'Barlow', Arial, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 5px;
            color: rgba(140, 20, 20, 0.9); text-transform: uppercase; margin-bottom: 10px;
        }
        .death-title {
            font-family: 'Bebas Neue', 'Arial Black', Arial, sans-serif; font-size: 30px; font-weight: 400; letter-spacing: 2px;
            color: #f0f0f0; text-shadow: 0 0 28px rgba(160,0,0,0.45), 0 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 20px; line-height: 1.15; animation: glitch-title 6s infinite;
        }
        .death-stats {
            width: 100%; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 0; margin-bottom: 20px;
        }
        .stat-row {
            display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0;
            font-family: 'Barlow', Arial, sans-serif; font-size: 13px; font-weight: 600;
        }
        .stat-row span:first-child { color: #666; letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
        .stat-row span:last-child { color: #ccc; font-size: 15px; font-weight: 700; }
        .stat-row.stat-score { margin-top: 10px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
        .stat-row.stat-score span:first-child { color: rgba(160,20,20,0.8); }
        .stat-row.stat-score span:last-child { color: #fff; font-size: 18px; }

        .menu-btn {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.14); color: #cccccc; padding: 15px 40px; margin: 6px;
            font-family: 'Barlow', Arial, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            border-radius: 2px; cursor: pointer; transition: all 0.18s; width: 280px;
        }
        .menu-btn.primary { border-color: rgba(200,30,30,0.6); color: #fff; background: rgba(140,0,0,0.25); text-shadow: 0 0 12px rgba(255,60,60,0.4); }
        .menu-btn:hover { background: rgba(160,10,10,0.4); color: #fff; border-color: rgba(220,40,40,0.8); box-shadow: 0 0 24px rgba(160,0,0,0.3); transform: scale(1.02); }
        .menu-btn:active { transform: scale(0.98); }

        .slider-container { width: 300px; margin: 12px 0; display: flex; flex-direction: column; align-items: stretch; }
        .slider-container label {
            color: #aaa; font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; justify-content: space-between;
            letter-spacing: 1px; text-transform: uppercase;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 2px; background: #ddd; cursor: pointer;
            margin-top: -7px; box-shadow: 0 0 8px rgba(255,255,255,0.3); transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; cursor: pointer; background: rgba(255,255,255,0.15); border-radius: 1px; }

        #countdown-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', 'Arial Black', Arial, sans-serif; font-size: 160px; font-weight: 400; color: white;
            text-shadow: 0 8px 40px rgba(0,0,0,0.9), 0 0 30px rgba(255,255,255,0.3); pointer-events: none; opacity: 0; letter-spacing: 8px;
        }

        /* --- AUDIO SETTINGS SECTION --- */
        .settings-section-title {
            width: 100%; text-align: left; color: rgba(255,255,255,0.35); font-size: 10px;
            font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            margin: 18px 0 10px 0; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.07);
        }
        .settings-section-title:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }
        .slider-container .slider-row {
            display: flex; align-items: center; gap: 10px;
        }
        .slider-container .slider-row input[type=range] { flex: 1; }
        .vol-icon { font-size: 16px; opacity: 0.55; min-width: 20px; text-align: center; }
        .slider-container.audio-slider label { color: rgba(180,170,170,0.8); }

        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 40% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
        .pop-anim { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <h2>Please tilt your phone the other way.</h2>
        <p>Rocktato plays in landscape.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay Layer -->
    <div id="ui-layer">
        
        <!-- HUD -->
        <div id="hud">
            <div class="bar-bg vitals-bg">
                <div id="vitals-bar" class="bar-fill vitals-fill" style="width: 100%;"></div>
                <div class="bar-label vitals-label">VITALS</div>
            </div>
        </div>

        <button id="pause-btn" onclick="setGameState('paused')">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
        </button>

        <!-- Pause Menu -->
        <div id="pause-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <h2>PAUSED</h2>
                <button class="menu-btn primary" onclick="startCountdown()">Resume</button>
                <button class="menu-btn" onclick="setGameState('settings')">Settings</button>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="settings-menu" class="menu-overlay hidden">
            <div class="menu-box" style="min-width:360px; max-height:85vh; overflow-y:auto;">
                <h2>SETTINGS</h2>

                <div class="settings-section-title">🎮 Display</div>
                <div class="slider-container">
                    <label>Brightness <span id="val-brightness">55%</span></label>
                    <input type="range" id="set-brightness" min="10" max="75" value="55" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Camera Zoom <span id="val-zoom">100%</span></label>
                    <input type="range" id="set-zoom" min="80" max="150" value="100" oninput="updateSettingsUI()">
                </div>
                <div class="slider-container">
                    <label>Screen Shake <span id="val-shake">100%</span></label>
                    <input type="range" id="set-shake" min="0" max="200" value="100" oninput="updateSettingsUI()">
                </div>

                <div class="settings-section-title">🔊 Audio</div>
                <div class="slider-container audio-slider">
                    <label>Master Volume <span id="val-master">80%</span></label>
                    <input type="range" id="set-master" min="0" max="100" value="80" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Background Noise <span id="val-bgm">70%</span></label>
                    <input type="range" id="set-bgm" min="0" max="100" value="70" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Sound Effects <span id="val-sfx">100%</span></label>
                    <input type="range" id="set-sfx" min="0" max="100" value="100" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Ambient Reverb <span id="val-reverb">40%</span></label>
                    <input type="range" id="set-reverb" min="0" max="100" value="40" oninput="updateAudioUI()">
                </div>
                <div class="slider-container audio-slider">
                    <label>Low Pass Filter <span id="val-lowpass">100%</span></label>
                    <input type="range" id="set-lowpass" min="20" max="100" value="100" oninput="updateAudioUI()">
                </div>

                <button class="menu-btn primary" style="margin-top: 20px;" onclick="setGameState('paused')">Back</button>
            </div>
        </div>

        <!-- Game Over Menu -->
        <div id="gameover-menu" class="menu-overlay hidden">
            <div class="menu-box">
                <div class="death-eyebrow">— You Died —</div>
                <div id="death-title" class="death-title"></div>
                <div class="death-stats">
                    <div class="stat-row"><span>Kills</span><span id="ds-kills">—</span></div>
                    <div class="stat-row"><span>Time Alive</span><span id="ds-time">—</span></div>
                    <div class="stat-row stat-score"><span>Score</span><span id="ds-score">—</span></div>
                </div>
                <button class="menu-btn primary" onclick="restartRun()">Restart Run</button>
            </div>
        </div>

        <div id="countdown-display"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        const lightCanvas = document.createElement('canvas');
        const lightCtx = lightCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

            lightCanvas.width = width; lightCanvas.height = height;

        function b64ToArrayBuffer(b64) {
            const bin = atob(b64);
            const buf = new ArrayBuffer(bin.length);
            const view = new Uint8Array(buf);
            for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
            return buf;
        }

        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Master gain
            masterGainNode = audioCtx.createGain();
            masterGainNode.gain.value = audioSettings.master;
            masterGainNode.connect(audioCtx.destination);

            // Low-pass filter
            lowpassNode = audioCtx.createBiquadFilter();
            lowpassNode.type = 'lowpass';
            lowpassNode.frequency.value = 20000;
            lowpassNode.connect(masterGainNode);

            // Reverb (convolver with synthetic IR)
            reverbNode = audioCtx.createConvolver();
            await buildReverb();

            // BGM gain
            bgmGainNode = audioCtx.createGain();
            bgmGainNode.gain.value = audioSettings.bgm;
            bgmGainNode.connect(lowpassNode);
            bgmGainNode.connect(reverbNode);

            // Decode and play BGM
            const arrayBuf = b64ToArrayBuffer(HUM_B64);
            bgmBuffer = await audioCtx.decodeAudioData(arrayBuf);
            playBGM();
            audioReady = true;
        }

        async function buildReverb() {
            const len = audioCtx.sampleRate * 2.5;
            const irBuf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
            for (let c = 0; c < 2; c++) {
                const d = irBuf.getChannelData(c);
                for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3.2);
            }
            reverbNode.buffer = irBuf;
            const reverbGain = audioCtx.createGain();
            reverbGain.gain.value = audioSettings.reverb * 0.45;
            reverbNode.connect(reverbGain);
            reverbGain.connect(masterGainNode);
        }

        function playBGM() {
            if (!audioCtx || !bgmBuffer) return;
            if (bgmSource) { try { bgmSource.stop(); } catch(e) {} }
            bgmSource = audioCtx.createBufferSource();
            bgmSource.buffer = bgmBuffer;
            bgmSource.loop = true;
            bgmSource.loopStart = 0;
            bgmSource.loopEnd = bgmBuffer.duration;
            bgmSource.connect(bgmGainNode);
            bgmSource.start(0);
        }

        function updateAudioUI() {
            const m = parseInt(document.getElementById('set-master').value);
            const b = parseInt(document.getElementById('set-bgm').value);
            const s = parseInt(document.getElementById('set-sfx').value);
            const r = parseInt(document.getElementById('set-reverb').value);
            const lp = parseInt(document.getElementById('set-lowpass').value);

            document.getElementById('val-master').innerText = m + '%';
            document.getElementById('val-bgm').innerText = b + '%';
            document.getElementById('val-sfx').innerText = s + '%';
            document.getElementById('val-reverb').innerText = r + '%';
            document.getElementById('val-lowpass').innerText = lp + '%';

            audioSettings.master = m / 100;
            audioSettings.bgm = b / 100;
            audioSettings.sfx = s / 100;
            audioSettings.reverb = r / 100;
            audioSettings.lowpass = lp / 100;

            if (audioCtx) {
                masterGainNode.gain.setTargetAtTime(audioSettings.master, audioCtx.currentTime, 0.05);
                bgmGainNode.gain.setTargetAtTime(audioSettings.bgm, audioCtx.currentTime, 0.05);
                // Remap lowpass: 20% = 400hz, 100% = 20000hz (open)
                const freq = 400 + (audioSettings.lowpass * 0.8) * 19600;
                lowpassNode.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
            }
        }

        // Start audio on first user interaction
        function ensureAudio() {
            if (!audioCtx) initAudio();
            else if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.addEventListener('pointerdown', ensureAudio, { once: true });
        document.addEventListener('keydown', ensureAudio, { once: true });

        function updateSettingsUI() {
            const b = document.getElementById('set-brightness').value; const z = document.getElementById('set-zoom').value; const s = document.getElementById('set-shake').value;
            document.getElementById('val-brightness').innerText = b + "%"; document.getElementById('val-zoom').innerText = z + "%"; document.getElementById('val-shake').innerText = s + "%";
            settings.brightness = parseInt(b) / 100; settings.zoom = parseInt(z) / 100; settings.shake = parseInt(s) / 100;
        }

        function setGameState(state) {
            gameState = state;
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.add('hidden');
            document.getElementById('gameover-menu').classList.add('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            if (state === 'playing') {

        function updateHUD() {

        let shakeTime = 0; let shakeMag = 0; let currentShakeX = 0; let currentShakeY = 0;

        // --- INPUT MANAGEMENT ---
        const input = { left: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0 }, right: { active: false, id: null, baseX: 0, baseY: 0, currentX: 0, currentY: 0, vectorX: 0, vectorY: 0, magnitude: 0, lastTapTime: 0, doubleTapped: false } };
        const JOYSTICK_MAX_RADIUS = 60;

        function handleTouch(e) {
            if (e.target !== canvas) return;
            if (gameState !== 'playing') { input.left.active = false; input.right.active = false; return; }
            e.preventDefault(); const halfWidth = width / 2; let leftFound = false; let rightFound = false;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.clientX < halfWidth) {
                    leftFound = true;
                    if (!input.left.active) { input.left.active = true; input.left.id = touch.identifier; input.left.baseX = touch.clientX; input.left.baseY = touch.clientY; }
                    if (input.left.id === touch.identifier) { input.left.currentX = touch.clientX; input.left.currentY = touch.clientY; }
                } else {
                    rightFound = true;
                    if (!input.right.active) {
                        const now = performance.now();
                        if (now - input.right.lastTapTime < 300) { input.right.doubleTapped = true; input.right.lastTapTime = 0; } else { input.right.lastTapTime = now; }
                        input.right.active = true; input.right.id = touch.identifier; input.right.baseX = touch.clientX; input.right.baseY = touch.clientY;
                    }
                    if (input.right.id === touch.identifier) { input.right.currentX = touch.clientX; input.right.currentY = touch.clientY; }
                }
            }
            if (!leftFound) input.left.active = false; if (!rightFound) input.right.active = false;

            ['left', 'right'].forEach(side => {
                const stick = input[side];
                if (stick.active) {
                    let dx = stick.currentX - stick.baseX; let dy = stick.currentY - stick.baseY; let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > JOYSTICK_MAX_RADIUS) { dx = (dx / dist) * JOYSTICK_MAX_RADIUS; dy = (dy / dist) * JOYSTICK_MAX_RADIUS; dist = JOYSTICK_MAX_RADIUS; stick.baseX = stick.currentX - dx; stick.baseY = stick.currentY - dy; }
                    stick.vectorX = dx / JOYSTICK_MAX_RADIUS; stick.vectorY = dy / JOYSTICK_MAX_RADIUS; stick.magnitude = dist / JOYSTICK_MAX_RADIUS;
                } else { stick.vectorX = 0; stick.vectorY = 0; stick.magnitude = 0; }
            });
        }
        window.addEventListener('touchstart', handleTouch, { passive: false }); window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false }); window.addEventListener('touchcancel', handleTouch, { passive: false });
        let mouseDown = false;
        window.addEventListener('mousedown', (e) => { if (e.target !== canvas) return; if (gameState === 'playing') { mouseDown = true; handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] }); } });
        window.addEventListener('mousemove', (e) => { if (mouseDown && gameState === 'playing') handleTouch({ preventDefault: ()=>{}, touches: [{ identifier: 'mouse', clientX: e.clientX, clientY: e.clientY }] }); });
        window.addEventListener('mouseup', (e) => { mouseDown = false; if (gameState === 'playing') handleTouch({ preventDefault: ()=>{}, touches: [] }); });

        // --- GAME OBJECTS ---
        const ROOM_SIZE = 1200;

        const bullets = []; const enemyBullets = []; const enemies = []; const deadEnemies = [];

        // --- GRINDER ---
        const GRINDER_X = ROOM_SIZE / 2;
        const GRINDER_Y = ROOM_SIZE / 2;
        const GRINDER_OUTER_R = 110;   // outer concrete rim
        const GRINDER_PIT_R   = 80;    // dark cylinder pit
        const GRINDER_BLADE_R = 72;    // blade sweep radius
        const GRINDER_DAMAGE_R = 90;   // kill zone
        let grinderAngle = 0;
        let grinderBloodPool = 0;      // grows 0→1 as players die nearby (cosmetic only here)
        const grinderBloodSplatters = [];

        // Pre-generate blood pool — irregular splat polygons that look like pooled blood
        // Each splat is a polygon with randomised radii, drawn as a flat dark pool
        function makeSplatPolygon(cx, cy, avgR, points, roughness) {
            const pts = [];
            for (let i = 0; i < points; i++) {
                const a = (i / points) * Math.PI * 2;
                const r = avgR * (1 - roughness * 0.5 + Math.random() * roughness);
                pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
            }
            return pts;
        }

        // Main central pool — large irregular blob sitting on the rim
        const grinderMainPool = makeSplatPolygon(8, 12, GRINDER_OUTER_R * 0.82, 32, 0.38);

        // Several secondary splat pools around the rim
        const grinderSplatPools = [];
        for (let i = 0; i < 9; i++) {
            const a   = (i / 9) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
            const d   = GRINDER_OUTER_R * (0.7 + Math.random() * 0.5);
            const r   = 18 + Math.random() * 38;
            const pts = makeSplatPolygon(Math.cos(a) * d, Math.sin(a) * d, r, 18, 0.5);
            grinderSplatPools.push({ pts, alpha: 0.55 + Math.random() * 0.35 });
        }

        // Small dots / drips scattered further out
        const grinderDrips = [];
        for (let i = 0; i < 40; i++) {
            const a = Math.random() * Math.PI * 2;
            const d = GRINDER_OUTER_R * (0.6 + Math.random() * 0.9);
            grinderDrips.push({
                x: Math.cos(a) * d, y: Math.sin(a) * d,
                r: 2 + Math.random() * 9,
                alpha: 0.4 + Math.random() * 0.5,
                elongate: 0.3 + Math.random() * 1.4, // stretch in radial direction
                angle: a,
            });
        }

        function drawGrinder(ctx, time) {
            const cx = GRINDER_X, cy = GRINDER_Y;

            ctx.save();
            ctx.translate(cx, cy);

            // ── 1. OUTER CONCRETE RIM ──────────────────────────────────────
            const rimGrad = ctx.createRadialGradient(0, 0, GRINDER_PIT_R - 4, 0, 0, GRINDER_OUTER_R + 12);
            rimGrad.addColorStop(0,   'rgba(18,14,14,1)');
            rimGrad.addColorStop(0.25,'rgba(38,32,30,1)');
            rimGrad.addColorStop(0.55,'rgba(50,44,42,1)');
            rimGrad.addColorStop(0.75,'rgba(62,56,54,1)');
            rimGrad.addColorStop(1,   'rgba(38,34,32,1)');
            ctx.fillStyle = rimGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_OUTER_R + 12, 0, Math.PI * 2); ctx.fill();

            // Rim edge highlight / bevel
            ctx.strokeStyle = 'rgba(90,82,78,0.7)';
            ctx.lineWidth = 3.5;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_OUTER_R + 12, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = 'rgba(20,16,14,0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_OUTER_R + 6, 0, Math.PI * 2); ctx.stroke();

            // Concentric wear rings on concrete
            for (let r = 0; r < 3; r++) {
                const rr = GRINDER_PIT_R + 8 + r * 12;
                ctx.strokeStyle = `rgba(0,0,0,${0.18 + r * 0.06})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI * 2); ctx.stroke();
            }

            // ── 2. BLOOD POOL ──────────────────────────────────────────────
            // Helper to draw a polygon path from a point array
            function drawPoly(pts) {
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                ctx.closePath();
            }

            // Small drips / satellite drops first (bottom layer)
            grinderDrips.forEach(d => {
                ctx.save();
                ctx.globalAlpha = d.alpha;
                ctx.translate(d.x, d.y);
                ctx.rotate(d.angle);
                ctx.scale(1, d.elongate);
                ctx.fillStyle = '#1a0000';
                ctx.beginPath(); ctx.arc(0, 0, d.r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // Secondary splat pools
            grinderSplatPools.forEach(s => {
                ctx.save();
                ctx.globalAlpha = s.alpha;
                drawPoly(s.pts);
                // Flat dark blood colour — no gradient, just a solid very dark red
                ctx.fillStyle = '#1c0101';
                ctx.fill();
                // Thin sheen highlight on edge (pooled blood has a slight wet sheen)
                ctx.strokeStyle = 'rgba(60,5,5,0.35)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            });

            // Main central pool
            ctx.save();
            ctx.globalAlpha = 0.92;
            drawPoly(grinderMainPool);
            ctx.fillStyle = '#130000';
            ctx.fill();
            // Wet sheen — radial highlight offset up-left like a light source
            const sheenG = ctx.createRadialGradient(-18, -22, 4, 0, 0, GRINDER_OUTER_R * 0.78);
            sheenG.addColorStop(0,   'rgba(90,12,8,0.28)');
            sheenG.addColorStop(0.4, 'rgba(55,5,4,0.12)');
            sheenG.addColorStop(1,   'rgba(20,0,0,0)');
            ctx.fillStyle = sheenG;
            ctx.fill(); // reuses the same clipped path? No — re-draw
            drawPoly(grinderMainPool);
            ctx.fillStyle = sheenG;
            ctx.fill();
            ctx.restore();

            ctx.globalAlpha = 1;

            // ── 3. PIT / VOID ──────────────────────────────────────────────
            // Deep dark inner cylinder
            const pitGrad = ctx.createRadialGradient(-8, -10, 5, 0, 0, GRINDER_PIT_R);
            pitGrad.addColorStop(0,    'rgba(6,4,4,1)');
            pitGrad.addColorStop(0.4,  'rgba(4,2,2,1)');
            pitGrad.addColorStop(0.75, 'rgba(2,0,0,1)');
            pitGrad.addColorStop(1,    'rgba(0,0,0,1)');
            ctx.fillStyle = pitGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.fill();

            // Pit rim — inner bevel highlight
            const pitRimGrad = ctx.createLinearGradient(-GRINDER_PIT_R, -GRINDER_PIT_R, GRINDER_PIT_R, GRINDER_PIT_R);
            pitRimGrad.addColorStop(0,   'rgba(80,68,64,0.9)');
            pitRimGrad.addColorStop(0.45,'rgba(50,42,40,0.5)');
            pitRimGrad.addColorStop(1,   'rgba(20,16,14,0.4)');
            ctx.strokeStyle = pitRimGrad;
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.stroke();

            // Blood coating inside pit walls
            const pitBloodGrad = ctx.createRadialGradient(0, 0, GRINDER_PIT_R * 0.72, 0, 0, GRINDER_PIT_R);
            pitBloodGrad.addColorStop(0,   'rgba(0,0,0,0)');
            pitBloodGrad.addColorStop(0.6, 'rgba(50,2,2,0.4)');
            pitBloodGrad.addColorStop(1,   'rgba(70,4,4,0.7)');
            ctx.fillStyle = pitBloodGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.fill();

            // ── 4. SPINNING BLADES ─────────────────────────────────────────
            ctx.save();
            ctx.rotate(grinderAngle);
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 14;
            ctx.shadowOffsetY = 6;

            const numBlades = 8;
            for (let i = 0; i < numBlades; i++) {
                const bAngle = (i / numBlades) * Math.PI * 2;
                ctx.save();
                ctx.rotate(bAngle);

                // Blade shape — thick at hub, tapered at tip, slight sweep
                const hubR = 10;
                const tipR = GRINDER_BLADE_R;

                ctx.beginPath();
                // Left edge (trailing)
                ctx.moveTo(hubR * 0.6, -5);
                // Sweep curve to tip
                ctx.bezierCurveTo(tipR * 0.3, -10, tipR * 0.7, -8, tipR, -3);
                // Tip round
                ctx.arc(tipR, 0, 3, -Math.PI * 0.5, Math.PI * 0.5);
                // Right edge (leading) back to hub
                ctx.bezierCurveTo(tipR * 0.7, 6, tipR * 0.3, 7, hubR * 0.6, 5);
                ctx.closePath();

                const bladeGrad = ctx.createLinearGradient(0, -8, 0, 8);
                bladeGrad.addColorStop(0,   '#7a7068');
                bladeGrad.addColorStop(0.3, '#5a5048');
                bladeGrad.addColorStop(0.6, '#3e3830');
                bladeGrad.addColorStop(1,   '#2a2420');
                ctx.fillStyle = bladeGrad;
                ctx.fill();

                // Blood stain on blade
                ctx.fillStyle = 'rgba(80,4,4,0.55)';
                ctx.beginPath();
                ctx.moveTo(hubR * 0.7, -3);
                ctx.bezierCurveTo(tipR * 0.35, -6, tipR * 0.6, -5, tipR * 0.9, -1);
                ctx.bezierCurveTo(tipR * 0.6, 3, tipR * 0.35, 4, hubR * 0.7, 3);
                ctx.closePath();
                ctx.fill();

                // Blade edge gleam
                ctx.strokeStyle = 'rgba(160,148,140,0.6)';
                ctx.lineWidth = 1.2;
                ctx.shadowColor = 'rgba(200,190,185,0.25)';
                ctx.shadowBlur = 3;
                ctx.beginPath();
                ctx.moveTo(hubR * 0.6, -5);
                ctx.bezierCurveTo(tipR * 0.3, -10, tipR * 0.7, -8, tipR, -3);
                ctx.stroke();

                ctx.restore();
            }

            // Center hub
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 3;
            const hubGrad = ctx.createRadialGradient(-3, -3, 1, 0, 0, 12);
            hubGrad.addColorStop(0,   '#888070');
            hubGrad.addColorStop(0.5, '#555048');
            hubGrad.addColorStop(1,   '#1c1814');
            ctx.fillStyle = hubGrad;
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();

            // Hub blood smear
            ctx.fillStyle = 'rgba(90,5,5,0.6)';
            ctx.beginPath(); ctx.arc(2, 1, 7, 0, Math.PI * 2); ctx.fill();

            // Hub bolt
            ctx.fillStyle = '#2a2420';
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(100,92,85,0.7)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore(); // end blade rotation

            // ── 5. MOTION BLUR ARCS (speed illusion) ──────────────────────
            // Draw several concentric blur rings at different radii for depth
            const blurRadii = [GRINDER_BLADE_R * 0.38, GRINDER_BLADE_R * 0.62, GRINDER_BLADE_R * 0.88];
            for (let ri = 0; ri < blurRadii.length; ri++) {
                const br = blurRadii[ri];
                for (let i = 0; i < numBlades; i++) {
                    const trailAngle = grinderAngle + (i / numBlades) * Math.PI * 2;
                    const trailLen   = Math.PI / numBlades * 1.6; // longer sweep = faster feel

                    ctx.strokeStyle = '#9a8e84';
                    ctx.lineWidth = 3 - ri * 0.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, br, trailAngle - trailLen, trailAngle);
                    ctx.stroke();
                    ctx.restore();
                }
            }
            // Extra full-circle silver streak — like a continuous blur disc at speed
            ctx.save();
            ctx.globalAlpha = 0.06;
            ctx.strokeStyle = '#b0a898';
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_BLADE_R * 0.75, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();

            // ── 6. DEPTH SHADOW inside pit (makes it look deep) ───────────
            const depthGrad = ctx.createRadialGradient(12, 14, 0, 0, 0, GRINDER_PIT_R * 0.9);
            depthGrad.addColorStop(0, 'rgba(0,0,0,0)');
            depthGrad.addColorStop(0.5,'rgba(0,0,0,0.15)');
            depthGrad.addColorStop(1, 'rgba(0,0,0,0.75)');
            ctx.fillStyle = depthGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R, 0, Math.PI * 2); ctx.fill();

            // ── 7. AMBIENT GLOW from pit (faint red heat) ─────────────────
            const glowGrad = ctx.createRadialGradient(0, 0, GRINDER_PIT_R * 0.7, 0, 0, GRINDER_PIT_R * 1.05);
            glowGrad.addColorStop(0,   'rgba(100,8,4,0)');
            glowGrad.addColorStop(0.5, 'rgba(80,5,3,0.06)');
            glowGrad.addColorStop(1,   'rgba(60,3,1,0.18)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath(); ctx.arc(0, 0, GRINDER_PIT_R * 1.05, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }
        const activeSplatter = []; const floorSplatters = []; const damageTexts = [];

        class Bullet {
            constructor(x, y, angle) {

                const bulletGrad = ctx.createLinearGradient(0, -2, 0, 2);
                bulletGrad.addColorStop(0, '#666666'); bulletGrad.addColorStop(0.5, '#222222'); bulletGrad.addColorStop(1, '#000000'); 
                ctx.fillStyle = bulletGrad; 
                ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(2, -2.5); ctx.lineTo(-8, -2.5); ctx.lineTo(-8, 2.5); ctx.lineTo(2, 2.5); ctx.closePath(); ctx.fill();
                
                ctx.restore();
            }
        }

        class EnemyBullet {
            constructor(x, y, angle) {
                this.x = x; this.y = y; this.speed = 350;
                this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
                this.life = 4.0; this.damage = 15; this.radius = 8;

            update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt; }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.shadowColor = '#d255ff'; ctx.shadowBlur = 10;
                ctx.strokeStyle = '#f0aaff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = 'rgba(210,85,255,0.4)'; ctx.fill(); ctx.restore();
            }
        }

        class CreepyLeg {
            constructor(offsetX, offsetY) { this.offsetX = offsetX; this.offsetY = offsetY; this.x = 0; this.y = 0; this.targetX = 0; this.targetY = 0; this.startX = 0; this.startY = 0; this.stepProgress = 1; this.initialized = false; }
            update(bodyX, bodyY, facingAngle, dt) {
                const idealX = bodyX + Math.cos(facingAngle) * this.offsetX - Math.sin(facingAngle) * this.offsetY;
                const idealY = bodyY + Math.sin(facingAngle) * this.offsetX + Math.cos(facingAngle) * this.offsetY;
                if (!this.initialized) { this.x = idealX; this.y = idealY; this.initialized = true; }
                if (this.stepProgress >= 1) {
                    let dx = idealX - this.x; let dy = idealY - this.y; let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 25) { this.stepProgress = 0; this.startX = this.x; this.startY = this.y; this.targetX = idealX + Math.cos(facingAngle) * 15; this.targetY = idealY + Math.sin(facingAngle) * 15; }
                } else {
                    this.stepProgress += dt * 7; 
                    if (this.stepProgress >= 1) { this.stepProgress = 1; this.x = this.targetX; this.y = this.targetY; }
                    else { this.x = this.startX + (this.targetX - this.startX) * this.stepProgress; this.y = this.startY + (this.targetY - this.startY) * this.stepProgress; }
                }
            }
        }

        class Choir {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 25; this.hp = 250; this.type = 'choir'; this.hitCount = 0;
                this.orbitAngle = Math.random() * Math.PI * 2; this.orbitRadius = 350 + Math.random() * 150; 
                this.orbitSpeed = 0.5 + Math.random() * 0.3; this.orbitDir = Math.random() > 0.5 ? 1 : -1;
                this.attackCooldown = 3.0 + Math.random() * 2.0; this.isAttacking = false; this.attackTime = 0;
                this.timeOffset = Math.random() * 100;
                this.heads = [ { angleOffset: 0, dist: 18 }, { angleOffset: Math.PI*2/3, dist: 18 }, { angleOffset: Math.PI*4/3, dist: 18 } ];
                this.drawX = x; this.drawY = y;
            }
            update(dt, player, allEnemies) {
                this.timeOffset += dt * 2; this.orbitAngle += this.orbitSpeed * this.orbitDir * dt;
                let wobble = Math.sin(this.timeOffset * 0.5) * 50;
                let targetX = ROOM_SIZE/2 + Math.cos(this.orbitAngle) * (this.orbitRadius + wobble);
                let targetY = ROOM_SIZE/2 + Math.sin(this.orbitAngle) * (this.orbitRadius + wobble);

                gunGrad.addColorStop(0, '#5a5a6a'); gunGrad.addColorStop(0.5, '#3b3b4c'); gunGrad.addColorStop(1, '#1c1c28');
                ctx.fillStyle = gunGrad;
                ctx.beginPath(); ctx.roundRect(5, -4, 20, 8, 2); ctx.roundRect(-2, -2, 10, 12, 2); ctx.fill();
                ctx.shadowColor = 'transparent'; ctx.fillStyle = '#050505'; ctx.fillRect(18, -2, 5, 4); ctx.fillStyle = '#888'; ctx.fillRect(8, -3, 8, 2); 

                if (flash > 0) {
                    if (isAimingLeft) ctx.scale(1, -1);
                    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 15; ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.moveTo(23, 0); ctx.lineTo(32 + Math.random()*8, -4 - Math.random()*4);
                    ctx.lineTo(30, 0); ctx.lineTo(32 + Math.random()*8, 4 + Math.random()*4); ctx.fill();
                    ctx.beginPath(); ctx.arc(26, 0, 7 * (flash/0.1), 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }

        class CeilingLight {
            constructor(x, y, w, h, angle) {
                this.x = x; this.y = y; this.w = w; this.h = h; this.angle = angle;
            }

            draw(ctx, camX, camY) {
                function getCorners(cx, cy, w, h, angle) {
                    const cos = Math.cos(angle); const sin = Math.sin(angle);
                    const pts = [ {x: -w/2, y: -h/2}, {x: w/2,  y: -h/2}, {x: w/2,  y: h/2}, {x: -w/2, y: h/2} ];
                    return pts.map(p => ({ x: cx + p.x * cos - p.y * sin, y: cy + p.x * sin + p.y * cos }));
                }

                const applyParallax = (worldPt, pFactor) => ({
                    x: worldPt.x + (worldPt.x - camX) * pFactor,
                    y: worldPt.y + (worldPt.y - camY) * pFactor
                });

                const pCeiling = 0.45; // Ceiling attachment point (highest parallax = closest to camera)
                const pLens = 0.38;    // The glowing lens (hangs down a bit closer to floor)

                const ceilingCorners = getCorners(this.x, this.y, this.w, this.h, this.angle).map(pt => applyParallax(pt, pCeiling));
                const lensCorners = getCorners(this.x, this.y, this.w, this.h, this.angle).map(pt => applyParallax(pt, pLens));

                ctx.save();
                ctx.lineJoin = 'round';

                // --- Base drop-shadow ---
                // We cast the shadow using only the lens boundaries so it doesn't get muddy
                ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                ctx.shadowBlur = 25;
                ctx.shadowOffsetY = 15;
                ctx.fillStyle = 'rgba(0,0,0,1)'; 
                ctx.beginPath();
                ctx.moveTo(lensCorners[0].x, lensCorners[0].y);
                for(let i=1; i<4; i++) ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                ctx.closePath();
                ctx.fill(); 

                // Clear shadow for crisp rendering of the physical light box
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // --- Draw Solid Metal Casing ---
                for(let i=0; i<4; i++) {
                    let j = (i+1)%4;
                    ctx.beginPath();
                    ctx.moveTo(ceilingCorners[i].x, ceilingCorners[i].y);
                    ctx.lineTo(ceilingCorners[j].x, ceilingCorners[j].y);
                    ctx.lineTo(lensCorners[j].x, lensCorners[j].y);
                    ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                    ctx.closePath();
                    
                    let dx = ceilingCorners[j].x - ceilingCorners[i].x;
                    let dy = ceilingCorners[j].y - ceilingCorners[i].y;
                    let nx = -dy; let ny = dx;
                    let len = Math.sqrt(nx*nx + ny*ny);
                    nx /= len; ny /= len;
                    
                    let dot = nx * -0.7 + ny * -0.7;
                    let brightness = Math.max(0.2, Math.min(1, (dot + 1) / 2));
                    
                    ctx.fillStyle = `rgb(${75*brightness}, ${80*brightness}, ${85*brightness})`;
                    ctx.fill();
                    ctx.strokeStyle = '#222222';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // --- Draw Lens Background (white glowing backplate) ---
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(lensCorners[0].x, lensCorners[0].y);
                for(let i=1; i<4; i++) ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                ctx.closePath();
                ctx.fill();

                // --- Draw Fluorescent Grid/Texture ---
                ctx.save();
                ctx.clip(); // Keep grating cleanly inside the lens border
                const lensCenter = applyParallax({x: this.x, y: this.y}, pLens);
                ctx.translate(lensCenter.x, lensCenter.y);
                ctx.rotate(this.angle); // Currently 0, but good for robust code
                
                ctx.strokeStyle = '#c5ccd6';
                ctx.lineWidth = 1.5;
                const gridStep = 8;
                for (let x = -this.w/2; x <= this.w/2; x += gridStep) {
                    ctx.beginPath(); ctx.moveTo(x, -this.h/2); ctx.lineTo(x, this.h/2); ctx.stroke();
                }
                for (let y = -this.h/2; y <= this.h/2; y += gridStep) {
                    ctx.beginPath(); ctx.moveTo(-this.w/2, y); ctx.lineTo(this.w/2, y); ctx.stroke();
                }
                ctx.restore();

                // --- Inner bright wash to simulate the bulb ---
                ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.beginPath();
                ctx.moveTo(lensCorners[0].x, lensCorners[0].y);
                for(let i=1; i<4; i++) ctx.lineTo(lensCorners[i].x, lensCorners[i].y);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        const ceilingLights = [
            new CeilingLight(ROOM_SIZE * 0.3, ROOM_SIZE * 0.3, 140, 35, 0),
            new CeilingLight(ROOM_SIZE * 0.7, ROOM_SIZE * 0.3, 140, 35, 0),
            new CeilingLight(ROOM_SIZE * 0.3, ROOM_SIZE * 0.7, 140, 35, 0),
            new CeilingLight(ROOM_SIZE * 0.7, ROOM_SIZE * 0.7, 140, 35, 0)
        ];

        // --- ENVIRONMENT ---
        function drawRoom(ctx) {
            ctx.fillStyle = '#1c1c22';
            ctx.fillRect(0, 0, ROOM_SIZE, ROOM_SIZE);

            const tileSize = 80;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.lineWidth = 2;

            for (let x = 0; x <= ROOM_SIZE; x += tileSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ROOM_SIZE); ctx.stroke();
            }
            for (let y = 0; y <= ROOM_SIZE; y += tileSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(ROOM_SIZE, y); ctx.stroke();
            }

            ctx.fillStyle = 'rgba(10, 15, 10, 0.2)';
            for(let x = 0; x < ROOM_SIZE; x+= tileSize) {
                for(let y = 0; y < ROOM_SIZE; y+= tileSize) {
                    let seed = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
                    let r = (seed - Math.floor(seed)) * 100;
                    
                    if(r < 20) {
                        ctx.beginPath();
                        ctx.arc(x + tileSize/2, y + tileSize/2, tileSize/1.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                    if(r > 85) {
                        ctx.fillStyle = 'rgba(50, 5, 5, 0.1)'; 
                        ctx.fillRect(x, y, tileSize, tileSize);
                        ctx.fillStyle = 'rgba(10, 15, 10, 0.2)';
                    }
                }
            }

            ctx.strokeStyle = '#050608'; 
            ctx.lineWidth = 40;
            ctx.strokeRect(0, 0, ROOM_SIZE, ROOM_SIZE);
        }

        // --- DYNAMIC LIGHTING ---
        function drawLighting(ctx, camX, camY, sx, sy) {
            lightCtx.globalCompositeOperation = 'source-over';
            
            let opacity = 1 - settings.brightness;
            lightCtx.fillStyle = `rgba(4, 4, 6, ${opacity})`; 
            lightCtx.fillRect(0, 0, width, height);

            lightCtx.globalCompositeOperation = 'destination-out';

            lightCtx.save();
            lightCtx.translate(width / 2, height / 2);
            lightCtx.scale(settings.zoom, settings.zoom);
            lightCtx.translate(-camX + sx, -camY + sy);

            ceilingLights.forEach(l => {
                const pFactor = 0.38; // Match the pLens height so the glow originates exactly from the grating
                const pX = l.x + (l.x - camX) * pFactor;
                const pY = l.y + (l.y - camY) * pFactor;
                
                const radius = 350;
                const grad = lightCtx.createRadialGradient(pX, pY, 10, pX, pY, radius);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.85)'); 
                grad.addColorStop(0.35, 'rgba(255, 255, 255, 0.3)');  
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');      
                
                lightCtx.fillStyle = grad;
                lightCtx.beginPath();
                // We use a pure circle (arc) now to avoid the ugly oval distortion
                lightCtx.arc(pX, pY, radius, 0, Math.PI * 2); 
                lightCtx.fill();
            });

            // Grinder ambient light — faint red from pit
            const grinderGlow = lightCtx.createRadialGradient(GRINDER_X, GRINDER_Y, 20, GRINDER_X, GRINDER_Y, 200);
            grinderGlow.addColorStop(0,   'rgba(160, 18, 8, 0.30)');
            grinderGlow.addColorStop(0.4, 'rgba(120, 10, 4, 0.14)');
            grinderGlow.addColorStop(1,   'rgba(60,  4, 2, 0)');
            lightCtx.fillStyle = grinderGlow;
            lightCtx.beginPath(); lightCtx.arc(GRINDER_X, GRINDER_Y, 200, 0, Math.PI * 2); lightCtx.fill();

            enemyBullets.forEach(eb => {
                const grad = lightCtx.createRadialGradient(eb.x, eb.y, 0, eb.x, eb.y, 40);
                grad.addColorStop(0, 'rgba(210, 85, 255, 0.6)'); grad.addColorStop(1, 'rgba(210, 85, 255, 0)');
                lightCtx.fillStyle = grad; lightCtx.beginPath(); lightCtx.arc(eb.x, eb.y, 40, 0, Math.PI*2); lightCtx.fill();
            });

            enemies.forEach(enemy => {
                if (enemy.type === 'kneeler' && enemy.state === 'frozen') {
                    const kGlow = lightCtx.createRadialGradient(enemy.drawX, enemy.drawY, 2, enemy.drawX, enemy.drawY, 40);
                    kGlow.addColorStop(0, 'rgba(0,255,80,0.45)'); kGlow.addColorStop(1, 'rgba(0,255,80,0)');
                    lightCtx.fillStyle = kGlow; lightCtx.beginPath(); lightCtx.arc(enemy.drawX, enemy.drawY, 40, 0, Math.PI*2); lightCtx.fill();
                } else if (enemy.type === 'choir') {
                    const sGrad = lightCtx.createRadialGradient(enemy.drawX, enemy.drawY, 5, enemy.drawX, enemy.drawY, 60);
                    sGrad.addColorStop(0, 'rgba(180, 80, 255, 0.5)'); sGrad.addColorStop(1, 'rgba(180, 80, 255, 0)');
                    lightCtx.fillStyle = sGrad; lightCtx.beginPath(); lightCtx.arc(enemy.drawX, enemy.drawY, 60, 0, Math.PI*2); lightCtx.fill();
                } else if (enemy.type === 'smiler') {
                    const smileX = enemy.drawX + Math.cos(enemy.drawAngle) * 18; const smileY = enemy.drawY + Math.sin(enemy.drawAngle) * 18;
                    const sGrad = lightCtx.createRadialGradient(smileX, smileY, 2, smileX, smileY, 25);
                    sGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)'); sGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    lightCtx.fillStyle = sGrad; lightCtx.beginPath(); lightCtx.arc(smileX, smileY, 25, 0, Math.PI*2); lightCtx.fill();
                }
            });

            if (player.flashL > 0) drawMuzzleLight(player.muzzleX_L, player.muzzleY_L, player.flashL);
            if (player.flashR > 0) drawMuzzleLight(player.muzzleX_R, player.muzzleY_R, player.flashR);

            function drawMuzzleLight(x, y, flashAmount) {
                const fRadius = 250 * (flashAmount / 0.1); 
                const fGrad = lightCtx.createRadialGradient(x, y, 5, x, y, fRadius);
                fGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)'); fGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                lightCtx.fillStyle = fGrad; lightCtx.beginPath(); lightCtx.arc(x, y, fRadius, 0, Math.PI*2); lightCtx.fill();
            }

            lightCtx.restore();

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(lightCanvas, 0, 0);
            ctx.restore();
        }

        // --- UI / JOYSTICKS ---
        function drawJoysticks(ctx) {
            ctx.lineWidth = 3;
            if (input.left.active) {
                ctx.beginPath(); ctx.arc(input.left.baseX, input.left.baseY, JOYSTICK_MAX_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)'; ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.stroke();
                ctx.beginPath(); ctx.arc(input.left.currentX, input.left.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; ctx.fill();
            }
        }

        // --- MAIN LOOP ---
        const player = new Player();
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000; 
            lastTime = currentTime;
            if (dt > 0.1) dt = 0.1; 

            if (gameState === 'countdown') {
                countdownTimer -= dt;
                if (countdownTimer <= 0) {
                    countdownValue--;
                    if (countdownValue > 0) {
                        countdownTimer = 0.5; 
                        triggerCountdownAnim(countdownValue);
                    } else {
                        setGameState('playing');
                    }
                }
            }

            if (gameState === 'playing') {
                timeAlive += dt; // Track score

                // --- GRINDER UPDATE ---
                grinderAngle += 9.0 * dt; // fast spin

                // Proximity rumble: shake when player near grinder
                const gdx = player.x - GRINDER_X, gdy = player.y - GRINDER_Y;
                const gDist = Math.sqrt(gdx*gdx + gdy*gdy);
                if (gDist < GRINDER_OUTER_R + 80) {
                    const proximity = 1 - Math.max(0, (gDist - GRINDER_PIT_R) / 80);
                    triggerShake(3.5 * proximity, 0.05);
                }
                // Kill player if they fall in
                if (gDist < GRINDER_DAMAGE_R) {
                    player.hp -= 120 * dt;
                    player.hurtTimer = 0.15;
                    updateHUD();
                    triggerShake(8, 0.12);
                    if (player.hp <= 0 && gameState === 'playing') {
                        setGameState('gameover');
                    }
                }

                if (shakeTime > 0) {
                    shakeTime -= dt;
                    currentShakeX = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                    currentShakeY = (Math.random() - 0.5) * shakeMag * 2 * settings.shake;
                } else {
                    currentShakeX = 0; currentShakeY = 0;
                }

                player.update(dt);

                // Update Enemy Bullets
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    let eb = enemyBullets[i]; eb.update(dt);
                    let dx = player.x - eb.x; let dy = player.y - eb.y;
                    if (dx*dx + dy*dy < (player.radius + eb.radius) * (player.radius + eb.radius)) {
                        player.hp -= eb.damage; player.hurtTimer = 0.15; updateHUD();
                        damageTexts.push({ x: player.x + (Math.random() - 0.5) * 16, y: player.y - 30, text: "-" + eb.damage, life: 0.7, vy: -55 - Math.random() * 20 });
                        triggerShake(4, 0.1); enemyBullets.splice(i, 1);
                        
                        if (player.hp <= 0 && gameState === 'playing') {
                            lastDeathCause = 'the Choir'; setGameState('gameover');
                        }
                        continue;
                    }
                    if (eb.life <= 0) enemyBullets.splice(i, 1);
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i]; enemy.update(dt, player, enemies);

                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        if (b.hitEnemies && b.hitEnemies.has(enemy)) continue;

                        let dx = enemy.x - b.x; let dy = enemy.y - b.y;
                        if (dx*dx + dy*dy < enemy.radius * enemy.radius) {
                            enemy.hp -= b.damage; enemy.hitCount++;
                            damageTexts.push({ x: enemy.x + (Math.random() - 0.5) * 20, y: enemy.y - 20, text: "-" + b.damage, life: 0.6, vy: -40 - Math.random() * 20 });

                            // Bottle Shatter
                            if (b.type === 'bottle') {
                                for(let p=0; p<6; p++) {
                                    activeSplatter.push({
                                        x: enemy.x, y: enemy.y, vx: (Math.random()-0.5)*300, vy: (Math.random()-0.5)*300,
                                        size: Math.random()*2+1, color: '#2e8b57', friction: 0.9, scaleX: 1, angle: 0
                                    });
                                }
                                triggerShake(3, 0.1);
                            }

                            if (enemy.hitCount % 3 === 0) {
                                let hitAngle = Math.atan2(b.vy, b.vx); let numHit = 1 + Math.floor(Math.random() * 2);
                                for(let p = 0; p < numHit; p++) {
                                    let spread = (Math.random() - 0.5) * 0.6; let speed = 10 + Math.random() * 22; let size = 0.7 + Math.random() * 1.1;
                                    let colors = ['#100000']; if (enemy.type === 'choir') colors = ['#2a004a', '#110022'];
                                    activeSplatter.push({
                                        x: enemy.x + (Math.random()-0.5)*3, y: enemy.y + (Math.random()-0.5)*3,
                                        vx: Math.cos(hitAngle + spread) * speed, vy: Math.sin(hitAngle + spread) * speed,
                                        size, color: colors[0], friction: 0.50, scaleX: 1.0 + Math.random() * 0.3, angle: hitAngle + spread
                                    });
                                }
                            }
                            
                            // Handling bullet pierce and bounce
                            if (b.pierceCount > 0) {
                                b.hitEnemies.add(enemy); b.pierceCount--;
                                if (b.pierceCount <= 0) bullets.splice(j, 1);
                            } else if (b.bounceCount > 0) {
                                b.hitEnemies.add(enemy); b.bounceCount--;
                                if (b.bounceCount <= 0) { bullets.splice(j, 1); } 
                                else {
                                    let nextTarget = null; let minDist = Infinity;
                                    enemies.forEach(ne => {
                                        if (!b.hitEnemies.has(ne)) {
                                            let ndist = (ne.x - b.x)**2 + (ne.y - b.y)**2;
                                            if (ndist < minDist) { minDist = ndist; nextTarget = ne; }
                                        }
                                    });
                                    if (nextTarget) {
                                        let angle = Math.atan2(nextTarget.y - b.y, nextTarget.x - b.x);
                                        b.vx = Math.cos(angle) * b.speed; b.vy = Math.sin(angle) * b.speed;
                                        b.x += b.vx * 0.05; // tiny bump forward
                                    } else { bullets.splice(j, 1); }
                                }
                            } else {
                                bullets.splice(j, 1); 
                            }
                            break; 
                        }
                    }
                    if (enemy.hp <= 0) {
                        let numDeath = 7 + Math.floor(Math.random() * 5);
                        let colors = ['#6a040f', '#370617', '#9d0208', '#03071e'];
                        if (enemy.type === 'choir') colors = ['#3d0b6e', '#5e179e', '#2a004a', '#110022'];

                        for(let p = 0; p < numDeath; p++) {
                            let angle = Math.random() * Math.PI * 2; let speed = 15 + Math.random() * 65; let size = 1.2 + Math.random() * 3.0;
                            activeSplatter.push({
                                x: enemy.x + (Math.random()-0.5)*5, y: enemy.y + (Math.random()-0.5)*5,
                                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                                size, color: colors[Math.floor(Math.random() * colors.length)],
                                friction: 0.55 + Math.random() * 0.1, scaleX: 1.0 + Math.random() * 0.4, angle
                            });
                        }
                        let blobOffsets = [];
                        for(let b = 0; b < 14; b++) {
                            blobOffsets.push({ a: Math.random() * Math.PI * 2, distFrac: 0.15 + Math.random() * 0.45, rFrac: 0.55 + Math.random() * 0.55, ox: (Math.random()-0.5) * 0.25, oy: (Math.random()-0.5) * 0.2 });
                        }
                        
                        let bodyCol = '#0e0a0a'; if (enemy.type === 'kneeler') bodyCol = '#142e1c'; if (enemy.type === 'choir') bodyCol = '#2a1a36';
                        deadEnemies.push({
                            x: enemy.x, y: enemy.y, facingAngle: enemy.facingAngle || 0, legs: enemy.legs, life: 5.0, maxLife: 5.0,
                            growDuration: 4.5, puddleRadius: 2, maxPuddleRadius: 20 + Math.random() * 10, blobOffsets, bodyColor: bodyCol, type: enemy.type
                        });
                        
                        enemies.splice(i, 1); totalKills++; triggerShake(6, 0.15);
                    }
                }

                for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].update(dt); if (bullets[i].life <= 0) bullets.splice(i, 1); }

                for (let i = activeSplatter.length - 1; i >= 0; i--) {
                    let p = activeSplatter[i]; p.x += p.vx * dt; p.y += p.vy * dt;
                    p.x = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.x)); p.y = Math.max(20 + p.size, Math.min(ROOM_SIZE - 20 - p.size, p.y));
                    let drag = Math.pow(p.friction, dt * 60); p.vx *= drag; p.vy *= drag;
                    if (Math.abs(p.vx) < 8 && Math.abs(p.vy) < 8) {
                        floorSplatters.push({x: p.x, y: p.y, size: p.size * 0.85, color: p.color, life: 5.0, scaleX: p.scaleX, angle: p.angle});
                        activeSplatter.splice(i, 1);
                    }
                }
                
                for (let i = floorSplatters.length - 1; i >= 0; i--) { floorSplatters[i].life -= dt; if (floorSplatters[i].life <= 0) floorSplatters.splice(i, 1); }

                for (let i = deadEnemies.length - 1; i >= 0; i--) {
                    let d = deadEnemies[i]; d.life -= dt;
                    let growFrac = Math.min(1, (d.maxLife - d.life) / d.growDuration);
                    let eased = 1 - Math.pow(1 - growFrac, 2.8); 
                    d.puddleRadius = 2 + (d.maxPuddleRadius - 2) * eased;
                    if (d.life <= 0) deadEnemies.splice(i, 1);
                }

                for (let i = damageTexts.length - 1; i >= 0; i--) { let d = damageTexts[i]; d.y += d.vy * dt; d.life -= dt; if (d.life <= 0) damageTexts.splice(i, 1); }
            }

            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            let camX = player.x; let camY = player.y;

            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.scale(settings.zoom, settings.zoom);
            ctx.translate(-camX + currentShakeX, -camY + currentShakeY);

            // Draw World Elements
            drawRoom(ctx);
            drawGrinder(ctx, lastTime / 1000);

            deadEnemies.forEach(d => {
                const fadeStart = 2.0; const alpha = d.life > fadeStart ? 1.0 : (d.life / fadeStart); const pr = d.puddleRadius;
                ctx.save(); ctx.globalAlpha = alpha;

                ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.facingAngle); ctx.scale(1.32, 0.76); 
                d.blobOffsets.forEach(b => {
                    let bx = Math.cos(b.a) * pr * b.distFrac + b.ox * pr; let by = Math.sin(b.a) * pr * b.distFrac * 0.7 + b.oy * pr; let br = pr * b.rFrac;
                    let g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
                    if (d.type === 'choir') { g.addColorStop(0, 'rgba(61,11,110,0.80)'); g.addColorStop(0.55,'rgba(42,0,74,0.48)'); } 
                    else { g.addColorStop(0, 'rgba(90,4,4,0.80)'); g.addColorStop(0.55,'rgba(58,2,2,0.48)'); }
                    g.addColorStop(1, 'rgba(22,0,0,0)');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
                });

                const mainG = ctx.createRadialGradient(pr*0.05, pr*0.04, 0, 0, 0, pr * 0.9);
                if (d.type === 'choir') { mainG.addColorStop(0, 'rgba(42,26,54,0.98)'); mainG.addColorStop(0.28, 'rgba(29,14,46,0.95)'); mainG.addColorStop(0.55, 'rgba(17,0,34,0.84)'); } 
                else { mainG.addColorStop(0, 'rgba(72,3,3,0.98)'); mainG.addColorStop(0.28, 'rgba(55,2,2,0.95)'); mainG.addColorStop(0.55, 'rgba(40,1,1,0.84)'); }
                mainG.addColorStop(0.78, 'rgba(28,0,0,0.56)'); mainG.addColorStop(0.92, 'rgba(16,0,0,0.24)'); mainG.addColorStop(1, 'rgba(6,0,0,0)');
                ctx.fillStyle = mainG; ctx.beginPath(); ctx.arc(0, 0, pr * 0.9, 0, Math.PI * 2); ctx.fill();

                if (pr > 10) {
                    let sheenR = pr * 0.2; let sheenG = ctx.createRadialGradient(-pr*0.12, -pr*0.1, 0, -pr*0.12, -pr*0.1, sheenR);
                    if (d.type === 'choir') { sheenG.addColorStop(0, `rgba(94,23,158,${Math.min(0.28, pr/200)})`); } else { sheenG.addColorStop(0, `rgba(140,18,18,${Math.min(0.28, pr/200)})`); }
                    sheenG.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = sheenG; ctx.beginPath(); ctx.arc(-pr*0.12, -pr*0.1, sheenR, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();

                if (d.type === 'choir') {
                    ctx.save(); ctx.translate(d.x, d.y); ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
                    ctx.fillStyle = d.bodyColor || '#2a1a36';
                    ctx.beginPath(); ctx.arc(-8, -5, 14, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(8, 0, 14, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-2, 10, 14, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                } else {
                    if (d.legs) {
                        ctx.save(); ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.globalAlpha = alpha;
                        d.legs.forEach((leg, idx) => {
                            let attachX = d.x + Math.cos(d.facingAngle)*(leg.offsetX*0.5) - Math.sin(d.facingAngle)*(leg.offsetY*0.5);
                            let attachY = d.y + Math.sin(d.facingAngle)*(leg.offsetX*0.5) + Math.cos(d.facingAngle)*(leg.offsetY*0.5);
                            let sideSign = leg.offsetY < 0 ? -1 : 1;
                            let deadAng = d.facingAngle + sideSign * (Math.PI * 0.48) + (leg.offsetX < 0 ? Math.PI * 0.15 : -Math.PI * 0.05);
                            let legLen = 28 + idx * 2; let legEndX = d.x + Math.cos(deadAng) * legLen; let legEndY = d.y + Math.sin(deadAng) * legLen;
                            ctx.strokeStyle = '#1a1a1a'; ctx.beginPath(); ctx.moveTo(attachX, attachY);
                            let kneeX = attachX + Math.cos(deadAng) * legLen * 0.45; let kneeY = attachY + Math.sin(deadAng) * legLen * 0.45;
                            ctx.lineTo(kneeX, kneeY); ctx.stroke();
                            ctx.strokeStyle = '#141414'; ctx.beginPath(); ctx.moveTo(kneeX, kneeY); ctx.lineTo(legEndX, legEndY); ctx.stroke();
                        });
                        ctx.restore();
                    }
                    ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.facingAngle); ctx.globalAlpha = alpha; ctx.shadowColor = 'rgba(0,0,0,0.6)';
                    ctx.shadowBlur = 8; ctx.shadowOffsetY = 3; ctx.fillStyle = d.bodyColor || '#0e0a0a';
                    ctx.beginPath(); ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowColor = 'transparent'; ctx.fillStyle = d.bodyColor ? 'rgba(10,60,20,0.3)' : 'rgba(55,2,2,0.35)';
                    ctx.beginPath(); ctx.ellipse(-2, -2, 12, 6, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
                ctx.restore(); 
            });

            floorSplatters.forEach(s => {
                ctx.globalAlpha = Math.min(1, s.life / 2.5) * 0.72;
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle); ctx.scale(s.scaleX, 1);
                const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, s.size);
                sg.addColorStop(0, s.color); sg.addColorStop(1, 'rgba(22,0,0,0)');
                ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(0, 0, s.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            activeSplatter.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle); ctx.scale(p.scaleX, 1);
                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy); let rx = speed > 20 ? p.size + speed * 0.018 : p.size; let ry = p.size * 0.75;
                const ag = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(rx, ry));
                ag.addColorStop(0, p.color); ag.addColorStop(1, 'rgba(30,0,0,0)');
                ctx.fillStyle = ag; ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });
            
            bullets.forEach(bullet => bullet.draw(ctx));
            enemyBullets.forEach(eb => eb.draw(ctx));
            
            enemies.forEach(enemy => {
                enemy.drawBody(ctx);
                enemy.drawSmile(ctx);
            }); 
            
            player.draw(ctx);

            damageTexts.forEach(d => {
                let alpha = Math.max(0, d.life / 0.6);
                ctx.globalAlpha = alpha;
                ctx.font = 'bold 10px "Barlow", Arial, sans-serif'; ctx.textAlign = 'center';
                ctx.fillStyle = '#cc3333'; ctx.shadowColor = 'rgba(0,0,0,1)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 1;
                ctx.fillText(d.text, d.x, d.y);
            });

            // DRAW CEILING LIGHTS AFTER EVERYTHING ELSE (so they sit above the player)
            ceilingLights.forEach(l => l.draw(ctx, camX, camY));

            ctx.restore(); 

            drawLighting(ctx, camX, camY, currentShakeX, currentShakeY);

            if (player.hurtTimer > 0) {
                ctx.save();
                let alpha = (player.hurtTimer / 0.15) * 0.4; 
                let grad = ctx.createRadialGradient(width/2, height/2, height*0.4, width/2, height/2, height*0.8);
                grad.addColorStop(0, 'rgba(180, 0, 0, 0)'); grad.addColorStop(1, `rgba(180, 0, 0, ${alpha})`);
                ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height); ctx.restore();
            }

            if (gameState === 'playing') {
                drawJoysticks(ctx);
            } else if (gameState === 'gameover') {
                if (Math.random() < 0.6) {
                    deathParticles.push({
                        x: Math.random() * width, y: height + 10, size: Math.random() * 3 + 0.5,
                        vx: (Math.random() - 0.5) * 25, vy: -15 - Math.random() * 60, life: 1.0, maxLife: 1.0,
                        alpha: Math.random() * 0.6 + 0.2, hue: Math.random() < 0.7 ? 0 : 15 
                    });
                }
                ctx.save();
                for (let i = deathParticles.length - 1; i >= 0; i--) {
                    let p = deathParticles[i];
                    p.x += p.vx * dt; p.y += p.vy * dt; p.vy -= dt * 5; p.vx += (Math.random() - 0.5) * 2; p.life -= dt;
                    let a = Math.max(0, (p.life / p.maxLife)) * p.alpha;
                    ctx.fillStyle = `hsla(${p.hue}, 90%, ${p.size > 1.5 ? 35 : 20}%, ${a})`; ctx.shadowColor = `hsla(${p.hue}, 100%, 40%, ${a * 0.6})`;
                    ctx.shadowBlur = 6; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    if (p.y < -20 || p.life <= 0) deathParticles.splice(i, 1);
                }
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
